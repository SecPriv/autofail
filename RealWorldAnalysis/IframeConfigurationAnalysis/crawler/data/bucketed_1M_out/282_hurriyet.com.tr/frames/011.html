<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <style>
        .notification-wrapper {
            height: 120px;
            background-color: #fafafa;
            padding: 20px;
            position: relative;
            display: none;
            -webkit-box-shadow: 0px 1px 11px 0px #8f8c8c;
            box-shadow: 0px 1px 11px 0px #8f8c8c;
            border-radius: 10px;
            margin: 3px 10px;
        }

        .notification-logo {
            float: left;
            margin: 13px 15px 0px 0px;
        }

        .notification-logo img {
            width: 65px;
            height: 65px;
            border-radius: 5px;
        }

        .notification-title {
            margin-bottom: 5px;
            text-align: left;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.5em;
            color: #000;
            overflow: hidden;
            font-family: "Metropolis Bold";
        }

        .notification-info {
            line-height: 16px;
            margin: 10px 0;
            padding: 0;
            text-align: left;
            overflow: hidden;
            font-family: "Metropolis Regular" !important;
            font-style: normal !important;
            font-size: 14px;
            display: -webkit-box;
            max-width: 100%;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .notification-text-wrapper {
            position: relative;
            padding: 10px 0 0 0;
            color: #000;
            text-align: left;
            margin: 0;
            line-height: 1.4em;
        }

        .btn-notification {
            background-color: #37AF2E;
            float: left;
            color: #fff;
            margin: 0px 5px;
            cursor: pointer;
            width: 100px;
            height: 30px;
            padding: 0;
            line-height: 30px;
            text-align: center;
            font-family: "Metropolis Bold";
            border-radius: 5px;
        }

        .btn-notification:hover {
            background-color: #127B0A;
        }

        .btn-secondary:hover {
            background-color: #666;
        }

        .notification-buttons {
            position: absolute;
            right: 15px;
            bottom: 15px;
        }

        .btn-secondary {
            background-color: #999;
        }
    </style>
