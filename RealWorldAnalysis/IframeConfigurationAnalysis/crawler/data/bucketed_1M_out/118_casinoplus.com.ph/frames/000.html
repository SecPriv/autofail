const fnBrowserDetect = () => {
	const userAgent = navigator.userAgent
	let browserName
	if (userAgent.match(/chrome|chromium|crios/i)) {
		browserName = 'chrome'
	} else if (userAgent.match(/firefox|fxios/i)) {
		browserName = 'firefox'
	} else if (userAgent.match(/safari/i)) {
		browserName = 'safari'
	} else if (userAgent.match(/opr\//i)) {
		browserName = 'opera'
	} else if (userAgent.match(/edg/i)) {
		browserName = 'edge'
	} else {
		browserName = 'No browser detection'
	}
	return browserName
}

async function loadScript(src) {
	return new Promise((resolve, reject) => {
		const script = document.createElement('script')
		script.src = src
		script.async = true
		script.onload = resolve
		script.onerror = reject
		document.head.appendChild(script)
	})
}

function getSourceUrlForLogin() {
	return document?.referrer || window.location.origin
}

function getOperatingSystem() {
	try {
		const userAgent = navigator.userAgent || navigator.vendor || window.opera

		if (/windows phone/i.test(userAgent)) {
			return 'Windows Phone'
		}
		if (/android/i.test(userAgent)) {
			return 'Android'
		}
		if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
			return 'iOS'
		}
		if (/Win(dows )?NT|Win64/.test(userAgent)) {
			return 'Windows'
		}
		if (/Mac/.test(userAgent)) {
			return 'macOS'
		}
		if (/Linux/.test(userAgent)) {
			return 'Linux'
		}
		if (/CrOS/.test(userAgent)) {
			return 'Chrome OS'
		}

		return 'unknown'
	} catch (error) {
		console.log('failed check device type', error)
	}
}

function getLocal(key) {
	try {
		let val = typeof localStorage === 'undefined' ? cache[key] : localStorage.getItem(key)
		if (!val || ['null', 'undefined'].includes(val)) return ''
		return typeof sessionStorage === 'undefined' ? val : JSON.parse(val)
	} catch (error) {
		console.error(`Error from local storage key "${key}":`, error)
		return {}
	}
}

function setLocal(key, val) {
	localStorage.setItem(key, JSON.stringify(val))
}

function getSession(key) {
	try {
		if (typeof sessionStorage === 'undefined') return ''
		return sessionStorage.getItem(key) || ''
	} catch (error) {
		console.error(`Error accessing sessionStorage key "${key}":`, error)
		return ''
	}
}

		}
	} catch (error) {
		console.error('Posthog error during initialization:', error)
	}
}

export const toSnakeCase = str => {
	return str.replace(/[A-Z]/g, letter => `_${letter.toLowerCase()}`).replace(/^_/, '')
}

function postHogEvent(eventName, type, data = {}) {
	try {
		const urlParams = new URLSearchParams(window.location.search)
		const postObj = {
			event_name: eventName,
			properties: {
				browserType: fnBrowserDetect(),
				currentTime: new Date().toISOString(),
				deviceType: 'H5',
				isFromGame: urlParams.get('fromGame') || getSession('fromGame') || '',
				language: 'en',
				partnerId: urlParams.get('partnerId') || getSession('partnerId') || '',
				phoneType: getOperatingSystem(),
				playerId: '',
				sourceUrl: getSourceUrlForLogin(),
				static: true,
				page: window.location.pathname,
				type: type,
				url: window.location.href,
				userGuid: posthogLinkId,
				visitorId: getLocal('visitorId') || '',
				...data,
			},
		}

		postObj.properties = Object.fromEntries(Object.entries(postObj.properties).map(([key, value]) => [toSnakeCase(key), value]))

		return postObj
	} catch (error) {
		console.log('postHogEvent error', error)
	}
}

const sendClickEvent = functionName => {
	try {
		const eventObj = postHogEvent(EVENT_NAME, 'click_event', { functionName: functionName })

		console.log('eventObj', eventObj)
		posthog.send(eventObj, eventType.click)
	} catch (error) {
		console.error('Failed posthog', error)
	}
}

const generateClickEvent = () => {
	const eventButtons = document.querySelectorAll('#event-button')
	eventButtons.forEach((button, index) => {

}
