        body {
            margin: 0;
            font-family: 'Figtree', sans-serif;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            top: -40px; 
        }
        .shape-triangle {
            position: absolute;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 0 175px 175px 175px;
            border-color: transparent transparent #fab907 transparent;
            z-index: 0;
        }
        .shape-triangle.top-left {
            top: 0;
            left: 0;
            transform: translate(-50%, -50%) rotate(15deg);
        }
        .shape-triangle.top-right {
            top: 0;
            right: 0;
            transform: translate(50%, -50%) rotate(45deg);
        }
        .shape-triangle.bottom-right {
            bottom: 0;
            right: 0;
            transform: translate(50%, 50%) rotate(75deg);
        }
        .shape-triangle.bottom-left {
            bottom: 0;
            left: 0;
            transform: translate(-50%, 50%) rotate(105deg);
        }
        .message {
            font-size: 1.5em;
            text-transform: uppercase;
            padding: 0 10px; 
        }
        .logo {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
        }
        .logo img {
            width: 250px;
            height: auto;
        }
        .sponsor {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75em;
            text-transform: uppercase;
            padding: 0 10px; 
        }
        .sponsor-logos {
            position: absolute;
            bottom: 40px; 
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; 
            gap: 15px;
            padding: 0 10px; 
        }
        .sponsor-logos img {
            width: 40px;
            height: auto;
        }
        @media (max-width: 600px) {
            .shape-triangle {
                border-width: 0 87px 87px 87px; 
            }
            .logo img {
                width: 150px; 
            }
            .message {
                font-size: 1em; 
                top: -20px; 
            }
            .sponsor {
                font-size: 0.6em; 
                bottom: 10px; 
            }
            .sponsor-logos {
                bottom: 60px; 
            }
            .sponsor-logos img {
                width: 30px; 
            }
        }
    </style>
