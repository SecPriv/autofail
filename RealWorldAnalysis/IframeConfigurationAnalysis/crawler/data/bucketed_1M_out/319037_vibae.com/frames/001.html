analytics.subscribe('page_viewed', (event) => {
  tlq('init', 'LS-32293762-7', { url: event.context?.document?.location?.href, api: true, inject: true });

  tlq('track', 'PageView', {
    target: 'LS-32293762-7',
    url: event.context?.document?.location?.href,
  });
});

analytics.subscribe('product_viewed', async (event) => {
  const productVariant = event.data?.productVariant;

  const item = {
    item_id: productVariant?.sku,
    item_name: productVariant?.product?.title,
    item_variant: productVariant?.title,
    item_brand: productVariant?.product?.vendor,
    sku:  productVariant?.sku,
    variant_id: productVariant?.id,
    product_id:  productVariant?.product?.id,
    price: productVariant?.price?.amount,
    currency: productVariant?.price?.currencyCode,
  };

  tlq('track', 'ViewContent', {
    target: 'LS-32293762-7',
    url: event.context?.document?.location?.href,
    items: [item],
  });
});

analytics.subscribe('product_added_to_cart', (event) => {
  const cartLine = event.data?.cartLine;
  const productVariant = cartLine?.merchandise;

  const item = {
    item_id: productVariant?.sku,
    item_name: productVariant?.product?.title,
    item_variant: productVariant?.title,
    item_brand: productVariant?.product?.vendor,
    sku:  productVariant?.sku,
    variant_id: productVariant?.id,
    product_id:  productVariant?.product?.id,
    price: productVariant?.price?.amount,
    currency: productVariant?.price?.currencyCode,
  };

  tlq('track', 'AddToCart', {
    target: 'LS-32293762-7',
    url: event.context?.document?.location?.href,
    items: [item],
  });
});

analytics.subscribe('payment_info_submitted', (event) => {
  tlq('track', 'AddPaymentInfo', {
    target: 'LS-32293762-7',
    url: event.context?.document?.location?.href,
  });

  const billingAddress = event.data?.checkout?.billingAddress;

  tlq('set', 'ContactInfo', {
    target: 'LS-32293762-7',
    email: event.data?.checkout?.email,
    phoneNumber: event.data?.checkout?.phone || billingAddress?.phone,
    firstName: billingAddress?.firstName,
    lastName: billingAddress?.lastName,
    address: billingAddress?.address1,
    postCode: billingAddress?.zip,
    city: billingAddress?.city,
    country: billingAddress?.country,
    isFirstOrder: event.data?.checkout?.order?.customer?.isFirstOrder,
  });
});

analytics.subscribe('checkout_started', (event) => {
  let lineItems = [];

  if (event.data?.checkout?.lineItems) {
    for (const checkoutLineItem of event.data.checkout.lineItems) {
      lineItems.push({
        item_id: checkoutLineItem?.variant?.sku,
        item_name: checkoutLineItem?.title,
        item_variant: checkoutLineItem?.variant?.title,
        item_brand: checkoutLineItem?.variant?.product?.vendor,
        sku:  checkoutLineItem?.variant?.sku,
        variant_id: checkoutLineItem?.variant?.id,
        product_id:  checkoutLineItem?.variant?.product?.id,
        price: checkoutLineItem?.variant?.price?.amount,
        currency: checkoutLineItem?.variant?.price?.currency,
        quantity: checkoutLineItem?.quantity,
      });
    }
  }

  tlq('track', 'InitiateCheckout', {
    target: 'LS-32293762-7',
    url: event.context?.document?.location?.href,
    tax: event.data?.checkout?.totalTax?.amount,
    shipping:
      event.data?.checkout?.shippingLine?.price?.amount ??
      event.data?.checkout?.delivery?.selectedDeliveryOptions?.[0]?.price?.amount ??
      null,
    shippingTitle:
      event.data?.checkout?.shippingLine?.title ||
      event.data?.checkout?.delivery?.selectedDeliveryOptions?.[0]?.title ||
      null,
    items: lineItems,
  });
});

analytics.subscribe('checkout_completed', (event) => {
  let lineItems = [];

  if (event.data?.checkout?.lineItems) {
    for (const checkoutLineItem of event.data.checkout.lineItems) {
      lineItems.push({
        item_id: checkoutLineItem?.variant?.sku,
        item_name: checkoutLineItem?.title,
        item_variant: checkoutLineItem?.variant?.title,
        item_brand: checkoutLineItem?.variant?.product?.vendor,
        sku:  checkoutLineItem?.variant?.sku,
        variant_id: checkoutLineItem?.variant?.id,
        product_id:  checkoutLineItem?.variant?.product?.id,
        price: checkoutLineItem?.variant?.price?.amount,
        currency: checkoutLineItem?.variant?.price?.currency,
        quantity: checkoutLineItem?.quantity,
      });
    }
  }

  tlq('track', 'Purchase', {
    target: 'LS-32293762-7',
    url: event.context?.document?.location?.href,
    currency: event.data?.checkout?.currencyCode,
    value: event.data?.checkout?.totalPrice?.amount,    
    tax: event.data?.checkout?.totalTax?.amount,
    shipping: event.data?.checkout?.shippingLine?.price?.amount,
    shippingTitle:
      event.data?.checkout?.shippingLine?.title ||
      event.data?.checkout?.delivery?.selectedDeliveryOptions?.[0]?.title || null,
    items: lineItems,
  });

  const billingAddress = event.data?.checkout?.billingAddress;

  tlq('set', 'ContactInfo', {
    target: 'LS-32293762-7',
    url: event.context?.document?.location?.href,
    email: event.data?.checkout?.email,
    phoneNumber: event.data?.checkout?.phone || billingAddress?.phone,
    externalId: event?.data?.checkout?.order?.id,
    firstName: billingAddress?.firstName,
    lastName: billingAddress?.lastName,

    postCode: billingAddress?.zip,
    city: billingAddress?.city,
    country: billingAddress?.country,
    isFirstOrder: event.data?.checkout?.order?.customer?.isFirstOrder,
  });
});
