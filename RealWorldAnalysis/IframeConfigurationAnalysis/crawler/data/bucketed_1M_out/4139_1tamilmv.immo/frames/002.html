            img {
              max-width: 100%;

            }
            h1 {
              font-size: 1.7rem;

            .mask {
              position: absolute;
              top: 0;
              left: 0;

              position: absolute;
              top: 10px;
              right: 10px;

            .close:hover {

            }
            .close img {
              width: 100%;
              height: 100%;
            }
        </style>
