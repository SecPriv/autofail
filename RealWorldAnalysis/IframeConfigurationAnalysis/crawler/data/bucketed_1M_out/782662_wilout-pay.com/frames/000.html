      :root {
        --primary-color: #00b797;
        --dark-color: #002f36;
        --medium-color: #007773;
        --light-color: #b4bec2;
      }
      body, html {
        background-color: #f6f9fb;
        font-family: "Camphor", sans-serif;
        color: var(--dark-color);
      }
      .login-container {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px 0px;
        box-sizing: border-box;
      }
      .login-box {
        width: 90%;
        max-width: 380px;
        margin: 0px;
        padding: 30px;
        padding-top: 27px;
        background-color: #fff;
        box-shadow: 0px 15px 45px -3px rgba(0,0,0,0.12);
        border-radius: 22px;
      }
      .login-header {
        text-align: center;
      }
      .logo {
        width: 50px;
      }
      .boname{
        margin-top: 7px;
        font-weight: 900;
        font-size: 28px;
      }
      .title{
        margin-top: 10px;
        font-weight: 800;
        font-size: 18px;
        color: var(--primary-color);
      }
      .instructions{
        margin-top: 25px;
        font-weight: 400;
        font-size: 14.4px;
      }
      .form-container{
        margin-top: 30px;
      }
      .form-group{
        margin-bottom: 15px;
      }
      .reduced-form-group{
        height: 0px;
        margin-bottom: 5px;
        opacity: 0;
      }
      .form-label{
        font-size: 14px;
        font-weight: 600;
      }
      .password-rules{
        font-size: 12px;
        font-weight: 400;
      }
      .form-control{
        height: 50px;
        border-radius: 14px;
        border: solid 1px #eceff2;
        background-color: #f7f9fb;
        line-height: 50px;
        font-size: 15px;
        font-weight: 400;
        box-shadow: none;
        outline: none;
        color: var(--dark-color);
        transition-duration: 0.3s;
      }
      .form-control::placeholder{
        color: var(--light-color);
        transition-duration: 0.3s;
      }
      .form-control:focus{
        box-shadow: none !important;
        outline: none !important;
        border-color: #ddd;
        background-color: #ffffff;
        transition-duration: 0.3s;
      }
      .form-control:focus::placeholder{
        opacity: 0;
        padding-left: 10px;
      }
      .forgot-pass-container{
        margin-top: -5px;
        font-size: 13px;
        font-weight: 400;
      }
      .forgot-pass{
        cursor: pointer;
        color: var(--dark-color);
      }
      .forgot-pass:hover{
        text-decoration: underline;
        color: var(--primary-color);
      }
      .link-signup-login{
        color: var(--primary-color);
        cursor: pointer;
      }
      .link-signup-login:hover{
        color: var(--primary-color);
      }
      .captcha-container {
        display: none;
        text-align : center;
      }
      .error-message {
        margin-top: 20px;
        padding: 14px;
    		border: 1px solid transparent;
    		border-radius: 12px;
				color: #ce3836;
    		background-color: #f2dede;
    		border-color: #da9695;
        text-align: center;
        display: none;
        white-space: break-spaces;
      }
      .success-message {
        margin-top: 20px;
        padding: 14px;
    		border: 1px solid transparent;
    		border-radius: 12px;
				color: #17ae8c;
    		background-color: #daede9;
    		border-color: #beebe1;
        text-align: center;
        display: none;
        white-space: break-spaces;
      }
      .btn{
        position: relative;
      	width: 100%;
        height: 50px;
        padding: 0px;
        border-radius: 14px;
        border: none !important;
        outline: none !important;
        text-align: center;
        line-height: 50px;
        font-size: 16px;
        font-weight: 800;
        user-select: none;
        transition-duration: 0.3s;
      }
      .btn-primary{
        margin-top: 20px;
        margin-bottom: 25px;
        z-index: 20;
        box-sizing: content-box;
        background-color: var(--dark-color) !important;
        background-image: linear-gradient(to right, var(--primary-color),var(--medium-color),var(--dark-color),var(--dark-color));
        background-size: 300%;
    		background-position: 80%;
        border-bottom: solid 4px var(--primary-color) !important;
        box-shadow: 0px 8px 20px -2px rgba(0,0,0,0.3);
      }
      .btn-primary:hover{
        background-position: 0% !important;
      }
      .btn-primary:active{
        background-image: linear-gradient(to right, var(--primary-color),var(--medium-color),var(--dark-color),var(--dark-color)) !important;
        background-position: 0% !important;
        transform: scale(0.98);
        box-shadow: 0px 3px 8px -2px rgba(0,0,0,0.3);
        opacity: 0.8;
      }
      .return-to-login-container{
        padding-right: 5px;
        text-align : center;
        font-weight: 600;
        user-select: none;
      }
      .return-to-login{
        cursor: pointer;
        color: var(--dark-color);
      }
      .return-to-login:hover{
        text-decoration: underline;
        color: var(--primary-color);
      }
      .switch-form-container{
        margin-bottom: 25px;
        text-align : center;
        color: var(--dark-color);
        font-weight: 600;
        user-select: none;
      }
      .separator{
        z-index: 10;
        height: 1px;
        margin-bottom: 27px;
        display: flex;
        justify-content: center;
        background-color: #e3e3e3;
      }
      .separator-text{
        margin-top: -10px;
        padding-left: 10px;
        padding-right: 10px;
        background-color: #fff;
        text-align: center;
        color: var(--light-color);
        font-size: 13px;
        font-weight: 400;
      }
      .btn-secondary{
        margin-top: 5px;
        height: 40px;
        background-color: #fff;
        font-size: 14px;
        font-weight: 600;
        line-height: 40px;
        color: #012d30;
        box-shadow: 0px 4px 15px -2px rgba(0,0,0,0.1);
      }
      .btn-secondary:hover{
        background-color: #fff;
        color: var(--primary-color);
      }
      .btn-secondary:active{
        transform: scale(0.98);
        box-shadow: 0px 2px 5px -2px rgba(0,0,0,0.1);
      }
      .invisible {
        display: none !important;
      }
      .password-wrapper {
        position: relative;
      }
      .password-wrapper .form-control {
        padding-right: 46px;
      }
      .toggle-password {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        color: var(--light-color);
        display: flex;
        align-items: center;
        transition-duration: 0.2s;
      }
      .toggle-password:hover {
        color: var(--dark-color);
      }

      function login(e) {
        e.preventDefault();
        hideMessage();
        var button = this;
        var username = document.getElementById('email').value;
        var password = document.getElementById('password').value;

          displayError({description:'Veuillez renseigner une adresse e-mail'});

            null,
            (error, payload) => {
              if (payload) {

      function signup() {
        hideMessage();
        var button = this;
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value.trim();
        if(!email){
          displayError({description:'Veuillez renseigner une adresse e-mail'});
          return true;
        }
        if(!password){
          displayError({description:'Veuillez saisir un mot de passe'});
          return true;
        }
        button.disabled = true;
        var request = () => {
          webAuth.redirect.signupAndLogin({
            connection: databaseConnection,
            email: email,
            password: password,
            captcha: signupCaptcha.getValue()
          }, function(err) {
            if (err){
              displayError(err);
            }
            button.disabled = false;
          });
        };

        if (triggerCaptcha) {
          triggerCaptcha(request);
        } else {
          request();
        }
      }

      function loginWithGoogle() {
        hideMessage();
        webAuth.authorize({
          connection: 'google-oauth2'
        }, function(err) {
          if (err) displayError(err);
        });
      }
      
      function loginWithApple() {
        hideMessage();
        webAuth.authorize({
          connection: 'apple'
        }, function(err) {
          if (err) displayError(err);
        });
      }
      
      function loginWithFacebook() {
        hideMessage();
        webAuth.authorize({
          connection: 'facebook'
        }, function(err) {
          if (err) displayError(err);
        });
      }
      
      function switchToForgotPass(e) {
        e.preventDefault();
        hideMessage();
        var title = document.getElementById('title');
        var instructions = document.getElementById('instructions');
        var firstFormGroup = document.getElementsByClassName('first-form-group')[0];
        var forgotPass = document.getElementById('forgot-pass');
        var loginBtn = document.getElementById('btn-login');
        var returnToLoginContainer = document.getElementById('return-to-login-container');
        var switchFormContainer = document.getElementById('switch-form-container');
        var resetPassBtn = document.getElementById('btn-reset-pass');
        var separator = document.getElementsByClassName('separator')[0];
        var btnSecondaryList = document.querySelectorAll('.btn-secondary');
        firstFormGroup.classList.toggle('invisible');
        forgotPass.classList.toggle('invisible');
        returnToLoginContainer.classList.toggle('invisible');
        switchFormContainer.classList.toggle('invisible');
        loginBtn.classList.toggle('invisible');
        resetPassBtn.classList.toggle('invisible');
        separator.classList.toggle('invisible');
        btnSecondaryList.forEach(function(btn) {
          btn.classList.toggle('invisible');
        });
        if (firstFormGroup.classList.contains('invisible')) {
          title.innerHTML = "Mot de passe oublié";
          instructions.innerHTML = "Renseignez votre adresse e-mail pour recevoir les instructions afin de modifier votre mot de passe.";
        } else {
        	title.innerHTML = "Connexion";
          instructions.innerHTML = "Veuillez saisir vos identifiants pour vous connecter";
        }
      }
      
      function resetPass(e) {
        e.preventDefault();
        hideMessage();
        const email = document.getElementById('email').value.trim();
        if (!email) {
          displayError({description:'Veuillez renseigner votre adresse e-mail'});
          return;
        }
        webAuth.changePassword({
          connection: 'Username-Password-Authentication',
          email: email
        }, function (err, resp) {
          if (err) {
            alert('Erreur : ' + err.description);
          } else {
            displaySuccess('Un e-mail vous a été envoyé');
          }
        });
      };

      function displayError(err) {
        captcha.reload();
        var errorMessage = document.getElementById('error-message');
        var errorTxt = '';
        if(err.code){
          if(err.code === 'invalid_user_password'){
          	errorTxt = 'E-mail ou mot de passe incorrect';
          }else if(err.code.substring(0, 14) === 'error in email'){
            errorTxt = 'Veuillez vérifier l\'adresse e-mail saisie';
          }else if(err.code === 'invalid_password'){
            errorTxt = 'Le mot de passe saisi doit contenir au minimum 8 caractères';
          }else if(err.code === 'invalid_signup'){
            errorTxt = 'Cette adresse e-mail n\'est pas disponible';
          }else{
            errorTxt = err.policy || err.description;
          }
        }else{
           errorTxt = err.policy || err.description;
        }
        errorMessage.innerText = errorTxt;
        errorMessage.style.display = 'block';
      }
      
      function displaySuccess(txt) {
        var successMessage = document.getElementById('success-message');
        successMessage.innerText = txt;
        successMessage.style.display = 'block';
      }
      
      function hideMessage() {
        var errorMessage = document.getElementById('error-message');
        var successMessage = document.getElementById('success-message');
        errorMessage.innerText = '';
        errorMessage.style.display = 'none';
        successMessage.innerText = '';
        successMessage.style.display = 'none';
      }

      document.getElementById('toggle-password').addEventListener('click', function() {
        var input = document.getElementById('password');
        var iconEye = document.getElementById('icon-eye');
        var iconEyeSlash = document.getElementById('icon-eye-slash');
        if (input.type === 'password') {
          input.type = 'text';
          iconEye.style.display = 'none';
          iconEyeSlash.style.display = '';
        } else {
          input.type = 'password';
          iconEye.style.display = '';
          iconEyeSlash.style.display = 'none';
        }
      });

      document.getElementById('btn-login').addEventListener('click', login);
      document.querySelector('.btn-google').addEventListener('click', loginWithGoogle);
      document.querySelector('.btn-apple').addEventListener('click', loginWithApple);
      document.querySelector('.btn-facebook').addEventListener('click', loginWithFacebook);
      document.getElementById('btn-signup').addEventListener('click', signup);
      document.getElementById('forgot-pass').addEventListener('click', switchToForgotPass);
      document.getElementById('btn-reset-pass').addEventListener('click', resetPass);
      document.getElementById('return-to-login').addEventListener('click', switchToForgotPass);
      document.getElementById('link-signup-login').addEventListener('click', toggleSignupLogin);
    });
  </script>
