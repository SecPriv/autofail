<!DOCTYPE html><html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <title>لا يوجد اتصال بالإنترنت</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #fff;
            color: #5f6368;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .icon {
            font-size: 70px;
            margin-bottom: 20px;
            color: #d1d1d1;
        }
        h1 {
            color: #202124;
            font-size: 22px;
            font-weight: 500;
        }
        p {
            font-size: 14px;
            line-height: 1.6;
        }
        ul {
            padding-right: 20px;
            font-size: 14px;
        }
        .error-code {
            text-transform: uppercase;
            margin-top: 30px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🌵</div> <!-- رمز بديل للديناصور -->
        <h1>لا يتوفر اتصال بالإنترنت</h1>
        <p>جرِّب ما يلي:</p>
        <ul>
            <li>التحقُّق من كابلات الشبكة أو أجهزة المودم أو أجهزة التوجيه</li>
            <li>إعادة الاتصال بشبكة Wi-Fi</li>
        </ul>
        <div class="error-code">ERR_INTERNET_DISCONNECTED</div>
    </div>



</body></html>
