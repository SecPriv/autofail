	<link rel="stylesheet" type="text/css" href="//static.fmkorea.com/modules/fmad/tpl/css/naver_power_link.css">
	<script type="text/javascript" src="//static.fmkorea.com/common/js/jquery.js"></script>
<script>
    window.is_mobile_variable = 'true';
    function fmad_naver_power_link_init() {
        let retry_counts = 1; // counts 값에 1을 넣으면 1회 재시도 (=최대 2회), 값에 2를 넣으면 2회 재시도 (=최대 3회)
        let $ = jQuery;

        let params = {};
        params.idx = 0;
        params.pageSize = 1;
        params.url = 'https://m.fmkorea.com/';
        if(params.url.length < 1) {
			params.url = window.location.href;
		}
		params.channel = 'm_fmkorea.ch5';
        params.keywordGroup = '모바일에펨코리아_공통';

        if(typeof params.idx == 'undefined' || typeof params.idx != 'number') {
            return '';
        }

        window['__fmad_handle_naver_power_link_' + params.idx] = function(data) {
            __fmad_handle_naver_power_link(params.idx, data, params);
        };

        if(typeof window.retry_counts == 'undefined') {
            window.retry_counts = [];
        }
        window.retry_counts[params.idx] = retry_counts;
        window.a_success = null;
        $.ajax({
            type: "GET",
            url: 'https://external-api.impression-neo.naver.com/api/v2/ads/search-jsonp',
            dataType: "jsonp",
            data: params,
            'jsonpCallback': '__fmad_handle_naver_power_link_' + params.idx,
            error: function() {
                window.a_success = false;
            },
        });
    }

    function __fmad_handle_naver_power_link(idx, data, params) {
        window.a_success = true;
        var _length = 0;
        try
        {
            _length = data.ads.length;
        }
        catch (e)
        {
        }
        if(_length)
        {
            __fmad_make_naver_power_link(idx, data, params);
        }
        else if(window.retry_counts[idx]-- > 0)
        {
            jQuery.ajax({
                type: "GET",
                url: 'https://external-api.impression-neo.naver.com/api/v2/ads/search-jsonp',
                dataType: "jsonp",
                data: params,
                'jsonpCallback': '__fmad_handle_naver_power_link_' + idx
            });
        }
    }

    function __fmad_make_naver_power_link(idx, data, params) {
        var $ = jQuery;
        var config = params;

        var $adpost = $('#fmad_wrapper_' + idx).find('.adpost');
        if(params.wrapper && $(params.wrapper).length > 0) {
            $adpost = $(params.wrapper).first();
        }

        if(!$adpost.length)
        {
            $adpost = $('.adpost');
        }
        if(config.move_header_to_bottom == true) {
            $adpost.addClass('plt');
        } else {
            $adpost.addClass('nplt');
        }
        var space = 0;
        if(!Array.isArray(data.ads))
        {
            data.ads = [];
        }

        if(typeof(config)=='object')
        {
            if(config.dupe===1 && data.ads.length==1)
            {
                data.ads[1] = data.ads[0];
            }
            space = config.space;

        }
        if(typeof(data.ads)!='object' || !data.ads.length)
        {
            $adpost[0].innerHTML = '';
            $adpost.css('background','none');
        }
        var i = 1;

        $.each(data.ads, function(){
                var $div = $('<div class="div"></div>');
            var $a_wrapper = $('<a/>') // 제목
				.attr('class', 'wrapper')
                .attr('href', this.clickUrl)
                .attr('target', '_blank')
                .appendTo($div);
            if (typeof this.imageExtension == 'object' && this.imageExtension.imageUrl.length > 0 && config.display_thumbnail == true) {
                    $div.addClass('has_thumbnail');
                    var $a = $('<a/>').addClass('thumbnail').attr('href', this.imageExtension.clickUrl)
                        .attr('target', '_blank').appendTo($div);
                    var $thumbnail = $('<img />').attr('src', this.imageExtension.imageUrl).appendTo($a);
                }
                var $a = $('<a/>') // 제목
                    .text(this.headline)
                    .attr('href', this.clickUrl)
                    .attr('class', 'title')
                    .attr('target', '_blank')
                    .appendTo($div);
                /*if(this.isMobile)
				{
					$a.append('<span class="mobile"></span>');
				}*/
                var $desc = $('<a/>') // 설명
                    .text(this.description)
                    .attr('class', 'desc')
                    .attr('href', this.clickUrl)
                    .attr('target', '_blank')
                    .appendTo($div);
                if(typeof this.descriptionExtension == 'object' && this.descriptionExtension.description) {
                    let desc_ext_html = '';
                    if(typeof this.descriptionExtension.heading == 'string' && this.descriptionExtension.heading.length > 0) {
                        desc_ext_html += '<b>' + this.descriptionExtension.heading + '</b> ';
					}
                    desc_ext_html += this.descriptionExtension.description;
                    var $descExt = $('<a />') // 설명
						.html(desc_ext_html)
						.attr('class', 'descExt')
						.attr('href', this.descriptionExtension.clickUrl)
						.appendTo($div);
                    $div.addClass('has_descExt');
				} else {
                    var $vUrl = $('<a/>') // 사이트 주소
                        .text(' ' + this.displayUrl + ' ')
                        .attr('class', 'vUrl')
                        .attr('href', this.clickUrl)
                        .attr('target', '_blank')
                        .appendTo($div);
                    $div.addClass('has_vUrl');
                }
                $adpost.append($div);
                i++;
        });
        if($('#fmad_extra_wrapper_' + idx).find('.adpost > div.div').length < 1) {
            $('#fmad_extra_wrapper_' + idx).remove();
        }
    }
    jQuery(document).ready(function(){
        fmad_naver_power_link_init();
	});
</script></head>
