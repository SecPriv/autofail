<!DOCTYPE html><html translate="no"><head><script type="text/javascript">
    
  (function() {
    var MAX_URL_PARAM_LENGTH = 34;
    var CLICK_X_URL_KEY = 'nx';
    var CLICK_Y_URL_KEY = 'ny';
    var CREATIVE_DIMENSIONS_KEY = 'dim';
    var AD_URL_PARAM = '&adurl=';

    var relegateNavigation = '';
    var urlParamMap = {};

    urlParamMap[CLICK_X_URL_KEY] = null;
    urlParamMap[CLICK_Y_URL_KEY] = null;
    urlParamMap[CREATIVE_DIMENSIONS_KEY] = null;

    var handleClickTagMessage = function(e) {
      try {
        var eventData = JSON.parse(e.data);
      } catch (err) {
        return;
      }
      if (eventData.isInitClickTag) {
        if (eventData.clickTags) {
          for (var i = 0; i < eventData.clickTags.length; i++) {
            var clkTag = eventData.clickTags[i];
            window[clkTag.name] = clkTag.url;
          }
        } else if (eventData.clickTag) {
          window.clickTag = eventData.clickTag;
        }
        relegateNavigation = eventData.relegateNavigation;
      }
    };

    var storeClickCoordinates = function(e) {
      urlParamMap[CLICK_X_URL_KEY] = Math.round(e.clientX);
      urlParamMap[CLICK_Y_URL_KEY] = Math.round(e.clientY);
    };

    var getCreativeDimensions = function() {
      return window.innerWidth + 'x' + window.innerHeight;
    }

    var getExitClickParams = function(e) {
      urlParamMap[CREATIVE_DIMENSIONS_KEY] = getCreativeDimensions();

      var exitParams = '';
      for (var key in urlParamMap) {
        exitParams += '&' + key + '=';
        if (urlParamMap[key] !== null) {
          exitParams += urlParamMap[key];
        }
      }
      return exitParams;
    }

    var appendExitClickParams = function(url) {
      var adUrlIndex = url.toLowerCase().indexOf(AD_URL_PARAM);
      var paramsToBeAdded = getExitClickParams();
      if (adUrlIndex > -1 && paramsToBeAdded.length <= MAX_URL_PARAM_LENGTH) {
        url = url.substr(0, adUrlIndex) + paramsToBeAdded +
          url.substr(adUrlIndex);
      };
      return url;
    };

    if (open.call) {
      window.open = function(open) {
        return function(url, name, features) {
          url = appendExitClickParams(url);
          if (relegateNavigation === 'parent') {
            var message = {'clickTag': url, 'isPostClickTag': true};
            parent.postMessage(JSON.stringify(message), '*');
          } else {
            var args = [url, name];
            if (features) {
              args.push(features);
            }
            open.apply(window, args);
          }
        };
      }(window.open);
    }

    if (window.addEventListener) {
      window.addEventListener(
          'message', handleClickTagMessage, false);
      window.addEventListener('mousedown', storeClickCoordinates, true);
    } else {
      window.attachEvent('onmessage', handleClickTagMessage);
    }
  })();
    
  </script>
        <meta charset="UTF-8">
        <meta name="ad.size" content="width=1000,height=200">
        <style>
            html,body {
                width:100%;
                height:100%;
                margin:0;
                overflow:hidden;
            }
            iframe {
                border:0;
                opacity:0;
                overflow:hidden;
            }
        </style>
        <script>
var clickTag = "";
</script>
    </head>
    <body>
        <iframe id="banner" style="width: 100%; height: 100%; opacity: 1;" src="https://static.zuuvicdn.com/creative/93e0e08c-0270-41f5-9bae-b4e1be9d3ef5/d4249037-57bb-4520-a0d9-33db84fa3519/57d95823-fd54-4f80-a099-858c32693905/creative/index.html"></iframe><script>function zuuviOpenClicktag(clickData, url, target = '_blank', urlPrepend = '') {
  clickData.click.url = url;
  clickData.banner.account_id = '93e0e08c-0270-41f5-9bae-b4e1be9d3ef5';
  
  var encodedClickData = btoa(JSON.stringify(clickData));
  encodedClickData = encodedClickData.replaceAll('/', '_').replaceAll('+', '-');
  window.open(urlPrepend + 'https://redirect.zuuvi.com/' + encodedClickData, target);
}
var clicktags = {'global': 'clickTag'};

window.addEventListener("message", function (event) {
    if (event.data.type === "zuuvi-click" && ("uuid" in event.data || "href" in event.data)) {
        var href = window[clicktags[event.data.uuid]] || event.data.href;
        var searchParams = new URLSearchParams(location.search);
        var dfpclick = searchParams.get('dfpclick');
        if (dfpclick && !(dfpclick.startsWith('%%') || dfpclick.startsWith('['))) {
            dfpclick = decodeURI(dfpclick);
        } else {
            dfpclick = '';
        }
        zuuviOpenClicktag(event.data.clickData, href, '_blank', dfpclick);
    }
}, false);

var iframe = document.getElementById('banner');
iframe.addEventListener('load', function (event) {
    iframe.contentWindow.postMessage({clicktagHandler: true}, '*');
    
    
    this.style.opacity = 1;
});
iframe.src = 'https://static.zuuvicdn.com/creative/93e0e08c-0270-41f5-9bae-b4e1be9d3ef5/d4249037-57bb-4520-a0d9-33db84fa3519/57d95823-fd54-4f80-a099-858c32693905/creative/index.html' + window.location.search;
</script>
    
</body></html>
