      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function hexToRgb(h) {
      const c = h.replace('#','');
      return { r: parseInt(c.substr(0,2),16), g: parseInt(c.substr(2,2),16), b: parseInt(c.substr(4,2),16) };

    function rgbToHex(r,g,b) {
      const to = n => Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');
      return '#'+to(r)+to(g)+to(b);
    }
    function lerpColor(a,b,t) {
      const A = hexToRgb(a), B = hexToRgb(b);
      return rgbToHex(A.r+(B.r-A.r)*t, A.g+(B.g-A.g)*t, A.b+(B.b-A.b)*t);
    }
    function progressColor(pct) {
      const stops = [
        { pct: 0, color: '#e74c3c' },
        { pct: 35, color: '#f97316' },
        { pct: 68, color: '#f5d031' },
        { pct: 100, color: '#27ae60' }
      ];
      const c = Math.max(0, Math.min(100, pct));
      for (let i = 1; i < stops.length; i++) {
        if (c <= stops[i].pct) {
          const prev = stops[i - 1];
          const next = stops[i];
          return lerpColor(prev.color, next.color, (c - prev.pct) / (next.pct - prev.pct));
        }
      }
      return stops[stops.length - 1].color;
    }
    function renderBadgeList(beach, limit, variant) {
      const api = window.RESULT_BADGES;
      if (!api || !api.getBeachBadges) return '';

      const badges = api.getBeachBadges(beach, state.prefs, limit);
      if (!badges.length) return '';

      const className = variant === 'alt' ? 'alt-badges' : 'result-badges';
      const items = badges.map((b, i) => {
        const badgeHtml = `<span class="result-badge">${escHtml(b.label)}</span>`;
        const breakHtml = (variant !== 'alt' && i % 2 === 1 && i < badges.length - 1)
          ? '<i class="badge-break"></i>' : '';
        return badgeHtml + breakHtml;
      }).join('');
      return `<div class="${className}">${items}</div>`;
    }

    const BEACH_IMAGE_EXTENSIONS = {
      43: 'JPG'
    };

    function beachImageSrc(beach) {
      const id = Number(beach && beach.id);
      if (!Number.isFinite(id)) return '';
      const ext = BEACH_IMAGE_EXTENSIONS[id] || 'jpg';
      return `assets/images/${id}.${ext}`;
    }

    function renderBeachImage(beach) {
      const src = beachImageSrc(beach);
      if (!src) return '';
      return `<img src="${escHtml(src)}" alt="" loading="eager" decoding="async">`;
    }

    const state = {
      phase: 'hero',
      askedIds: new Set(),
      prefs: {},
      unlocks: new Set(),
      currentQuestion: null,
      selectedIdx: null,
      questionCount: 0,
      followupCount: 0,
      ranked: null,
      confidence: null,
      startedAt: null
    };

    const HARD_CAP = 15;
    const MIN_QUESTIONS = 10;

    const $ = (id) => document.getElementById(id);
    const hero = $('hero');
    const card = $('card');
    const quizView = $('quiz');
    const resultView = $('result');
    const progressEl = $('progress');
    const questionEl = $('question');
    const choicesForm = $('choicesForm');
    const nextBtn = $('next');
    const resultBody = $('resultBody');

    function animateSlide(el) {
      if (!el) return;
      el.classList.remove('slide-enter');
      void el.offsetWidth;
      el.classList.add('slide-enter');
    }
    function animateStagger(items) {
      items.forEach((item, idx) => {
        const el = item && item.el ? item.el : item;
        if (!el) return;
        const delay = item && item.delay != null ? item.delay : idx * 70;
        el.classList.remove('stagger-enter');
        el.style.setProperty('--enter-delay', delay + 'ms');
        void el.offsetWidth;
        el.classList.add('stagger-enter');
      });
    }

    hero.style.display = 'flex';
    hero.style.flexDirection = 'column';
    hero.style.alignItems = 'center';
    hero.style.justifyContent = 'center';
    $('goStart').addEventListener('click', startQuiz);

    const startBtn = $('goStart');
    const PULSE_DURATION = 2400;
    const PAUSE_DURATION = 4000;
    let stopped = false;
    let stopTimeout = null;
    let nextTimeout = null;

    function pulseBurst() {
      if (stopped) return;
      startBtn.classList.add('pulsing');
      stopTimeout = setTimeout(() => {
        startBtn.classList.remove('pulsing');
        nextTimeout = setTimeout(pulseBurst, PAUSE_DURATION);
      }, PULSE_DURATION);
    }

    startBtn.addEventListener('animationend', function onEntranceEnd(e) {
      if (e.animationName !== 'heroIn') return;
      startBtn.removeEventListener('animationend', onEntranceEnd);
      startBtn.style.animation = 'none';
      startBtn.style.opacity = '1';
      startBtn.style.transform = 'none';
      setTimeout(pulseBurst, 400);
    }, { once: false });

    startBtn.addEventListener('click', () => {
      stopped = true;
      clearTimeout(stopTimeout);
      clearTimeout(nextTimeout);
      startBtn.classList.remove('pulsing');
      trackGA('klik', 'start', 'przycisk');
    });

    function shuffleCoreQuestions() {
      const core = window.CORE_QUESTIONS;
      if (!core) return;
      const idx = [];
      for (let i = 0; i < core.length; i++) {
        if (!core[i].followupOf) idx.push(i);
      }
      for (let i = idx.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const a = idx[i], b = idx[j];
        [core[a], core[b]] = [core[b], core[a]];
      }
    }

    function startQuiz() {
      state.startedAt = Date.now();
      shuffleCoreQuestions();
      hero.style.display = 'none';
      card.classList.add('is-active');
      progressEl.innerHTML = '<div class="conf-track"><div class="conf-fill" style="width:0%"></div></div>';
      advance();
    }

    function renderProgress(container, questionCount, conf) {
      const x = Math.min(Math.max(0, questionCount), HARD_CAP);
      let pct = Math.log(1 + x) / Math.log(1 + HARD_CAP) * 100;

      if (conf && questionCount >= MIN_QUESTIONS) {
        const gapThr = (window.SCORING_CONFIG && window.SCORING_CONFIG.confidentGapPoints) || 4;
        const gapPart = Math.min(1, conf.absGap / gapThr);
        const top1Part = Math.max(0, Math.min(1, (conf.top1 - 50) / 10));
        const confPct = gapPart * top1Part * 100;
        pct = Math.max(pct, confPct);
      }
      pct = Math.round(Math.min(100, Math.max(0, pct)));

      let fill = container.querySelector('.conf-fill');
      if (!fill) {
        container.innerHTML = '<div class="conf-track"><div class="conf-fill" style="width:0%"></div></div>';
        fill = container.querySelector('.conf-fill');
      }
      requestAnimationFrame(() => {
        fill.style.width = pct + '%';
        fill.style.backgroundColor = progressColor(pct);
      });
    }

    function advance() {
      state.ranked = window.SCORING.rankBeaches(window.BEACHES, state.prefs);

      const conf = window.SCORING.computeConfidence(state.ranked);
      state.confidence = conf;

      if (state.questionCount >= MIN_QUESTIONS && conf.shouldEnd) {
        return showResult();
      }

      if (state.questionCount >= HARD_CAP) {
        return showResult();
      }

      const q = window.SCORING.pickNextQuestion(state);
      if (!q) return showResult();

      state.currentQuestion = q;
      state.selectedIdx = null;

      renderQuestion(q);
    }

    function renderQuestion(q) {
      state.questionCount += 1;
      card.classList.remove('result-mode');
      quizView.style.display = 'flex';
      resultView.style.display = 'none';

      questionEl.textContent = q.text;
      choicesForm.innerHTML = '';

      q.options.forEach((opt, i) => {
        const label = document.createElement('label');
        label.className = 'choice';
        label.dataset.idx = i;
        label.innerHTML = `
          <input type="radio" name="opt" value="${i}">
          <span class="radio"></span>
          <span>${escHtml(opt.label)}</span>
        `;
        choicesForm.appendChild(label);
      });

      nextBtn.textContent = 'Wybierz odpowiedź';
      nextBtn.disabled = true;
      animateStagger([
        { el: questionEl, delay: 0 },
        ...[...choicesForm.querySelectorAll('.choice')].map((el, idx) => ({ el, delay: 70 + idx * 55 })),
        { el: nextBtn, delay: 210 + q.options.length * 55 }
      ]);
    }

    function selectChoice(idx, labelEl) {
      state.selectedIdx = idx;
      [...choicesForm.querySelectorAll('.choice')].forEach(c => c.classList.remove('selected'));
      labelEl.classList.add('selected');
      const inp = labelEl.querySelector('input');
      if (inp) inp.checked = true;
      nextBtn.textContent = 'Dalej';
      nextBtn.disabled = false;
      renderProgress(progressEl, state.questionCount, state.confidence);
    }

    nextBtn.addEventListener('click', () => {
      if (state.selectedIdx == null) return;
      commitAnswer();
    });

    $('restart').addEventListener('click', () => {
      trackGA('klik', 'wynik', 'restart');
      resetAll();
    });

    choicesForm.addEventListener('click', (e) => {
      const label = e.target.closest('.choice');
      if (!label) return;
      selectChoice(Number(label.dataset.idx), label);
    });

    function commitAnswer() {
      const q = state.currentQuestion;
      const opt = q.options[state.selectedIdx];
      applyOption(q, opt);
      state.askedIds.add(q.id);
      trackGA('odpowiedz', 'pytanie_' + state.questionCount, 'opcja_' + state.selectedIdx);

      const isFollowup = (window.FOLLOWUP_QUESTIONS || []).some(x => x.id === q.id);
      if (isFollowup) state.followupCount += 1;

      advance();
    }

    function applyOption(q, opt) {
      if (q.type === 'weightBattle') window.SCORING.applyWeightBattle(state, q, state.selectedIdx);
      else if (opt.prefs) window.SCORING.applyAnswer(state, opt.prefs);
      if (opt.unlocks) opt.unlocks.forEach(u => state.unlocks.add(u));
    }

    const ANALYTICS_URL = 'https://rp-data-onet.michal-rogalski17.workers.dev/submit';
    const RUN_NO_KEY = 'rp_run_no';

    function nextRunNo() {
      let n = 0;
      try { n = parseInt(localStorage.getItem(RUN_NO_KEY) || '0', 10) || 0; } catch {}
      n += 1;
      try { localStorage.setItem(RUN_NO_KEY, String(n)); } catch {}
      return n;
    }

    function sendAnalytics(ranked) {
      if (!ranked || !ranked[0]) return;
      const dur = state.startedAt
        ? Math.max(0, Math.round((Date.now() - state.startedAt) / 1000))
        : null;
      const payload = {
        beach_1: ranked[0].beach.id,
        beach_2: ranked[1]?.beach.id ?? null,
        beach_3: ranked[2]?.beach.id ?? null,
        duration_seconds: dur,
        questions_answered: state.questionCount,
        run_no: nextRunNo()
      };
      try {
        fetch(ANALYTICS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          keepalive: true
        }).catch(() => {});
      } catch {}
    }

    function showResult() {
      card.classList.add('result-mode');
      quizView.style.display = 'none';
      resultView.style.display = 'flex';

      const ranked = window.SCORING.rankBeaches(window.BEACHES, state.prefs);
      sendAnalytics(ranked);
      if (ranked && ranked[0]) trackGA('wynik', 'podsumowanie', ranked[0].beach.id);
      const top = ranked[0];
      const alts = ranked.slice(1, 4);

      let altsHtml = '';
      alts.forEach((a, i) => {
        altsHtml += `
          <div class="alt-card">
            <div class="alt-card-body">
              <div class="alt-num">${i + 2}. miejsce</div>
              <div class="alt-name" title="${escHtml(a.beach.name)}">${escHtml(a.beach.name)}</div>
              ${renderBadgeList(a.beach, window.RESULT_BADGES ? window.RESULT_BADGES.ALT_LIMIT : 3, 'alt')}
            </div>
          </div>`;
      });

      resultBody.innerHTML = `
        <div class="result-title">
          <img class="result-logo" src="assets/logo_rp_p.png" alt="Ranking Plaż">
          <h2 class="result-heading">Twoje dopasowania:</h2>
        </div>
        <div class="postcard">
          <div class="postcard-photo">${renderBeachImage(top.beach)}</div>
          <div class="postcard-body">
            <div class="postcard-kicker">Najlepsze dopasowanie</div>
            <div class="postcard-name">${escHtml(top.beach.name)}</div>
            ${renderBadgeList(top.beach, window.RESULT_BADGES ? window.RESULT_BADGES.MAIN_LIMIT : 4)}
          </div>
        </div>
        <div class="alternatives">${altsHtml}</div>
      `;

      const tiles = [
        resultBody.querySelector('.result-title'),
        resultBody.querySelector('.postcard'),
        ...resultBody.querySelectorAll('.alt-card')
      ].filter(Boolean);
      animateStagger(tiles.map((el, idx) => ({ el, delay: idx * 220 })));
    }

    function resetAll() {
      shuffleCoreQuestions();
      state.phase = 'hero';
      state.askedIds = new Set();
      state.prefs = {};
      state.unlocks = new Set();
      state.currentQuestion = null;
      state.selectedIdx = null;
      state.questionCount = 0;
      state.followupCount = 0;
      state.ranked = null;
      state.confidence = null;
      state.startedAt = null;
      card.classList.remove('is-active', 'result-mode');
      hero.style.display = 'flex';
      animateSlide(hero);
    }
  })();
  </script>
