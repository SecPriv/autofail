html {

body {

.wrapper {
    background: #ffffff;

}

.info {

    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -ms-flex-direction: column;
    flex-direction: column;
    -webkit-box-align: center;
    -ms-flex-align: center;
    align-items: center;
    -webkit-box-pack: center;

}

.logo {

}

h1 {
    font-size: 1.2rem;

.actions {

}

.button {
    width: 46%;

.button:hover {

}

/*************** media queries start ***********/
@media screen and (max-width: 860px) and (max-height: 440px) and (orientation: landscape) {

.mask {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

#trigger_mask {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.trigger_mask_dark {
    -webkit-animation: mask_dark 1s linear forwards;
    animation: mask_dark 1s linear forwards;
}

@-webkit-keyframes mask_dark {
    50% {
        background: rgba(0, 0, 0, 0.2);
    }
}

@keyframes mask_dark {
    50% {
        background: rgba(0, 0, 0, 0.2);
    }
}

.trigger_class {
    -webkit-box-shadow: 0 0 7px 1px #ffe91f;
    box-shadow: 0 0 7px 1px #ffe91f;
}


/*------------ Animations ------------*/

.Flip {
    -webkit-backface-visibility: visible;
    backface-visibility: visible;
    animation: flip 0.5s;
}


@keyframes flip {
    0% {
        -webkit-transform: perspective(400px) scaleX(1) translateZ(0) rotateY(-1turn);
        transform: perspective(400px) scaleX(1) translateZ(0) rotateY(-1turn);
        -webkit-animation-timing-function: ease-out;
        animation-timing-function: ease-out;
    }

    40% {
        -webkit-transform: perspective(400px) scaleX(1) translateZ(150px) rotateY(-190deg);
        transform: perspective(400px) scaleX(1) translateZ(150px) rotateY(-190deg);
        -webkit-animation-timing-function: ease-out;
        animation-timing-function: ease-out;
    }

    50% {
        -webkit-transform: perspective(400px) scaleX(1) translateZ(150px) rotateY(-170deg);
        transform: perspective(400px) scaleX(1) translateZ(150px) rotateY(-170deg);
        -webkit-animation-timing-function: ease-in;
        animation-timing-function: ease-in;
    }

    80% {
        -webkit-transform: perspective(400px) scale3d(.95, .95, .95) translateZ(0) rotateY(0deg);
        transform: perspective(400px) scale3d(.95, .95, .95) translateZ(0) rotateY(0deg);
        -webkit-animation-timing-function: ease-in;
        animation-timing-function: ease-in;
    }

    100% {
        -webkit-transform: perspective(400px) scaleX(1) translateZ(0) rotateY(0deg);
        transform: perspective(400px) scaleX(1) translateZ(0) rotateY(0deg);
        -webkit-animation-timing-function: ease-in;
        animation-timing-function: ease-in;
    }
}


.CyanDonat {
    animation: cyanDonat 0.5s ease-in-out 1;
}


@keyframes cyanDonat {
    0% {
        background: radial-gradient(circle, #fff 10%, #0ff 40%, transparent 70%);
        border-radius: 50%;
        filter: blur(2px);
        opacity: .5;
        transform: scale(1);
    }

    50% {
        filter: blur(1px);
        opacity: .8;
        transform: scale(1.2);
    }

    99% {
        background: radial-gradient(circle, #fff 10%, #0ff 40%, transparent 70%);
    }

    100% {
        background: none;
        border-radius: 0;
        filter: none;
        opacity: 1;
        transform: scale(1);
    }
}



.Shake {
    -webkit-animation: shake 0.5s cubic-bezier(0.455, 0.030, 0.515, 0.955) both;
    animation: shake 0.5s cubic-bezier(0.455, 0.030, 0.515, 0.955) both;

}

@-webkit-keyframes shake {

    0%,
    100% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
        -webkit-transform-origin: 50% 50%;
        transform-origin: 50% 50%;
    }

    10% {
        -webkit-transform: rotate(8deg);
        transform: rotate(8deg);
    }

    20%,
    40%,
    60% {
        -webkit-transform: rotate(-10deg);
        transform: rotate(-10deg);
    }

    30%,
    50%,
    70% {
        -webkit-transform: rotate(10deg);
        transform: rotate(10deg);
    }

    80% {
        -webkit-transform: rotate(-8deg);
        transform: rotate(-8deg);
    }

    90% {
        -webkit-transform: rotate(8deg);
        transform: rotate(8deg);
    }
}

@keyframes shake {

    0%,
    100% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
        -webkit-transform-origin: 50% 50%;
        transform-origin: 50% 50%;
    }

    10% {
        -webkit-transform: rotate(8deg);
        transform: rotate(8deg);
    }

    20%,
    40%,
    60% {
        -webkit-transform: rotate(-10deg);
        transform: rotate(-10deg);
    }

    30%,
    50%,
    70% {
        -webkit-transform: rotate(10deg);
        transform: rotate(10deg);
    }

    80% {
        -webkit-transform: rotate(-8deg);
        transform: rotate(-8deg);
    }

    90% {
        -webkit-transform: rotate(8deg);
        transform: rotate(8deg);
    }
}



.RightTopSlide {
    animation: rightTopSlide 0.5s forwards ease-out;
}

@keyframes rightTopSlide {
    0% {
        transform: translate(100%, -100%);
    }

    100% {
        transform: translate(0, 0);
    }

<script>
    var triggerTarget = document.getElementById("trigger_target");

        triggerTarget.classList.add("trigger_class");
