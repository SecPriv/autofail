      function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search)
        return urlParams.get(name)
      }

      const widget = getQueryParam('widget')
      const widgetUrl = getQueryParam('widgetUrl')
      const jqueryCdn = getQueryParam('jqueryCdn')

      function loadScript(src) {
        return new Promise((resolve, reject) => {
          const script = document.createElement('script')
          script.src = src
          script.async = true
          script.onload = resolve
          script.onerror = reject
          document.head.appendChild(script)
        })
      }

      async function init() {
        try {
          if (jqueryCdn && !window.jQuery) {
            await loadScript(jqueryCdn)
          }

          if (widgetUrl) {
            await loadScript(widgetUrl)
          }

          let retry = 0
          const maxRetry = 50

          const interval = setInterval(() => {
            if (window.siWidgets) {
              clearInterval(interval)

              const el = document.getElementById('si_widget_container')
              el.setAttribute('data-widget', widget)

              window.siWidgets.init(el)
            }

            retry++
            if (retry > maxRetry) {
              clearInterval(interval)
              console.error('Widget timeout')
            }
          }, 100)
        } catch (e) {
          console.error('Widget error:', e)
        }
      }

      init()
    </script>
