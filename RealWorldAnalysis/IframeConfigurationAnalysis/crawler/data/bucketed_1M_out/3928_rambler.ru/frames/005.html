    &lt;style&gt;
      /* Для увеличения специфичности все стили оборачиваем в #banner-360x250 */
      #banner-360x250 .floating-widget {
        position: absolute;
        bottom: 20px;
        right: 20px;
        font-size: 15px;
        font-weight: 500;
        line-height: 20px;
      }

      /* скрытый чекбокс */
      #banner-360x250 .toggle-checkbox {
        display: none;
      }

      /* кнопка */
      #banner-360x250 .floating-button {
        width: 25px;
        height: 25px;
        background-color: #343b4c;
        border-radius: 5px;
        cursor: pointer;
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        justify-content: center;
        -webkit-transition: opacity 0.2s ease;
        -o-transition: opacity 0.2s ease;
        transition: opacity 0.2s ease;
        opacity: 0.4;
      }

      #banner-360x250 .floating-button:hover {
        opacity: 1;
      }

      /* иконки */
      #banner-360x250 .icon {
        color: #fff;
        line-height: 1;
        opacity: 0;
        position: absolute;
        inset: 0;
        display: -webkit-box;
        display: -ms-flexbox;
        display: flex;
        -webkit-box-pack: center;
        -ms-flex-pack: center;
        justify-content: center;
        -webkit-box-align: center;
        -ms-flex-align: center;
        align-items: center;
        -webkit-transition: opacity 0.2s ease, -webkit-transform 0.2s ease;
        transition: opacity 0.2s ease, -webkit-transform 0.2s ease;
        -o-transition: opacity 0.2s ease, transform 0.2s ease;
        transition: opacity 0.2s ease, transform 0.2s ease;
        transition: opacity 0.2s ease, transform 0.2s ease,
          -webkit-transform 0.2s ease;
      }

      #banner-360x250 .toggle-checkbox:checked + .floating-button {
        opacity: 1;
      }

      #banner-360x250
        .toggle-checkbox:not(:checked)
        + .floating-button
        .icon-closed {
        opacity: 1;
      }

      #banner-360x250 .toggle-checkbox:checked + .floating-button .icon-opened {
        opacity: 1;
      }

      /* панель */
      #banner-360x250 .floating-panel {
        font-family: Manrope Variable, Manrope, sans-serif;
        text-align: left;
        position: absolute;
        background-color: #343b4c;
        color: #fff;
        padding: 10px;
        border-radius: 5px;
        overflow-y: scroll;
        max-height: 170px;
        opacity: 0;
        -webkit-transform: translateY(5px);
        -ms-transform: translateY(5px);
        transform: translateY(5px);
        pointer-events: none;
        -webkit-transition: opacity 0.2s ease, -webkit-transform 0.2s ease;
        transition: opacity 0.2s ease, -webkit-transform 0.2s ease;
        -o-transition: opacity 0.2s ease, transform 0.2s ease;
        transition: opacity 0.2s ease, transform 0.2s ease;
        transition: opacity 0.2s ease, transform 0.2s ease,
          -webkit-transform 0.2s ease;
        bottom: 35px;
        right: 0;
        width: 320px;
        -webkit-box-sizing: border-box;
        box-sizing: border-box;
        -webkit-box-shadow: 0px 10px 30px -5px #315efb40;
        box-shadow: 0px 10px 30px -5px #315efb40;
      }

      #banner-360x250 .floating-panel &gt; a {
        color: #c1d8ff;
        text-decoration: none;
        word-break: break-all;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      /* открытие панели */
      #banner-360x250 .toggle-checkbox:checked ~ .floating-panel {
        opacity: 1;
        -webkit-transform: translateY(0);
        -ms-transform: translateY(0);
        transform: translateY(0);
        pointer-events: auto;
      }

      /* стилизация скроллбара */
      #banner-360x250 .floating-panel::-webkit-scrollbar {
        width: 5px;
      }

      #banner-360x250 .floating-panel::-webkit-scrollbar-thumb {
        background-color: #8d96b2;
        border-radius: 5px;
      }

      #banner-360x250 .floating-panel::-webkit-scrollbar-track {
        background: transparent;
      }

      /* Firefox */
      #banner-360x250 .floating-panel {
        scrollbar-width: thin;
        scrollbar-color: #8d96b2 transparent;
      }
