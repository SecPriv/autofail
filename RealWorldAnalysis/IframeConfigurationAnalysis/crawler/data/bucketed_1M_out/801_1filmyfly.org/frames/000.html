    function getBase64URLParameter(name) {
      var value = getURLParameter(name);

      try {
        return window.atob(value.replace(/-/g, '+').replace(/_/g, '/'));
      } catch {
        return value;
      }
    }


    function encodeUrlOnlyParamsV2(url) {
      let questionMarkIndex = url.indexOf("?");
      if (questionMarkIndex === -1) return url;

      let baseUrl = url.slice(0, questionMarkIndex);
      let queryString = url.slice(questionMarkIndex + 1);

      let params = new URLSearchParams(queryString);
      let encodedParams = new URLSearchParams();

      params.forEach((value, key) => {
        encodedParams.append(key, value);
      });

      return `${baseUrl}?${encodedParams.toString()}`;

    function replace_text(lang, text) {
  var x = document.getElementById(text);
  if (x) {
    x.innerHTML = translation[lang][text];
  } else {
    console.log("element not Found: " + text);
  }
}

function alert_string(lang, text) {
  return translation[lang][text] + "\n\n";
}

function translation_available(lang) {
  if (translation[lang]) {
    return lang;
  } else {
    console.log("translation not Found: " + lang);
    return "source";
  }
}

function detect_language() {
  var language = navigator.language || navigator.userLanguage;
  if (language.length > 4) {
    language = language[0] + language[1];
  }
  var rtlLanguages = ['ar', 'he', 'fa', 'ur'];
  if (rtlLanguages.indexOf(language) !== -1) {
    var i;
    var wrappers = document.querySelectorAll('.wrapper');
    for (i = 0; i < wrappers.length; i++) {
      wrappers[i].setAttribute('dir', 'RTL');
    }
    var topWrappers = document.querySelectorAll('.top_wrapper');
    for (i = 0; i < topWrappers.length; i++) {
      topWrappers[i].style.textAlign = 'right';
    }
    var buttons = document.querySelectorAll('.button');
    for (i = 0; i < buttons.length; i++) {
      buttons[i].style.padding = '0 20px 18px 20px';
    }
  }
  return translation_available(language);
}

function translate() {
  var language = detect_language();
  var y;
  for (y in translation["source"]) {
    if (Object.prototype.hasOwnProperty.call(translation["source"], y)) {
      replace_text(language, y);
      if (y == 'aler') {

      }
    }
  }
}

  );
