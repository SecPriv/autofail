      (function initClickDelayBlocking() {
        'use strict';

        const clickTimers = new Map();
        const overlays = new Map();

        function createOverlay(element, placementId) {
          const overlay = document.createElement('div');
          overlay.setAttribute('data-click-overlay', placementId);
          overlay.style.cssText =
            'position: absolute;' +
            'top: 0;' +
            'left: 0;' +
            'width: 100%;' +
            'height: 100%;' +
            'z-index: 999999;' +
            'background: transparent;' +
            'cursor: not-allowed;';

          const preventEvent = function (e) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            return false;
          };

          [
            'click',
            'mousedown',
            'mouseup',
            'contextmenu',
            'auxclick',
            'pointerdown',
          ].forEach(eventType => {
            overlay.addEventListener(eventType, preventEvent, true);
          });

          const computedStyle = window.getComputedStyle(element);
          if (computedStyle.position === 'static') {
            element.style.position = 'relative';
          }

          element.appendChild(overlay);
          return overlay;
        }

          const { placementId, clickDelay = 0 } = placement;

          if (!clickDelay || clickDelay <= 0) return;

          const element = document.querySelector(
            '[data-place-id="' + placementId + '"]'
          );

          if (!element) {
            console.warn(
              '[ClickDelay] Element with data-place-id="' + placementId + '" not found'
            );

            startTime: Date.now(),
            delay: clickDelay,
          });

          const overlay = createOverlay(element, placementId);
          overlays.set(placementId, overlay);

          setTimeout(() => {
            clickTimers.delete(placementId);

            if (overlay && overlay.parentNode) {

            }

          }, clickDelay);
