  line-height: 1.125em;
}

.react-calendar--doubleView {
  width: 700px;
}

.react-calendar--doubleView .react-calendar__viewContainer {
  display: flex;
  margin: -0.5em;
}

.react-calendar--doubleView .react-calendar__viewContainer > * {
  width: 50%;
  margin: 0.5em;
}

.react-calendar,
.react-calendar *,
.react-calendar *:before,
.react-calendar *:after {
  -moz-box-sizing: border-box;
  -webkit-box-sizing: border-box;
  box-sizing: border-box;
}

.react-calendar button {
  margin: 0;
  border: 0;
  outline: none;
}

.react-calendar button:enabled:hover {
  cursor: pointer;
}

.react-calendar__navigation {
  display: flex;
  height: 44px;
  margin-bottom: 1em;
}

.react-calendar__navigation button {
  min-width: 44px;
  background: none;
}

.react-calendar__navigation button:disabled {
  background-color: #f0f0f0;
}

.react-calendar__navigation button:enabled:hover,
.react-calendar__navigation button:enabled:focus {
  background-color: #e6e6e6;
}

.react-calendar__month-view__weekdays {
  text-align: center;
  text-transform: uppercase;
  font: inherit;
  font-size: 0.75em;
  font-weight: bold;
}

.react-calendar__month-view__weekdays__weekday {
  padding: 0.5em;
}

.react-calendar__month-view__weekNumbers .react-calendar__tile {
  display: flex;
  align-items: center;
  justify-content: center;
  font: inherit;
  font-size: 0.75em;
  font-weight: bold;
}

.react-calendar__month-view__days__day--weekend {
  color: #d10000;
}

.react-calendar__month-view__days__day--neighboringMonth,
.react-calendar__decade-view__years__year--neighboringDecade,
.react-calendar__century-view__decades__decade--neighboringCentury {
  color: #757575;
}

.react-calendar__year-view .react-calendar__tile,
.react-calendar__decade-view .react-calendar__tile,
.react-calendar__century-view .react-calendar__tile {
  padding: 2em 0.5em;
}

.react-calendar__tile {
  max-width: 100%;
  padding: 10px 6.6667px;
  background: none;
  text-align: center;
  line-height: 16px;
  font: inherit;
  font-size: 0.833em;
}

.react-calendar__tile:disabled {
  background-color: #f0f0f0;
  color: #ababab;
}

.react-calendar__month-view__days__day--neighboringMonth:disabled,
.react-calendar__decade-view__years__year--neighboringDecade:disabled,
.react-calendar__century-view__decades__decade--neighboringCentury:disabled {
  color: #cdcdcd;
}

.react-calendar__tile:enabled:hover,
.react-calendar__tile:enabled:focus {
  background-color: #e6e6e6;
}

.react-calendar__tile--now {
  background: #ffff76;
}

.react-calendar__tile--now:enabled:hover,
.react-calendar__tile--now:enabled:focus {

}

.react-calendar__tile--hasActive {

}

.react-calendar__tile--hasActive:enabled:hover,
.react-calendar__tile--hasActive:enabled:focus {

}

.react-calendar__tile--active {

}

.react-calendar__tile--active:enabled:hover,
.react-calendar__tile--active:enabled:focus {

}

.react-calendar--selectRange .react-calendar__tile--hover {

  width: 100%;
  border: none;

.react-calendar__month-view__days {
  border: 0.25px solid var(--booking-calendar-available-border-color);
  border-radius: 8px;
}

.react-calendar__month-view__days__day.react-calendar__tile:first-child {
  border-top-left-radius: 8px;
}

.react-calendar__month-view__days__day.react-calendar__tile:nth-child(7) {
  border-top-right-radius: 8px;
}

.react-calendar__month-view__days__day.react-calendar__tile:nth-child(36) {
  border-bottom-left-radius: 8px;
}

.react-calendar__month-view__days__day.react-calendar__tile:nth-child(42) {
  border-bottom-right-radius: 8px;
}

.react-calendar__month-view__days__day.react-calendar__tile {
  height: 42px;
  border: 0.25px solid var(--booking-calendar-available-border-color) !important;
  position: relative;
  background-color: var(--booking-calendar-available-background-color);
}

.react-calendar__month-view__days__day.react-calendar__tile:enabled:hover,
.react-calendar__tile--active:enabled:hover,
.react-calendar__tile--active {
  background: var(--booking-calendar-available-hover-background-color);
  border: 0.5px solid var(--booking-calendar-available-hover-border-color);
  color: var(--booking-calendar-available-hover-color);
}

.react-calendar__tile--active:enabled:focus {
  background: var(--booking-calendar-pressedState-background-color);
}

.react-calendar__month-view__days__day.react-calendar__tile--now {
  background: #FFFFFF;
  color: #171717;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.dot-today {
  width: 4px;
  height: 4px;
  background: var(--booking-calendar-today-dot-color);
  border-radius: 50%;
  margin-top: 4px;
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
}

.react-calendar__month-view__days__day.react-calendar__tile:disabled {
  background: var(--booking-calendar-disabled-background-color);
  border: 0.5px solid var(--booking-calendar-disabled-border-color);
  color: var(--booking-calendar-disabled-color);
  font-style: normal;
  font-weight: 400;
  font-size: 14px;
  line-height: 20px;
  text-decoration: line-through;
}

.react-calendar__month-view__days__day.react-calendar__tile:disabled abbr {
  color: var(--booking-calendar-disabled-color);
}

.react-calendar__month-view__days__day.react-calendar__tile--active {
  background: var(--booking-calendar-pressedState-background-color);
  border: 0.5px solid var(--booking-calendar-pressedState-border-color);
  color: var(--booking-calendar-pressedState-color);
}

.react-calendar__month-view__days__day.react-calendar__tile--active abbr {
  color: var(--booking-calendar-pressedState-color);
}

.react-calendar__month-view__days__day.react-calendar__tile--active:enabled:hover {
  background: var(--booking-calendar-pressedState-hover-background-color);
  border: 0.5px solid var(--booking-calendar-pressedState-hover-border-color);
  color: var(--booking-calendar-pressedState-hover-color);
}

.react-calendar__year-view__months__month.react-calendar__tile {
  height: 56px;
  width: 92px;
  border: 1px solid #E0E0E0;
  border-bottom: 0;
  border-left: 0;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.react-calendar__year-view__months {
  border: 1px solid #E0E0E0;
  border-top: 0;
  border-right: 0;
  border-radius: 8px;
}

.react-calendar__year-view__months__month.react-calendar__tile:first-child {
  border-top-left-radius: 8px;
}

.react-calendar__year-view__months__month.react-calendar__tile:nth-child(3) {
  border-top-right-radius: 8px;
}

.react-calendar__year-view__months__month.react-calendar__tile:nth-child(10) {
  border-bottom-left-radius: 8px;
}

.react-calendar__year-view__months__month.react-calendar__tile:nth-child(12) {
  border-bottom-right-radius: 8px;
}

.react-calendar__navigation {
  height: 24px;
}

.react-calendar__tile.react-calendar__tile--hasActive.react-calendar__year-view__months__month {
  background: #121212;
  color: #FFFFFF;
}

.react-calendar__tile.react-calendar__tile--now.react-calendar__year-view__months__month {
  background: #FFFFFF;
  color: #171717;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.react-calendar__tile.react-calendar__tile--now.react-calendar__year-view__months__month:hover {
  background: #E0E0E0;
}

.react-calendar__tile.react-calendar__tile--now.react-calendar__tile--hasActive.react-calendar__year-view__months__month {
  background: #121212;
  color: #FFFFFF;
}

.react-calendar__decade-view__years__year.react-calendar__tile {
  height: 56px;
  width: 92px;
  border: 0.25px solid #E0E0E0;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.react-calendar__tile.react-calendar__tile--hasActive.react-calendar__decade-view__years__year {
  background: #121212;
  color: #FFFFFF;
}

.react-calendar__tile.react-calendar__tile--now.react-calendar__decade-view__years__year {
  background: #FFFFFF;
  color: #171717;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.react-calendar__tile.react-calendar__tile--now.react-calendar__decade-view__years__year:hover {
  background: #E0E0E0;
}

.react-calendar__navigation button:disabled,
.react-calendar__navigation button:enabled:hover,
.react-calendar__navigation button:enabled:focus {
  background-color: transparent !important;
}

.react-calendar__month-view__days__day abbr {
  font-family: var(--booking-calendar-dates-font-family);
  font-size: var(--booking-calendar-dates-font-size);
  font-style: var(--booking-calendar-dates-font-style);
  line-height: var(--booking-calendar-dates-line-height);
  color: var(--booking-calendar-available-color);
}

.react-calendar__month-view__weekdays__weekday abbr {
  border-bottom: none !important;

  font-size: var(--booking-calendar-weekdays-font-size);
  font-style: var(--booking-calendar-weekdays-font-style);
  line-height: var(--booking-calendar-weekdays-line-height);
  color: var(--booking-calendar-weekdays-color);
}

.react-calendar__navigation__label__labelText.react-calendar__navigation__label__labelText--from {
  color: var(--booking-calendar-title-color);
  font-family: var(--booking-calendar-title-font-family);
  font-size: var(--booking-calendar-title-font-size);
  font-style: var(--booking-calendar-title-font-style);
  line-height: var(--booking-calendar-title-line-height);
}

.react-calendar__navigation__arrow:disabled > svg > path {
  fill: var(--booking-calendar-disabled-color);
