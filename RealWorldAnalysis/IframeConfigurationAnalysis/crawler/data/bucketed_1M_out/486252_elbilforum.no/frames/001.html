<style>
.fs-typewriter-overlay{position:absolute!important;z-index:80!important;pointer-events:none!important;overflow:visible!important;display:flex!important;align-items:center!important;justify-content:flex-start!important;text-align:left!important;font-family:"Roboto"!important;font-style:normal!important;font-weight:700!important;color:#b2ebf7!important;white-space:nowrap!important;line-height:1.1!important;letter-spacing:0!important;-webkit-font-smoothing:antialiased!important;text-rendering:optimizeLegibility!important}
.fs-typewriter-word{font-family:"Roboto"!important;font-style:normal!important;font-weight:700!important;color:#b2ebf7!important;display:inline-block!important;white-space:nowrap!important;letter-spacing:0!important}
.fs-typewriter-cursor{display:inline-block!important;width:3px!important;height:.85em!important;background:#ffffff!important;margin-left:2px!important;animation:fsBlink .75s step-end infinite!important;vertical-align:-.08em!important}
.fs-typewriter-cursor.typing{animation:none!important;opacity:1!important}
@keyframes fsBlink{0%,100%{opacity:1}50%{opacity:0}}
</style>
<script>
window.addEventListener("load", function () {
  const words = ["ladebrikke", "app", "Elbilforeningen"];
  const pauses = [1100, 1100, 2800];
  const wordEl = document.querySelector(".fs-typewriter-word");
  const cursorEl = document.querySelector(".fs-typewriter-cursor");
  if (!wordEl || !cursorEl) return;
  let i = 0, c = 0, deleting = false;
  function jitter(base, range) { return base + (Math.random() * range * 2 - range); }
  function tick() {
    const word = words[i];
    cursorEl.classList.add("typing");
    if (!deleting) {
      c++;
      wordEl.textContent = word.slice(0, c);
      if (c === word.length) {
        deleting = true;
        cursorEl.classList.remove("typing");
        setTimeout(tick, pauses[i]);
        return;
      }
      setTimeout(tick, jitter(45, 15));
    } else {
      c--;
      wordEl.textContent = word.slice(0, c);
      if (c === 0) {
        deleting = false;
        i = (i + 1) % words.length;
        cursorEl.classList.remove("typing");
        setTimeout(tick, 200);
        return;
      }
      setTimeout(tick, jitter(22, 8));
    }
  }
  tick();
});
</script>
