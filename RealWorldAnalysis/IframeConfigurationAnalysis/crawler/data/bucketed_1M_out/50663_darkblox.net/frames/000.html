<!DOCTYPE html><html lang="en" dir="ltr"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Just a moment...</title>

<style>:root {
    --color-bg-1: oklch(.15 .03 260);
    --color-bg-2: oklch(.1 .02 260);
    --color-bg-3: oklch(.05 .01 260);
    --color-accent-1: oklch(.65 .2 260);
    --color-accent-2: oklch(.7 .15 260);
    --color-text-1: oklch(.95 .01 260);
    --color-text-2: oklch(.75 .02 260);
    --color-text-3: oklch(.6 .03 260);
    --color-border: oklch(.25 .05 260/.4);
    --color-glow: oklch(.65 .25 260/.3);
    --color-error: oklch(.65 .2 20);
    --color-warning: oklch(.7 .15 50);
    --color-success: oklch(.65 .15 150);
    --radius-lg: min(30px,8vw);
    --radius-md: min(15px,4vw);
    --radius-sm: min(8px,2vw);
    --space-xs: clamp(6px,2vw,8px);
    --space-sm: clamp(10px,3vw,12px);
    --space-md: clamp(14px,4vw,18px);
    --space-lg: clamp(20px,6vw,30px);
    --space-xl: clamp(24px,8vw,40px);
}

/* Red theme - для блокировок и критических ошибок */
.theme-red {
    --color-accent-1: oklch(.68 .2 20);
    --color-accent-2: oklch(.72 .18 30);
    --color-border: oklch(.25 .05 20/.4);
    --color-glow: oklch(.68 .25 20/.3);
}

/* Orange theme - для предупреждений и недоступности */
.theme-orange {
    --color-accent-1: oklch(.7 .18 50);
    --color-accent-2: oklch(.75 .16 60);
    --color-border: oklch(.25 .05 50/.4);
    --color-glow: oklch(.7 .22 50/.3);
}

/* Blue theme - для проверок безопасности */
.theme-blue {
    --color-accent-1: oklch(.65 .18 240);
    --color-accent-2: oklch(.7 .15 250);
    --color-border: oklch(.25 .05 240/.4);
    --color-glow: oklch(.65 .22 240/.3);
}

*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at top, var(--color-bg-1) 0%, var(--color-bg-2) 50%, var(--color-bg-3) 100%);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--color-text-1);
    overflow-x: hidden;
    padding: var(--space-md);
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 50%, oklch(.6 .15 260/.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, oklch(.7 .1 260/.08) 0%, transparent 50%);
    animation: pulse 8s ease-in-out infinite;
    pointer-events: none;
}

@keyframes pulse {
    0%, 100% { opacity: .5; }
    50% { opacity: 1; }
}

.container {
    position: relative;
    width: 100%;
    max-width: min(520px, 100%);
    padding: var(--space-xl);
    background: oklch(.13 .025 260/.5);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: var(--radius-lg);
    box-shadow:
        0 25px 70px oklch(0 0 0/.9),
        inset 0 1px 0 oklch(1 0 0/.06);
    border: 2px solid transparent;
    background-clip: padding-box;
    animation: slideUp .8s ease-out;
}

.container::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: var(--radius-lg);
    padding: 2px;
    background: conic-gradient(
        from var(--angle, 0deg),
        var(--color-border) 0deg,
        var(--color-border) 60deg,
        var(--color-accent-1) 90deg,
        var(--color-accent-2) 120deg,
        var(--color-border) 150deg,
        var(--color-border) 360deg
    );
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: borderRotate 2.5s linear infinite;
    z-index: -1;
}

@property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
}

@keyframes borderRotate {
    to { --angle: 360deg; }
}

@keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1 {
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    font-weight: 700;
    margin-bottom: var(--space-md);
    background: linear-gradient(135deg, var(--color-accent-2) 0%, var(--color-accent-1) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -.8px;
    text-align: center;
    filter: drop-shadow(0 2px 12px var(--color-glow));
    animation: fadeIn .8s ease-out .3s both;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.description {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    line-height: 1.7;
    color: var(--color-text-2);
    margin-bottom: var(--space-lg);
    text-align: center;
    animation: fadeIn .8s ease-out .5s both;
}

.captcha-box {
    margin: var(--space-xl) 0;
    padding: var(--space-xl);
    background: oklch(.19 .04 260/.4);
    border-radius: var(--radius-md);
    border: 2px solid oklch(.65 .18 260/.2);
    min-height: clamp(100px, 25vw, 130px);
    box-shadow: inset 0 2px 15px oklch(0 0 0/.4);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    animation: fadeIn .8s ease-out .6s both;
}

.icon-box {
    margin: var(--space-xl) auto;
    width: clamp(100px, 25vw, 140px);
    height: clamp(100px, 25vw, 140px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: oklch(.19 .04 260/.35);
    border-radius: 50%;
    border: 3px solid oklch(.65 .2 260/.3);
    position: relative;
    animation: fadeIn .8s ease-out .4s both, iconFloat 3s ease-in-out infinite;
}

.icon-box::before {
    content: '';
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--color-glow) 0%, transparent 70%);
    z-index: -1;
    animation: pulse 2s ease-in-out infinite;
}

@keyframes iconFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.icon-box svg {
    width: 55%;
    height: 55%;
    fill: none;
    stroke: var(--color-accent-1);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 2px 8px var(--color-glow));
}

.info {
    margin-top: var(--space-xl);
    padding: var(--space-lg);
    background: oklch(.19 .04 260/.45);
    border-radius: var(--radius-md);
    border: 1px solid oklch(.65 .18 260/.25);
    box-shadow: 0 4px 20px oklch(0 0 0/.3);
    animation: fadeIn .8s ease-out .7s both;
}

.info-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-sm) 0;
    font-size: clamp(.9rem, 2.8vw, .95rem);
    gap: var(--space-md);
}

.info-item:not(:last-child) {
    border-bottom: 1px solid oklch(1 0 0/.06);
    padding-bottom: var(--space-sm);
    margin-bottom: var(--space-sm);
}

.info-label {
    color: var(--color-text-3);
    font-weight: 500;
}

.info-value {
    color: var(--color-accent-1);
    font-family: 'Courier New', Monaco, monospace;
    font-size: clamp(.82rem, 2.5vw, .88rem);
    background: oklch(.22 .05 260/.5);
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid oklch(.65 .18 260/.25);
    word-break: break-all;
    box-shadow: 0 2px 8px oklch(0 0 0/.2);
}

.error-code {
    display: block;
    font-family: 'Courier New', Monaco, monospace;
    font-size: clamp(3rem, 8vw, 4.5rem);
    font-weight: 800;
    color: var(--color-accent-1);
    margin: 0 auto var(--space-md);
    text-align: center;
    letter-spacing: .1em;
    opacity: .15;
    line-height: 1;
    position: relative;
    animation: fadeIn .8s ease-out .2s both;
}

.warning-box {
    margin: var(--space-lg) 0;
    padding: var(--space-md);
    background: oklch(.7 .15 50/.1);
    border-radius: var(--radius-md);
    border-left: 4px solid var(--color-warning);
    animation: fadeIn .8s ease-out .6s both;
}

.warning-box p {
    color: var(--color-text-2);
    font-size: clamp(.85rem, 2.5vw, .95rem);
    line-height: 1.5;
}

.status-indicator {
    display: inline-flex;
    align-items: center;
    gap: var(--space-xs);
    padding: var(--space-xs) var(--space-sm);
    background: oklch(.65 .15 260/.1);
    border-radius: var(--radius-sm);
    font-size: clamp(.8rem, 2.5vw, .85rem);
    animation: fadeIn .8s ease-out .5s both;
}

.status-indicator::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-error);
    animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: .3; }
}

.progress-bar {
    width: 100%;
    height: 6px;
    background: oklch(.2 .03 260/.5);
    border-radius: 3px;
    overflow: hidden;
    margin: var(--space-lg) 0;
    box-shadow: inset 0 1px 4px oklch(0 0 0/.3);
}

.progress-bar::before {
    content: '';
    display: block;
    height: 100%;
    background: linear-gradient(90deg, var(--color-accent-1), var(--color-accent-2), var(--color-accent-1));
    background-size: 200% 100%;
    box-shadow: 0 0 12px var(--color-glow);
    animation: progress 2s ease-in-out infinite;
}

@keyframes progress {
    0% { width: 0%; transform: translateX(0); }
    50% { width: 100%; transform: translateX(0); }
    100% { width: 100%; transform: translateX(100%); }
}

@media (max-width: 480px) {
    body { padding: var(--space-sm); }
    .container { padding: var(--space-lg) var(--space-md); }
    .info-item {
        flex-direction: column;
        align-items: flex-start;
        gap: var(--space-xs);
    }
    .info-value {
        width: 100%;
        text-align: center;
    }
}

@media (hover: none) and (pointer: coarse) {
    .captcha-box {
        min-height: clamp(80px, 25vw, 100px);
        padding: var(--space-xl);
    }
}

@media (max-height: 500px) and (orientation: landscape) {
    body {
        align-items: flex-start;
        padding-top: var(--space-lg);
    }
    .container { padding: var(--space-md); }
    .icon-box {
        width: 60px;
        height: 60px;
    }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
    }
}

@media (prefers-contrast: high) {
    :root {
        --color-border: oklch(.9 .05 260);
        --color-text-2: oklch(.9 .05 260);
    }
}

@media (min-width: 481px) and (max-width: 768px) {
    .container { max-width: 90%; }
}

@media (min-width: 769px) {
    .container { max-width: 480px; }
}
