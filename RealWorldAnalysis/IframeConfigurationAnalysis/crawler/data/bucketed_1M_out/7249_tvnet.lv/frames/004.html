</head><body><div id="id_6a118a56e357c" class="header-container mob">
    <a href="https://sports.tvnet.lv/section/6599" class="main-url" target="_top"></a>

    <div class="header-content">
        <div class="parts left-part">
            <div class="header-buttons" style="display: flex;">
                                    <a href="https://sports.tvnet.lv/section/6600" target="_top">Kalendārs</a>
                                    <a href="https://sports.tvnet.lv/section/6601" target="_top">Tabulas</a>
                                    <a href="https://sports.tvnet.lv/section/6602" target="_top">Statistika</a>
                                    <a href="https://sports.tvnet.lv/8468370/latvijas-hokeja-izlases-sastavs-pasaules-cempionata" target="_top">LAT Izlase</a>
                            </div>
        </div>
    </div>
</div>


<script>

setTimeout(function() {

    const parentElement = document.getElementById('id_6a118a56e357c');
    const rootElement = parentElement.closest('.root');
    const headerButtons = parentElement.querySelector('.header-buttons');

    var buttons_html = '';
    var givenCurrentTime, givenEndTime, intervalId;

    if (rootElement) {
        rootElement.classList.add('structured-content__group');
    }

    function updateCountdown() {
        let timeDiff = givenEndTime - givenCurrentTime;

        if (timeDiff - 60000 <= 0) {
            clearInterval(intervalId);
            headerButtons.innerHTML = buttons_html;
            parentElement.classList.remove('countdown-active');
            return;
        }

        let totalMinutes = Math.floor(timeDiff / 60000);
        let days = Math.floor(totalMinutes / (24 * 60));
        let hours = Math.floor((totalMinutes % (24 * 60)) / 60);
        let minutes = totalMinutes % 60;

        parentElement.querySelector('.days').innerHTML = String(days).padStart(2, '0');
        parentElement.querySelector('.hours').innerHTML = String(hours).padStart(2, '0');
        parentElement.querySelector('.minutes').innerHTML = String(minutes).padStart(2, '0');

        givenCurrentTime.setMinutes(givenCurrentTime.getMinutes() + 1);
    }

    function setCountdown(showCountdown = false) {

        if (!showCountdown) {
            headerButtons.style.display = 'flex';
            return;
        }

        let countdown_html = '<div class="countdown-timer"><div><span class="days">00</span><br>dienas</div><div><span>:</span></div><div><span class="hours">00</span><br>stundas</div><div><span>:</span></div><div><span class="minutes">00</span><br>minūtes</div></div>';

        buttons_html = headerButtons.innerHTML;
        headerButtons.innerHTML = countdown_html;
        parentElement.classList.add('countdown-active');

        updateCountdown();
        intervalId = setInterval(updateCountdown, 60000);

        headerButtons.style.display = 'flex';
    }

    givenEndTime = new Date("2026-05-15T14:20:00Z");

    fetch('https://export.tvnet.lv/time?'+Math.random())
        .then(res => res.text())
        .then(data => {
            givenCurrentTime = new Date(data);
            setCountdown(givenEndTime > givenCurrentTime);
        });

}, 100);

</script>
</body></html>
