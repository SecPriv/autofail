  window.addEventListener('DOMContentLoaded', async () => {
    const slug = window.location.pathname.split('/')[1];
    if (!slug) return;

    try {
      const db = firebase.firestore();
      const querySnapshot = await db.collection("lojas").where("link", "==", slug).get();

      if (querySnapshot.empty) return;

      const loja = querySnapshot.docs[0].data();
      const urlLogo = loja.urlLogo ?? "";
      if (urlLogo.trim() === "") return; /* usa o favicon padrão do HTML */

      const link = document.createElement('link');
      link.rel = 'icon';
      link.type = 'image/png';
      link.href = urlLogo;

      /* Substitui o favicon atual apenas se for usar outro */
      document.querySelectorAll('link[rel="icon"]').forEach(el => el.remove());
      document.head.appendChild(link);

    } catch (err) {
      console.error("Erro ao tentar carregar favicon dinâmico:", err);
    }
  });

  </script>

  <script>
    // 1) load: força reflow + repaint e garante visibilidade do glass-pane
    window.addEventListener('load', () => {
      const gp = document.querySelector('flt-glass-pane, #flt-glass-pane');
      if (gp) gp.style.opacity = '1';

      // reflow
      document.body.offsetHeight;

      // repaint
      requestAnimationFrame(() => {
        window.dispatchEvent(new Event('resize'));
      });
    });

    // 2) quando a aba voltar a ficar visível (ex.: abriu via link externo)
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        window.dispatchEvent(new Event('resize'));
      }
    });

    // 3) pageshow cobre restore do bfcache em alguns browsers
    window.addEventListener('pageshow', () => {
      window.dispatchEvent(new Event('resize'));
    });
  </script>
