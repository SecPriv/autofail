<!DOCTYPE html><html lang="es"><head>

    <style>
        /* Tu estilo CSS sigue aquí, sin cambios */
        @font-face {
            font-family: 'HelveticaRounded';
            src: url('fonts/HelveticaRoundedLTStd-Bd.ttf') format('truetype');
            font-weight: bold;
        }

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #fff7eb;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
        }

        /* Main content ocupa todo el espacio disponible */
        .main-content {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }

        /* HEADER */
        header {
            width: 100%;
            height: 100px;
            background-color: #ff7a00;
            display: flex;
            justify-content: center;
            padding: 5px 0;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        header img {
            width: 120px;
            position: relative;
            top: 1.2cm;
            z-index: 5;
        }

        /* CONTENIDO */
        .main-content {
            min-height: calc(100vh - 100px - 35px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 60px;
        }

        /* TEXTO */
        .welcome-text {
            text-align: center;
            margin: 20px 0;
        }

        .welcome-text h1 {
            font-size: 14px;
            color: #0052a5;
            font-weight: bold;
        }

        .welcome-text h2 {
            font-size: 32px;
            color: #ff7a00;
            font-weight: 900;
        }

        /* CONTENEDOR */
        .countries {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px 20px;
        }

        /* TARJETA */
        .country-card {
            background-color: #fff;
            border-radius: 20px;
            width: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .country-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        /* NOMBRE */
        .country-card .name {
            text-align: center;
            padding: 10px 0;
            font-size: 18px;
            font-weight: bold;
            color: #0052a5;
        }

        /* IMAGEN */
        .image-wrapper {
            position: relative;
            width: 100%;
            height: 170px;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .image-wrapper img.main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        /* BANDERA */
        .image-wrapper img.flag {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #fff;
            background: #fff;
            z-index: 10;
        }

        /* BOTONES */
        .button-wrapper {
            margin-top: 35px;
            text-align: center;
        }

        .country-button-img {
            width: 160px;
            max-width: 100%;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .country-button-img:hover {
            transform: scale(1.03);
        }

        /* Mobile */
        @media (max-width: 480px) {
            .button-wrapper {
                margin-top: 25px;
            }

            .country-button-img {
                width: 140px;
            }
        }

        /* FOOTER */
        footer {
            width: 100%;
            height: 35px;
            background-color: #0052a5;
            margin-top: auto;
        }

    </style>
</head>
