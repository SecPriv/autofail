</style><script src="https://pagead2.googlesyndication.com/pagead/managed/js/adsense/m202605190101/show_ads_impl_fy2021.js"></script><script>
function createHearts(target) {
    const count = 20; // რამდენი პატარა გულები
    const colors = ['#ff3860','#ff6b6b','#ff8c42','#ffcd3c','#ff6f91','#ff9cee','#ff4d6d'];

    for (let i = 0; i < count; i++) {
        const heart = document.createElement('span');
        heart.classList.add('heart-effect');
        heart.innerText = '❤';

        // შემთხვევითი ფერი
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];

        // შემთხვევითი მიმართულება
        const x1 = (Math.random() * 100 - 50) + 'px';
        const y1 = (-Math.random() * 80 - 20) + 'px';
        const x2 = (Math.random() * 150 - 75) + 'px';
        const y2 = (-Math.random() * 150 - 50) + 'px';

        heart.style.setProperty('--x1', x1);
        heart.style.setProperty('--y1', y1);
        heart.style.setProperty('--x2', x2);
        heart.style.setProperty('--y2', y2);

        // შემთხვევითი ზომა
        const scale = (Math.random() * 0.5 + 0.8).toFixed(2);
        heart.style.setProperty('--scale', scale);

        target.appendChild(heart);

        // წაშლა ანიმაციის დასრულების შემდეგ
        heart.addEventListener('animationend', () => heart.remove());
    }
}

// ავტომატურად ეფექტი ყველა ახალ "auto-heart" ელემენტზე
document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.heart.auto-heart').forEach(el => {
        createHearts(el);
        // ეფექტი ერთხელ შესრულებულად ნიშნად
        el.classList.remove('auto-heart');
    });
});

// თუ გინდა ასევე კლიკზეც გამოსულიყო, შენთვის დარჩება
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('heart')) {
        createHearts(e.target);
    }
});
</script>
