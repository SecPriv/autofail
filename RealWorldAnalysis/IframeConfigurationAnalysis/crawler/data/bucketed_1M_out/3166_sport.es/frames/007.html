<script>
const sliders = document.querySelectorAll(".carousel__slider");
const validSliders = [];

sliders.forEach((slider) => {
  const href = slider.getAttribute("href");
  const imgs = slider.querySelectorAll("img");
  let allImagesLoaded = true;

  if (!href?.trim() || [...imgs].every((img) => !img.src.trim())) {
    slider.style.display = "none";
  } else {
    imgs.forEach((img) => {
      img.onload = img.onerror = () => {
        if (!img.complete || img.naturalWidth === 0) {
          slider.style.display = "none";
          allImagesLoaded = false;
        }
        if (allImagesLoaded) {
          validSliders.push(slider);
          slider.style.display = "block";
        }
      };
    });
  }
});

let idx = 0;

const showSlider = () => {
  validSliders.forEach((slider, i) => {
    slider.style.display = i === idx ? "block" : "none";
  });
};

const autoplay = () => {
  if (validSliders.length > 0) {
    showSlider();
    idx = (idx + 1) % validSliders.length;
  }
  setTimeout(autoplay, 2000);
};

autoplay();
</script>
