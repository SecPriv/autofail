  body {
    font-family: 'Inter', Arial, sans-serif;
    font-size: 16px;
  }
	.body {
    border-bottom: 1px solid #ddd;
    padding-bottom: 6px;
    padding-left: 8px;
    padding-right: 8px;
  }
  .body a {
    color: #777;
    font-size: 11px;
    line-height: 1.4;
    text-decoration: none;
  }
  .article-card{
    margin-top: 20px;
    position: relative;
    background-color: #f2f2f2;
    padding: 18px 12px 35px 12px;
  }
  .sponsor{
    position: absolute;
    margin: 0;
    top: -20px;
    right: 0;
  }
  figure{
    margin:0;
    padding:0;
    width:100%;
  }
  .sponsor,.sponsor a {
    background-color: #FFF;
    padding-left: 1px;
    color: #666;
    font-size: 11px;
    font-family: sans-serif;
    text-decoration:none;
    line-height:20px;
    display:flex;
    letter-spacing:0.4px;
    height:20px;
    top: -20px;
    z-index: 9999999
  }
  .sponsor img{
    max-height:20px;
    padding-left:6px;
  }
  .sponsor:before {
    content: "";
    position: absolute;
    right: 1rem;
    top: 20px;
    width: 0;
    height: 0;
    border-top: 10px solid white;
    border-right: 25px solid transparent;
    filter: drop-shadow(0px 2px 0px rgba(0, 0, 0, 0.05));
  }
 	.article-card .sponsor.no-sponsor,
  .article-card .sponsor.no-sponsor:before {
      display: none !important;
      content: none !important;
    	visibility: hidden !important;
  }
  .attribution:hover {
    color: #666;
  }
  .title {
    position: relative;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: normal;
    line-height: 20px;
    display: block;
  }
  .title a {
    color: #161616;
    text-decoration: none;
    display: block;
  }
  .image {
    display: flex;
    width: 100%;
  }
  .image img {
    width: 100%;
    height: 100%;
    object-fit:cover;
    aspect-ratio:16/9;
  }
  .image .image-link {
    height: 100%;
    width: 100%;
  }
  .advertiser {
    padding-bottom:4px;
    padding-top: 11px;
  }   
  .advertiser a {
    color: #666;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:normal;
    font-size:12px;
    letter-spacing: .5px;
    text-decoration:none;
  } 

  /* mobile */

  #adunit.mobile{
    padding-bottom:35px;
    border-bottom:1px solid #ccc;
    margin-bottom:20px;
  }
  .article-card.mobile{
    background-color: unset;
    padding: 0px;
  }
  .title.mobile{
    font-size: 18px;
  }
