    function onLoadScript() {
      fill();
      saveCookieAffiliate();

    }

    function onIframe() {
      const trustedDomains = ["premierbetzone.com", "premierbetzone.co.ao", "guineegameszone.com", "premierbetzone.co.tz", "mercurybetzone.com", "ogabetzone.com", "sbazone.com"];

      const isStatic = window.location.pathname === '/static-start-page.html';
      const targetOrigin = trustedDomains.find((domain) => window.location.ancestorOrigins?.contains(`https://${domain}`));

      if (!isStatic || !targetOrigin) return;
      window.top?.postMessage("hideIframeOnAtlasBack", `https://${targetOrigin}`);
    }

    function fill() {
      try {
        const language = fetchLanguage();
        fillTexts(language);
      } catch (err) {
        fillTexts("EN");
      }
    }

    function saveCookieAffiliate() {
      const affiliateId = getParameterByName('AffiliateID');
      if (affiliateId) {
        createCookie('netReferAffiliateId', affiliateId, 360);
      }
    }

    function autoRedirectToBrandPage() {
      const countryCode = getParameterByName('CountryCode');
      const affiliateId = getParameterByName('AffiliateID');
      redirectToBrandPage(countryCode, affiliateId);
    }

    function getParameterByName(name, url = window.location.href) {
      name = name.replace(/[\[\]]/g, '\\$&');
      var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
        results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }

      for (var i = 0; i < a.length; i++) {
        a[i].innerHTML = COMING_SOON_TEXTS[language];
      }
      var b = document.getElementsByClassName("new-brand");
      for (var j = 0; j < b.length; j++) {
        b[j].innerHTML = NEW_TEXTS[language];
      }
    }

    function fillLanguages(language) {
      document.getElementById('selected-language').innerHTML = LANGS[language];
      var html = '';
      for (var key in LANGS) {
        if (key == language) {
          continue;
        }
        if (LANGS.hasOwnProperty(key)) {
          html += '<div class="option" onclick="changeLanguage(\'' + key + '\')">' + LANGS[key] + '</div>';
        }
      }
      document.getElementById('other-languages').innerHTML = html;
    }

    function changeLanguage(language) {
      let cookieValue = '';
      switch (language) {
        case 'EN': cookieValue = 'en_US'; break;
        case 'FR': cookieValue = 'fr_FR'; break;
        case 'PT': cookieValue = 'pt_PT'; break;
        default: cookieValue = 'en_US'; break;
      }
      createCookie("Language", cookieValue, 120);
      const dropdown = document.getElementById('other-languages');
      dropdown.classList.add('hide');
      fill();
    }

    function fetchLanguage() {
      const cookieValue = getCookie("Language");
      if (cookieValue == "") {
        return "EN";
      }
      const languageCode = cookieValue.split("_")[0];
      return languageCode.toUpperCase();
    }

    function createCookie(name, value, days) {
      let expires = "";
      if (days) {
        const date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = "; expires=" + date.toGMTString();
      }
      document.cookie = name + "=" + value + expires + "; path=/";
    }

    function getCookie(cname) {
      const name = cname + "=";
      const ca = document.cookie.split(';');
      for (var i = 0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') c = c.substring(1);
        if (c.indexOf(name) == 0) {
          return c.substring(name.length, c.length);
        }
      }
      return "";
    }

    function navigate(me) {
      const selectedCountry = me.dataset['context'];
      const affiliateId = getCookieByName('netReferAffiliateId');
      redirectToBrandPage(selectedCountry, affiliateId);
    }

    function getCookieByName(name) {
      var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      if (match) return match[2];
    }

    function redirectToBrandPage(selectedCountry, affiliateId) {
      if (selectedCountry) {
        createCookie('countryCode', selectedCountry.toUpperCase(), 120);

        let mobileAppUrl = "";
	const ua = navigator.userAgent.toLowerCase();
	const isWebView = ua.includes("wv");
        
	if (isWebView) {
          mobileAppUrl = "mobile-platform/";
        }

        if (affiliateId && ['ug', 'ng', 'sl', 'tz', 'gn', 'et'].indexOf(selectedCountry) > -1) {
          mobileAppUrl += "?affiliateId=" + affiliateId;
        }
        switch (selectedCountry) {
          case 'ug':
            location.href = 'https://sbazone.com/' + mobileAppUrl;
            break;
          case 'ng':
            location.href = 'https://ogabetzone.com/' + mobileAppUrl;
            break;
          case 'sl':
            location.href = 'https://mercurybetzone.com/' + mobileAppUrl;
            break;
          case 'tz':
            location.href = 'https://premierbetzone.co.tz/' + mobileAppUrl;
            break;
          case 'gn':
            location.href = 'https://guineegameszone.com/' + mobileAppUrl;
            break;
          case 'ao':
            location.href = 'https://premierbetzone.co.ao/' + mobileAppUrl;
            break;
          case 'et':
            location.href = 'https://bluenilebet.com/' + mobileAppUrl;
            break;
          default:
            location.href = 'https://premierbetzone.com/' + mobileAppUrl + selectedCountry + '/';
            break;
        }
      }
    }
