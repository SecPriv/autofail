            document.addEventListener('DOMContentLoaded', function() {
                function setSmoothPlaybackRate(video, targetRate) {
                    if (!video) return;
                    // Đảm bảo video đã có thể thay đổi playbackRate
                    video.addEventListener('canplay', function adjust() {
                        // Giảm tốc độ từ từ để mắt người cảm nhận mượt mà hơn
                        let currentRate = video.playbackRate;
                        let steps = 10;
                        let step = (currentRate - targetRate) / steps;
                        let i = 0;
                        function smoothChange() {
                            if (Math.abs(video.playbackRate - targetRate) > 0.01 && i < steps) {
                                video.playbackRate -= step;
                                i++;
                                requestAnimationFrame(smoothChange);
                            } else {
                                video.playbackRate = targetRate;
                            }
                        }
                        smoothChange();
                        video.removeEventListener('canplay', adjust);
                    });
                    // fallback nếu video đã sẵn sàng
                    if (video.readyState >= 3) {
                        video.playbackRate = targetRate;
                    }
                }
