%2C244%2C242%2C239%2C255%2C250%2C252%2C249%2C256%2C253%2C248%2C254%2C251%2C247%2C294" async=""></script><script src="https://connect.facebook.net/signals/config/757373523881580?v=2.9.325&amp;r=stable&amp;domain=www.alibaba.com&amp;hme=af8aa31887db259becaf70277daef60bd8bc35c2df82c2acd4258de27ecac4b5&amp;ex_m=104%2C207%2C155%2C22%2C72%2C73%2C146%2C68%2C67%2C11%2C164%2C90%2C16%2C138%2C127%2C39%2C75%2C78%2C134%2C160%2C166%2C8%2C4%2C5%2C7%2C6%2C3%2C91%2C101%2C167%2C172%2C221%2C62%2C188%2C189%2C55%2C279%2C30%2C74%2C233%2C232%2C231%2C23%2C33%2C103%2C61%2C10%2C63%2C97%2C98%2C99%2C105%2C130%2C31%2C29%2C132%2C133%2C129%2C128%2C156%2C76%2C159%2C157%2C158%2C50%2C60%2C123%2C15%2C163%2C45%2C266%2C267%2C265%2C26%2C27%2C28%2C48%2C147%2C77%2C112%2C18%2C20%2C44%2C40%2C42%2C41%2C83%2C92%2C96%2C110%2C145%2C148%2C46%2C111%2C24%2C21%2C119%2C69%2C36%2C150%2C149%2C151%2C142%2C140%2C25%2C35%2C59%2C109%2C162%2C70%2C17%2C153%2C114%2C81%2C66%2C19%2C85%2C86%2C116%2C84%2C136%2C135%2C139%2C161%2C34%2C281%2C297%2C214%2C203%2C204%2C202%2C300%2C291%2C52%2C215%2C107%2C131%2C80%2C121%2C54%2C47%2C49%2C113%2C120%2C126%2C125%2C58%2C64%2C152%2C115%2C37%2C32%2C53%2C56%2C100%2C165%2C1%2C124%2C14%2C122%2C12%2C2%2C57%2C93%2C65%2C118%2C89%2C88%2C168%2C169%2C94%2C95%2C9%2C102%2C51%2C143%2C87%2C79%2C71%2C117%2C106%2C43%2C144%2C0%2C82%2C137%2C141%2C154%2C38%2C108%2C13%2C170" async=""></script><script async="" src="https://connect.facebook.net/en_US/fbevents.js"></script><script async="" src="https://tags.creativecdn.com/MeMnnO3Z4y1ZJNJMYuRf.js"></script><script>
    (function(window, document) {
        var PixelBeacon = {},
            SEMR = {
                _bindEvent: function(node, event, fn) {
                    if (node.addEventListener) {
                        node.addEventListener(event, fn, false);
                    } else if (node.attachEvent) {
                        node.attachEvent('on' + event, fn);
                    }
                },
                _getParentHost: function() {
                    return document.referrer.match(/^(https|http)?:\/\/(([^\:\/]+\.)?(alibaba|alicdn|activities)\.com)(\:\d+)?/i)[0];
                },
                _isEmptyObject: function(o) {
                    for (var k in o) {
                        return false;
                    }

                    return true;
                },
                _log: function(content) {
                    if (window.console && window.console.log) {
                        window.console.log(content);
                    }

                    if (window.parent.postMessage) {
                        window.parent.postMessage('error:' + content, SEMR._getParentHost());
                    }
                },
                _send: function(event) {
                    var host = SEMR._getParentHost();

                    if (!event.data || event.origin != host) {
                        return false;
                    }

                    var data = JSON.parse(event.data),
                        div = document.createElement('div'),
                        head = document.getElementsByTagName('head')[0],
                        d, html, scripts, script, scriptLink, result;

                    data = [].concat(data);

                    for (var i = 0, dl = data.length; i < dl; i++) {
                        d = data[i];

                        if (d && !SEMR._isEmptyObject(d)) {
                            result = 1;

                            // TIP: 因服务器返回数据经过安全宏处理（主要是对 HTML 字符转义），为保持数据一致，这里需要将 & 、 " 、 ' 三个字符还原。
                            html = d.config ? d.config.replace(/&amp;/g, '&').replace(/&quot;/g, '\\\"').replace(/&#39;/g, '\\\'') : '';

                            div.innerHTML = html;
                            scripts = div.getElementsByTagName('script');

                            for (var j = 0, sl = scripts.length; j < sl; j++) {
                                script = scripts[j];

                                if (script.hasAttribute('src')) {
                                    scriptLink = document.createElement('script');
                                    scriptLink.src = script.getAttribute('src');
                                    head.appendChild(scriptLink);
                                } else {
                                    try {
                                        eval(script.innerHTML);
                                    } catch (err) {
                                        result = 0;
                                        SEMR._log('SEMRSE-02-02-' + d.channelName + '-' + j);
                                    }
                                }
                            }

                            PixelBeacon[d.channelName] = result;
                        }
                    }

                    var pixelBeacon = SEMR._toQueryString(PixelBeacon, '|');

                    event.source.postMessage('complete:' + pixelBeacon, host);
                },
                _toQueryString: function(p, s) {
                    var k, v, r = [];

                    if (!p) {
                        return '';
                    }

                    for (k in p) {
                        v = p[k] || '';
                        r.push(encodeURIComponent(k) + '=' + encodeURIComponent(v));
                    }

                    return r.join(s || '&');
                },
                sendByImage: function(u) {
                    var t = new Date() * 1 + '' + Math.ceil(Math.random() * 100000),
                        n = 'sem-remarketing-' + t,
                        i = window[n] = new Image();

                    i.onload = i.onerror = function() {
                        window[n] = null;
                        this.onload = this.onerror = null;
                    };

                    i.src = u + '&_t=' + t;
                }
            };

        try {
            if (window.parent.postMessage) {
                SEMR._bindEvent(window, 'message', SEMR._send);
                window.parent.postMessage('ready:', SEMR._getParentHost());
            } else {
                SEMR._log('SEMRSE-02-01');
            }
        } catch (err) {
            SEMR._log('SEMRSE-02-00');
        }
    })(window, document);
</script>
