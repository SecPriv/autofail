var ipv6="";   

// Fonction pour expandre une IPv6 raccourcie en format complet
function expandIPv6(ip) {
  // Si pas de ::, c'est déjà complet ou presque
  if (!ip.includes('::')) {
    // Juste padder chaque segment à 4 caractères
    return ip.split(':').map(seg => seg.padStart(4, '0')).join(':');
  }
  
  // Séparer avant et après ::
  const parts = ip.split('::');
  const left = parts[0] ? parts[0].split(':') : [];
  const right = parts[1] ? parts[1].split(':') : [];
  
  // Calculer combien de segments manquent (IPv6 = 8 segments)
  const missing = 8 - left.length - right.length;
  
  // Créer les segments manquants (tous à 0000)
  const middle = Array(missing).fill('0000');
  
  // Assembler tout
  const allSegments = [...left, ...middle, ...right];
  
  // Padder chaque segment à 4 caractères avec des zéros
  return allSegments.map(seg => seg.padStart(4, '0')).join(':');
}
