<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd"><html xmlns="http://www.w3.org/1999/xhtml" xml:lang="ja" lang="ja"><head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>拍手</title>
</head>
<body>
<script type="text/javascript" src="https://parts.blog.livedoor.jp/js/jquery-3.7.1.min.js"></script>
<script>
(function($) {
  $(window).on('message', function(event) {
    if (event.originalEvent.origin != "https://ponpokonwes.com") { return; }
    var articleIds = event.originalEvent.data;
    $.ajax({
      url: './articles_clap',
      method: 'GET',
      cache: false,
      dataType: 'json',
      data: {
        blog_id: "5972560",
        article_id: articleIds,
      },
    }).done(function(data) {
      window.parent.postMessage(JSON.stringify(data.clap_count || {}), '*');
    });
  });
})(jQuery);
</script>


</body></html>
