            var number = '';
            var cutlen = 3;
            var comma = ',';
            var i;

            data = data + '';
            var sign = data.match(/^[\+\-]/);
            if(sign) {
                data = data.replace(/^[\+\-]/, "");
            }

            len = data.length;
            mod = (len % cutlen);
            k = cutlen - mod;
            for (i=0; i<data.length; i++) {
                number = number + data.charAt(i);
                if (i < data.length - 1) {
                    k++;
                    if ((k % cutlen) == 0) {
                        number = number + comma;
                        k = 0;
                    }
                }
            }

            if(sign != null)
                number = sign+number;

            return number;
        }

        var bannerShuffle = function() {
            var $bannerContainer = $("#bannerContainer");

            bannerData.sort(function() {
                return Math.random() - 0.5;
            });

            var html = '';
            $.each(bannerData, function(k, v) {
                html += `
                <div class="bannerBox">
                    <a href="${v.link}" target="_blank">
                        <img class="bannerBoxCoupangLogo" src="https://contents.bebee.com/companies/kr/coupang/avatar-VG4gW.png" />

                        <img class="productImg" src="${v.thumbnail_img}">`;

                //로켓 배송 뱃지 추가
                if(v.is_rocket) {
                    html += `<img class="rocketIcon" src="https://image6.coupangcdn.com/image/cmg/icon/ios/logo_rocket_large@3x.png"/>`;
                }

                var price = numberFormat(v.price) + "원";

                html += `
                        <div class="productLayer"></div>
                        <div class="productDesc"><span>${price}</span></div>
                    </a>
                </div>`;
            });

            $bannerContainer.html(html);
            bannerSizeRefresh();
        };

        var bannerSizeRefresh = function() {
            var bannerBoxSize;
            var bannerCount = 0;

            if(Math.abs(window.innerWidth - window.innerHeight) <= 50) {
                //가로와 세로 사이즈가 동일할 경우
                bannerBoxSize = {
                    width:  window.innerWidth + "px",
                    height: window.innerHeight + "px",
                    float:  "",
                    'border-right': '',
                    'border-bottom': ''
                };

                bannerCount = 1;
            } else if(window.innerHeight > window.innerWidth) {
                //세로가 가로보다 클 경우
                bannerBoxSize = {
                    width:  window.innerWidth + "px",
                    height: ((window.innerHeight / Math.ceil(window.innerHeight / window.innerWidth)) - 1) + "px",
                    float:  "",
                    'border-right': '',
                    'border-bottom': '1px solid gray'
                };

                var bannerTotalHeightSize = $(".bannerBox .productImg").length * (window.innerHeight / Math.ceil(window.innerHeight / window.innerWidth));
                $("#bannerContainer").css("padding-top", window.innerHeight > bannerTotalHeightSize ? (window.innerHeight - bannerTotalHeightSize) / 2 + "px" : "0px");

                bannerCount = parseInt(window.innerHeight / (window.innerHeight / Math.ceil(window.innerHeight / window.innerWidth)));
            } else {
                //가로가 세로보다 클 경우
                bannerBoxSize = {
                    width: ((window.innerWidth / Math.ceil(window.innerWidth / window.innerHeight)) - 1) + "px",
                    height: window.innerHeight + "px",
                    float: "left",
                    'border-right': '1px solid gray',
                    'border-bottom': ''
                };

                var bannerTotalWidthSize = $(".bannerBox .productImg").length * (window.innerWidth / Math.ceil(window.innerWidth / window.innerHeight));
                $("#bannerContainer").css("padding-left", window.innerWidth > bannerTotalWidthSize ? (window.innerWidth - bannerTotalWidthSize) / 2 + "px" : "0px");

                bannerCount = parseInt(window.innerWidth / (window.innerWidth / Math.ceil(window.innerWidth / window.innerHeight)));
            }

            $(".bannerBox, .bannerBox .productImg, .bannerBox .productLayer, .bannerBox .productDesc").css(bannerBoxSize);
            $(".bannerBox .productDesc").css({
                "line-height": bannerBoxSize.height,
                "font-size": (parseInt(bannerBoxSize.width) / 100) + 'rem'
            });

            $(".bannerBox").unbind("mouseover").mouseover(function() {
                $(".bannerBox .productLayer, .bannerBox .productDesc").hide();

                var $t = $(this);
                $t.find(".productLayer").show();
                $t.find(".productDesc").show();

                //롤오버 잠시 멈춤
                clearInterval(interval);
            }).unbind("mouseout").mouseout(function() {
                $(".bannerBox .productLayer, .bannerBox .productDesc").hide();

                //롤오버 활성화
                interval = setInterval(function() {
                    cb(true);
                }, 1500);

                cb();
            });

            clearInterval(interval);

            var count = 0;
            var cb = function(isRolling) {
                if(count > bannerCount-1 && isRolling) {
                    count = 0;
                    bannerShuffle();
                }

                $(".bannerBox .productLayer, .bannerBox .productDesc").hide();
                $(".bannerBox .productLayer").eq(count).show();
                $(".bannerBox .productDesc").eq(count).show();

                if(isRolling) {
                    count++;
                }
            };

            cb(true);
            interval = setInterval(function() {
                cb(true);
            }, 1500);

            return bannerCount;
        };

        $(window).resize(bannerSizeRefresh);

        $(function() {
            bannerShuffle();
            bannerSizeRefresh();
        });
    </script>
