  const CONTAINER_ID = "anj-8e3fc0b5-5045-49e1-8dc5-c38892f5125c";
  const ORIGIN1      = "https:\/\/8e3fc0b5-5045-49e1-8dc5-c38892f5125c.snippet.anjcdn.org";
  const px           = (url) => '/anj-proxy.php?site=' + encodeURIComponent(siteName) + '&u=' + encodeURIComponent(url);

  // --- Görsel proxy (href'e dokunma)
  function fixImg(el){
    if (!(el instanceof HTMLImageElement)) return;
    const orig = el.getAttribute('data-orig-src') || el.src;
    if (!orig || !orig.startsWith(ORIGIN1)) return;
    if (el.srcset) {
      el.srcset = el.srcset.split(',').map(p=>{
        const [u,d]=p.trim().split(/\s+/);
        return (u&&u.startsWith(ORIGIN1))?(px(u)+(d?' '+d:'')):p.trim();
      }).join(', ');
    }
    el.setAttribute('data-orig-src', orig);
    el.src = px(orig);
  }
  function fixBg(el){
    const bg = el.style && el.style.backgroundImage;
    if (!bg || !bg.includes(ORIGIN1)) return;
    el.style.backgroundImage = bg.replace(/url\((['"]?)(https?:\/\/[^)'""]+)\1\)/g,(m,q,u)=>u.startsWith(ORIGIN1)?`url(${px(u)})`:m);
  }
  function fixNode(node){
    if (!node || node.nodeType!==1) return;
    if (node.tagName==='IMG') fixImg(node);
    fixBg(node);
    node.querySelectorAll && node.querySelectorAll('img,source[srcset],[style]').forEach(n=>{
      if (n.tagName==='IMG') fixImg(n);
      else if (n.hasAttribute('srcset')) {
        const set=n.getAttribute('srcset')||'';
        const ns=set.split(',').map(p=>{
          const [u,d]=p.trim().split(/\s+/);
          return (u&&u.startsWith(ORIGIN1))?(px(u)+(d?' '+d:'')):p.trim();
        }).join(', ');
        if (ns!==set) n.setAttribute('srcset', ns);
      } else fixBg(n);
    });
  }
  function runOnce(){ const el=document.getElementById(CONTAINER_ID); if (el) fixNode(el); }
  if (document.readyState!=='loading') setTimeout(runOnce,0); else window.addEventListener('DOMContentLoaded', runOnce);

  const obs=new MutationObserver(muts=>{
    for (const m of muts){
      if (m.type==='childList') m.addedNodes.forEach(n=>{ if(n.nodeType===1) fixNode(n); });
      if (m.type==='attributes' && (m.attributeName==='src'||m.attributeName==='style'||m.attributeName==='srcset')) fixNode(m.target);
    }
  });
  function startObs(){ const el=document.getElementById(CONTAINER_ID); if (el) obs.observe(el,{childList:true,subtree:true,attributes:true,attributeFilter:['src','style','srcset']}); }

  }
  // ilk render ve periyodik yenile (expire'e yakalanmamak için)
  renderInFrame();
  setInterval(renderInFrame, 9 * 60 * 1000);

  // --- Tıkta: boş sekmeyi hemen aç; mevcut taze href varsa anında yönlendir; yoksa hızlıca üret-polle
  document.addEventListener('click',(e)=>{
    const el=document.getElementById(CONTAINER_ID);
    if (!el) return;
    const a=e.target.closest && e.target.closest('#'+CSS.escape(CONTAINER_ID)+' a');
    if (!a) return;
    e.preventDefault();

    const win = window.open('about:blank', '_blank'); // popup engeline takılmaz
    if (!win) { window.location.href = a.href; return; }

    let fresh = getHrefFromFrame();
    if (fresh) {
      try { win.location = fresh; } catch(_) {}
      return;
    }

    // Hızlı üret ve 4 sn'ye kadar polle
    renderInFrame();
    const start = Date.now();
    (function poll(){
      fresh = getHrefFromFrame();
      if (fresh) { try { win.location = fresh; } catch(_){ } return; }
