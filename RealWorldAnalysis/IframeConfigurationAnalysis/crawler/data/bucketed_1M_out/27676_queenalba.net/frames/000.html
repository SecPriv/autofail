function showPwd() {
  const passwordInput = document.getElementById('passwordInput'); // 비밀번호 입력 필드의 ID
  const toggleIcon = document.getElementById('togglePassword');   // 눈 모양 아이콘 이미지의 ID

  if (passwordInput.type === 'password') {
    passwordInput.type = 'text'; // 비밀번호 보이기
    toggleIcon.src = '/img/eye-slash-solid.svg'; // 눈 감은 아이콘으로 변경
    toggleIcon.alt = 'hide password';
  } else {
    passwordInput.type = 'password'; // 비밀번호 숨기기
    toggleIcon.src = '/img/eye-solid.svg'; // 눈 뜬 아이콘으로 변경
    toggleIcon.alt = 'show password';
  }
}
