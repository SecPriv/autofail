  function findSizingParent(el) {
    var p = el.parentElement;
    while (p) {
      var r = p.getBoundingClientRect();
      if (r.width > 0 && r.height > 0) return p;
      p = p.parentElement;
    }
    return el.parentElement;
  }

  function syncSize() {
    var p = findSizingParent(mount);
    if (!p) return;

    if (r.width > 0) mount.style.width = Math.round(r.width) + "px";

  (function waitForSize() {

  })();

  function isHttpUrl(u) {
    return typeof u === "string" && /^https?:\/\//i.test(u);
  }

    var base = window.location.href || "https://example.com/";
    var u;

    try { u = new URL(chatRoomUrl, base); }
    catch (e) { return chatRoomUrl; }

    if (track) u.searchParams.set("track", track);

    return u.toString();
  }

    if (!Array.isArray(results) || results.length === 0) return null;
    return results[Math.floor(Math.random() * results.length)];
  }

  function formatViewers(num) {
    var n = Number(num);
    if (!isFinite(n) || n < 0) return "";
    return n.toLocaleString() + " viewers";
  }

  async function loadAd() {
    try {
      var clientIP = await getClientIP();

      var apiUrl = buildApiUrl(clientIP);

      var res = await fetch(apiUrl, {
        headers: { "Accept": "application/json" },
        cache: "no-store"
      });
      if (!res.ok) throw new Error("API Error: HTTP " + res.status);

      var data = await res.json();
      var room = selectRandomRoom(data.results);
      if (!room) throw new Error("No rooms returned");

      if (!isHttpUrl(room.image_url)) throw new Error("Invalid image_url");
