}
    
    
/* =======================================================
   現代風・可愛いモバイルデザインの上書きCSS
   ======================================================= */

/* 1. 古い背景画像を消して、スッキリさせる */
div#sec_news > div, 
div#sec_topics > div, 
.item_list .container {
    background-image: none !important;
    background-color: transparent !important;
    border: none !important;
}

/* 2. 各コンテンツを「ふんわり浮いたカード」にする */
.model_box > div {
    border-bottom: none !important;
    margin-bottom: 15px;
    padding: 0 10px;
}

.model_box > div > a {
    display: flex;
    flex-wrap: wrap;
    background: #ffffff;
    border-radius: 16px; /* 可愛い角丸 */
    padding: 12px;
    box-shadow: 0 6px 15px rgba(255, 182, 193, 0.35); /* ピンク系のふんわりシャドウ */
    border: 1px solid #ffeef1;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    text-decoration: none !important;
}

/* 3. タップした時に「ぷにっ」と沈むアニメーション */
.model_box > div > a:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(255, 182, 193, 0.5);
}

/* 4. 画像の角丸をさらに滑らかに */
.mb_left img, .item_list .item img {
    border-radius: 12px !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* 5. テキストの微調整（柔らかい色合いに） */
.mb_right p, .mb_right h3 {
    color: #666 !important;
    line-height: 1.5;
    font-size: 12px;
}
.mb_center p {
    color: #ff8fb0 !important;
    font-weight: bold;
    font-size: 11px;
}

/* 6. 「詳細は画面TAP」ボタンを心臓のようにドクドク（ぽわぽわ）させる */
@keyframes pulse-cute {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}
.tap_link {
    animation: pulse-cute 2s infinite ease-in-out; /* 永遠に動く */
    border-radius: 20px !important;
    font-weight: bold;
    font-size: 13px !important;
    /* グラデーションで今っぽく */
    background: linear-gradient(135deg, #ff9cae 0%, #ff769b 100%) !important;
    color: #ffffff !important;
    box-shadow: 0 4px 10px rgba(255, 118, 155, 0.4);
    border: none !important;
}

/* 7. 「一覧を見る」矢印を右にポヨンポヨン動かして誘導する（修正版） */
@keyframes bounce-right {
    0%, 100% { right: 22px; }
    50% { right: 15px; } /* 位置（right）だけを動かして回転を維持する */
}
.list_mov a {
    background: #fff0f3;
    border-radius: 25px;
    text-align: center !important;
    font-weight: bold;
    color: #ff769b !important;
    margin: 5px 15px 15px 15px;
    padding: 12px !important;
    box-shadow: 0 4px 10px rgba(255, 182, 193, 0.2);
}
.list_mov a:after {
    animation: bounce-right 1.5s infinite ease-in-out;
    border-top: solid 2px #ff769b !important;
    border-right: solid 2px #ff769b !important;
    /* transform(45度回転)は元々の設定をそのまま活かします */
}

/* 8. 新人入店日バッジの調整 */
.newface_date {
    border-radius: 20px !important;
    background: #fff0f3 !important;
    color: #ff769b !important;
    border: 1px solid #ffdde5;
    font-weight: bold;
    font-size: 12px !important;
}   
    
/* =======================================================
   タイトル（h2）を主役にする「長文対応・ふんわりボックス」デザイン
   ======================================================= */

/* 1. タイトル全体：長文が読みやすい可愛いステッチ風ボックス */
.mb_right h2, .mb_center h2 {
    font-size: 13px !important;
    font-weight: bold !important;
    line-height: 1.6 !important;
    margin: 10px 0 12px 0 !important;
    padding: 12px 15px !important;
    background: #fff5f8 !important;
    border-radius: 12px !important;
    color: #444 !important;
    display: block !important;
    position: relative;
    border: 1px dashed #ffcce0 !important;
    word-break: break-all;
}

/* 3. 日付バッジ（外部CSSに負けないようにサイズとレイアウトを強化） */
.mb_center p, .mb_right p:first-child {
    display: inline-block !important;
    background: #ff769b !important; 
    color: #ffffff !important;
    font-size: 12px !important; /* ← 10pxから12pxに大きくし、外部CSSより優先 */
    line-height: 1.2 !important; /* ← 外部の行間設定に潰されないように固定 */
    padding: 4px 14px !important;
    border-radius: 20px !important; 
    margin: 0 0 8px 0 !important;
    font-weight: bold !important;
    box-shadow: 0 2px 5px rgba(255, 118, 155, 0.3) !important;
    letter-spacing: 0.05em !important; /* 少し文字間隔を空けて読みやすく */
}
