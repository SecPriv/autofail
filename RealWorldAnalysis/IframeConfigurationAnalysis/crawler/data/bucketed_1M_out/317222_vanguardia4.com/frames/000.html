        function tamVentana() {
            var tam = "0,0";
            if (typeof window.innerWidth != 'undefined') {
                tam = window.innerWidth + 'x' + window.innerHeight;
            }
            else if (typeof document.documentElement != 'undefined'
                && typeof document.documentElement.clientWidth !=
                'undefined' && document.documentElement.clientWidth != 0) {
                tam = document.documentElement.clientWidth + 'x' + document.documentElement.clientHeight;
            }
            else {
                tam = document.getElementsByTagName('body')[0].clientWidth + 'x' + document.getElementsByTagName('body')[0].clientHeight;

            }
            return tam;
        }
