<script type="text/javascript">
<!--
var chatWindow;
var chatTitle;
var mainView;
var chatInput;

var isNodeConnect = false;

var sendMsgCache = [];
var selectedOptionCache = [];
var selectedEnqueteCache = [];

var isLoad = false;
var lastMsgSeq = 0;

var scrollTop = -1;

var urlIndex = 0;
var sameUrlIndex = 0;

let suggestIndex = null;

let suggestCount = 0;

const maxSuggestCount = 5;

let callQaMoreScrollTop = 0;

let isEnableSystemLinkage = false;
let isEnableApi = false;

let isSoldAutoActionMsg = false;

var isGetReversMsg = false;

let addClass = '';

let overlay_flag = true;

function waitReversMsg(retryCount) {
    if (isGetReversMsg) {
        $('#chatInput').val("");
        $('#chatBtn').prop('disabled', false);
        $('#chatBtn span').css({'color': '#b2b6d8'});
        $('#chatInput').removeClass('disabled');
        $('#chatInput').focus();
        resizeMessageField();

        isGetReversMsg = false;
    } else {
        retryCount++;

        if (retryCount > 150) {
            $('#chatBtn').prop('disabled', false);
            $('#chatBtn span').css({'color': '#b2b6d8'});
            $('#chatInput').removeClass('disabled');
            $('#chatInput').focus();
            hideSendWaitingPopup();
            sendMsgCache = [];
            selectedOptionCache = [];
            selectedEnqueteCache = [];
            parent.postMessage('chatdealer_timeout','*');
            isGetReversMsg = false;

        } else {
            $('#chatBtn').prop('disabled', true);
            $('#chatBtn span').css({'color': '#d2d2d2'});
            $('#chatInput').addClass('disabled');
            setTimeout(function () {
                waitReversMsg(retryCount)
            }, 200);
        }
    }
}

$(function () {
    if (parent.isIos()) {
        $('body').addClass('device-ios');
    }

    setIosScrollSetting('#chatView');

    if (!parent.isMobile) {
        $('#chatInput').css({'overflow-y': 'hidden'});
    }

    if (parent.staffCallViewMode == 'calling' && !parent.isQaCallingStaff()) {
        parent.staffCallViewMode = 'before';
    }
    switch (parent.staffCallViewMode) {
        case 'before':
            showStaffCallBtn();
            break;
        case 'calling':
            showStaffCallingPopup(500);
            break;
    }

    if (parent.visitChatbotType == 1 && !parent.chatbot.isShowInputArea()) {
        $('.chat-window-table-input').hide();
    }

    switchMode();

    isLoad = true;
    parent.postMessage('chatdealer_open_fram_ready','*');

    $('#chatBtn').click(function () {
        userExecuteSendMessage();
    });

    $('#chatInput')
        .on('input', function () {
            createAndShowSuggest($(this).val());
            inputMessage($(this).val());
        })
        .on('keydown click mousedown', function (e) {
            if ($(this).hasClass('disabled')) {
                return false;
            }
            if (e.shiftKey) {
                if (e.keyCode === KEY_CODE_ENTER) {
                    userExecuteSendMessage();
                    return false;
                }
            }
        })
        .on('keyup', function (e) {
            var msg = $('#chatInput').val();

            if (e.which === KEY_CODE_ARROW_UP) {
                suggestIndex = suggestCount;
                focusSuggestItem(suggestIndex);
                e.preventDefault();
            } else if (e.which === KEY_CODE_ARROW_DOWN) {
                suggestIndex = 1;
                focusSuggestItem(suggestIndex);
                e.preventDefault();
            }
        })
        .on('focusin', function (e) {
            window.requestAnimationFrame(function () {
                createAndShowSuggest(e.target.value);
            });
        })
        .on('blur', function () {
            setTimeout(function () {
                if (parent.getActiveWindow() != 'chat_close' && parent.isMobile) {
                    resizeMessageField();
                }
            }, 200);

            setTimeout(function () {
                if (!document.querySelector('#chatInput:focus')) {
                    hideSuggestIfNoFocusInWindow();
                }
            }, 100);
        });

    $('#chatSuggest')
        .on('focusin', function (e) {
            replaceTextChatInput(e.target.dataset.suggest);
        })
        .on('focusout', function (e) {
            window.requestAnimationFrame(function () {
                hideSuggestIfNoFocusInWindow();
            });
        })
        .on('mousedown mouseup', function (e) {
            const suggest = e.target.dataset.suggest;
            if (suggest) {
                window.requestAnimationFrame(function () {
                    replaceTextChatInput(suggest);
                    moveCursorToEndChatInput();

                    const chatInput = document.querySelector('#chatInput');
                    chatInput.blur(); 
                    window.requestAnimationFrame(function () {
                        chatInput.focus();
                    });
                });
            }
        })
        .on('keydown', function (e) {
            if (e.which === KEY_CODE_ARROW_UP) {
                if (suggestIndex > 1) {
                    suggestIndex--;
                } else {
                    suggestIndex = suggestCount;
                }
                focusSuggestItem(suggestIndex);
                e.preventDefault();
            } else if (e.which === KEY_CODE_ARROW_DOWN) {
                if (suggestIndex < suggestCount) {
                    suggestIndex++;
                } else {
                    suggestIndex = 1;
                }
                focusSuggestItem(suggestIndex);
                e.preventDefault();
            } else if (e.which === KEY_CODE_ENTER) {
                const suggest = e.target.dataset.suggest;
                replaceTextChatInput(suggest);
                moveCursorToEndChatInput();

                const chatInput = document.querySelector('#chatInput');
                chatInput.focus();

                e.preventDefault();
            }
        });

    $(document).on('click', 'input:radio[name^=selectMsg]', function() {
        // チャットボットの場合
        if (parent.visitChatbotType == 1) {
            var p = $(this).parents('div.comment-text');
            p.find('input:radio').prop('disabled', true);
            p.find('input:radio').parent().addClass('disabled');
            p.find('input:radio').removeAttr("onclick");
            setArrayWebStorage(parent.aasc, p.attr('data'), 'local', true);
        }
    });

    $(document).on('click', 'input:radio[name^=selectEnq]', function() {
        if (!$(this).is(':disabled')) {
            $(this).parents('label').addClass('selected');
            var p = $(this).parents('div.comment-footer');
            p.find('input:radio').prop('disabled', true);
            p.find('input:radio').parent().addClass('chosen');
            p.find('input:radio').removeAttr("onclick");
        }
    });

    $(document).on('click', 'input:radio[name^=selectQaEnq]', function() {
        if (!$(this).is(':disabled')) {
            $(this).parents('label').addClass('selected');
            var p = $(this).parents('div.comment-footer');
            p.find('input:radio').prop('disabled', true);
            p.find('input:radio').parent().addClass('chosen');
            p.find('input:radio').removeAttr("onclick");
        }
    });

    $(document).on('click', '.qa-answer-enquete-submit-btn', function(e) {
        e.preventDefault();
        const form = $(this).parents('form');
        const comment = form.find('.qa-answer-enquete-textarea').val();
        if (!comment) {
            return false;
        }
        const chatId = form.children('.enqueteChatId').val();
        const messageSeq = form.children('.enqueteMessageSeq').val();
        const msdt = getWebStorage(parent.msdt, 'local');
        const qaEnquete = msdt[messageSeq];
        if (qaEnquete) {
            qaEnquete.enquete_status = 3;
            msdt[messageSeq] = qaEnquete;
            setWebStorage(parent.msdt, msdt, 'local');
            const message = $('#message' + messageSeq);
            message.find('textarea.qa-answer-enquete-textarea').val("");
            message.find('textarea.qa-answer-enquete-textarea').removeAttr('placeholder');
            message.find('textarea.qa-answer-enquete-textarea').addClass('disabled');
            message.find('textarea.qa-answer-enquete-textarea').attr('disabled', true);
            message.find('input.qa-answer-enquete-submit-btn').addClass('disabled');
            message.find('input.qa-answer-enquete-submit-btn').attr('disabled', true);
        }
        receiveQaEnqueteComment(chatId, messageSeq, comment);
    });

    chatWindow = $('.chat-window-table');
    chatTitle = $('.chat-window-table-title');
    mainView = $('#chatView');
    chatInput = $('.chat-window-table-input');

    setOpenWindowEvent(function () {
        focused(false);
        parent.postMessage('chatdealer_close', '*');
    }, function () {
        focused(false);
        parent.postMessage('chatdealer_end', '*');
    }, function () {
        focused(false);
        parent.postMessage('chatdealer_scinario_back_home', '*');
    });

    fitToWindowSize();

    setChatTitleBtn();

    setCloseBtn(parent.isShowCloseButton);

    mainView.on('scroll', function(e){
        if (isLastMessageShow()) {
            var noticeNewMessage = $('#noticeNewMessage');
            if (noticeNewMessage.length > 0 && noticeNewMessage.is(':visible')) {
                noticeNewMessage.fadeOut();
                focused(true);
            }
        }
    });

    let fncResize = function (retryCount) {
        if (chatTitle.is(':visible')) {
            var logHeight = window.innerHeight;
            logHeight -= chatTitle.outerHeight(true) || 0;

            if (chatInput.is(':visible')) {
                logHeight -= chatInput.outerHeight(true);
            }

            if ($('.cd-uploader-form').is(':visible')) {
                $('#chatView').css({'padding': '0 25px 0px'});
            } else {
                logHeight -= 50;
                $('#chatView').css({'padding': '25px 25px 25px 25px'});
            }

            mainView.height(logHeight);

        } else {
            retryCount++;
            if (retryCount <= 10) {
                setTimeout(function () {
                    fncResize(retryCount);
                }, 250);
            }
        }
    };

    clearNewMessageWebStorage();

    $(window)
        .on('focus', function (e) {
            if (focused()) {
                return;
            }

            chatWindow.addClass('chat_window_focusin');

        })
        .on('blur', function () {
            if (focused() == false) {
                return;
            }

            scrollTop = mainView.scrollTop();

            $(chatWindow).removeClass('chat_window_focusin');
        })
        .resize(function () {
            fncResize(0);
        });

    resizeWindow();
});

function inputAreaShow() {
    $('.chat-window-table-input').show();
    resizeWindow();
}
function inputAreaHide() {
    $('.chat-window-table-input').hide();
    $('#chatInput').val('');
    resizeWindow();
}

function initialize() {
    setPositionPopupMsg('#noticeNewMessage');
    if (scrollTop >= 0) {
        scrollChatLog(scrollTop, 0)
    } else {
        autoScrollToLastMessage(0);
    }
}

function inputCheck(msg) {
    if (!msg && msg !== 0) {
        return false;
    }

    var chkValue = msg.replace(/(?:\r\n|\r|\n)/g, '');
    chkValue = chkValue.replace(/\s+/g, '');

    return chkValue != '';
}

function userExecuteSendMessage() {
    var input = $('#chatInput');
    var msg = input.val();

    if (inputCheck(msg)) {
        isGetReversMsg = false;
        waitReversMsg(0);
        sendMessage(msg);
    }
}

function sendMessage(data, type) {
    if (typeof type == 'undefined') {
        type = 'msg';
    }
    if (isNodeConnect) {
        switch (type) {
            case 'msg':
                parent.sendMessage(data, false, '', null);
                break;
            case 'attach':
                parent.sendAttach(data);
                break;
        }
    } else {
        showSendWaitingPopup();
        sendMsgCache.push({
            data: data,
            type: type,
        });
    }
}

function inputMessage(msg) {
    if (isNodeConnect) {
        parent.inputMessage(msg);
    }

    resizeMessageField();
}

function resizeMessageField() {
    var lHeight = Number($('#chatInput').css('line-height').replace('px', ''));
    $('#chatInput').height(lHeight);

    var pHeight = Number($('#chatInput').css('padding-top').replace('px', '')) + Number($('#chatInput').css('padding-bottom').replace('px', ''));
    var oHeight = $('#chatInput')[0].offsetHeight;
    var sHeight = $('#chatInput')[0].scrollHeight;
    if (oHeight < sHeight) {
        $('#chatInput').height(sHeight - pHeight);
    }

    resizeWindow();

    setTimeout(function () {
        var noticeNewMessage = $('#noticeNewMessage');
        if (noticeNewMessage.length > 0 && noticeNewMessage.is(':visible')) {
            setPositionPopupMsg('#noticeNewMessage');
        }
        if (parent.staffCallViewMode == 'calling') {
            setPositionPopupMsg('#staffCallingMessage');
        }
    }, 100);
}

function disconnect() {
    isNodeConnect = false;
}

var isInit = true;
function connect() {

    parent.getChatMessage(lastMsgSeq);

    hideSendWaitingPopup();

    var sendMsgArray = sendMsgCache;
    var selectedOptionArray = selectedOptionCache;
    var selectedEnqueteArray = selectedEnqueteCache;
    var sendIndex = 0;

    sendMsgCache = [];
    selectedOptionCache = [];
    selectedEnqueteCache = [];
    isNodeConnect = true;

    $.each(sendMsgArray, function (key, val) {
        setTimeout(function () {
            sendMessage(val.data, val.type);
        }, 250 * (sendIndex++));
    });

    $.each(selectedOptionArray, function (key, val) {
        setTimeout(function () {
            selectedOption(val.msg, val.id, val.passedIds, val.messageSeq, val.reportDate, val.el);
        }, 250 * (sendIndex++));
    });

    $.each(selectedEnqueteArray, function (key, val) {
        setTimeout(function () {
            selectedActEnquete(val.msgSeq, val.goodCnt, val.badCnt);
        }, 250 * (sendIndex++));
    });
}

function startSession() {
    hideStaffCallBtn();
    hideStaffCallingPopup();
        $('#attachBtn').css({'display': 'block'});
        $('#attachBtn').parent().removeClass('w0');
        $('#attachBtn').parent().addClass('w33');
}

function qaCallTimeout() {
    showStaffCallBtn();
    hideStaffCallingPopup();
}

function getLastMessage(isStop) {
    if (isStop) {
        return mainView.children('div.post-person-2').last();
    } else {
        return mainView.children('div:last-child');
    }
}

function receiveMessage(data) {
    if (data.length > 0 && parent.visitChatbotType === 1) {
        if (data[0]['post_person_type'] == 3 && !isSoldAutoActionMsg) {
            $('.chat-btn-home').show();
            isSoldAutoActionMsg = true;
        }
    }
    var retPrintMsg = printMessage(data);

    if (isInit) {
        setTimeout(function () {
            autoScrollToLastMessage(0);
        }, 100);

        isInit = false;

    } else if (retPrintMsg.is_add_msg) {
        if (parent.isIos()) {
            messageRepaint();
        }
        var isChatOpen = (parent.getActiveWindow() == 'chat_open');

        if (retPrintMsg.is_add_staff_msg) {
            parent.postMessage('chatdealer_new_message','*');
        }

        if (isChatOpen) {
            releasePreventScrollOut(data);
        } else {
            setTimeout(function () {
                releasePreventScrollOut(data);
            }, 500);
        }
    }
}


function receiveMessageUpdateFreeSearch(data) {
    replaceMessageFreeSearch(data);
}

function receiveMessageUpdateFreeSearchSimulation(messageSeq, rootSeq) {
    let qamb = getWebStorage(parent.qamb, 'local');
    if (messageSeq in qamb) {
        let reedMessage = qamb[messageSeq].reedMessage;
        let qaListShow = qamb[messageSeq].freeSearchOptionListShow;
        let notApplicable = qamb[messageSeq].notApplicable;
        let messageHtml = '';
        messageHtml += reedMessage;
        messageHtml += '<p>';
        for (let i = 0; i < qaListShow.length; i++) {
            messageHtml += '{○}' + escapeHtml(qaListShow[i].question) + '<br />';
        }
        if (qamb[messageSeq].freeSearchOptionListMore.length == 0) {
            messageHtml += '{○}' + escapeHtml(notApplicable) + '<br />';
        }
        messageHtml += '</p>';
        let data = [];
        data[0] = {
            message_seq: messageSeq,
            message_html: messageHtml,
            root_seq: rootSeq
        };
        replaceMessageFreeSearch(data);
    }
}

function receiveMessageUpdateQa(data) {
    replaceMessageQa(data);
}

function messageRepaint() {
    setTimeout(function () {
        $('#chatView').hide();
        setTimeout(function () {
            $('#chatView').show();
        }, 0);
    }, 0);
}

function clearNewMessageWebStorage() {
    setWebStorage(parent.mswt, {}, 'local');
    setWebStorage(parent.vcms, {}, 'local');
}

function setWaitingMessage(postPerson, receiveData) {
    var mswtData = getWebStorage(parent.mswt, 'local');
    switch(postPerson) {
        case 'staff':
            var setData = Array.isArray(mswtData.staff) ? mswtData.staff : [];
            var staffId = receiveData.staffId;
            var index = setData.indexOf(staffId);
            if (receiveData.isInput && index === -1) {
                setData.push(receiveData.staffId);
            } else if (!receiveData.isInput && index >= 0) {
                setData.splice(index, 1)
            }
            break;
        case 'chatBot':
        case 'qa':
            var setData = receiveData;
            break;
        case 'qaQuestion':
            var setData =  mswtData.qaQuestion ? mswtData.qaQuestion : 0;
            switch (receiveData) {
                case 'add':
                    setData++;
                    break;
                case 'sub':
                    setData = (setData > 0) ? setData - 1 : 0;
                    break;
                case 'clr':
                    setData = 0;
                    break;
            }
            break;
    }
    setArrayWebStorageByKey(parent.mswt, postPerson, setData, 'local');
    updateShowWaitingMessage();
}

function updateShowWaitingMessage() {
    mswtData = getWebStorage(parent.mswt, 'local');
    if (
        mswtData.chatBot ||
        mswtData.qa ||
        mswtData.qaQuestion && mswtData.qaQuestion > 0 ||
        mswtData.staff && mswtData.staff.length
    ) {
        var msg = '<div class="comment-box-group clearfix" style="margin-bottom: 5px;">';
            msg += '<div class="comment-box-group-inner comment-box-left clearfix">';
            msg += '<div class="profile-image-front profile-image3">';
            msg += '<div class="profile-image-frame profile-image-frame2"><img src="https://chat1-662.chatdealer.jp/img/acc/p2JaSChat1-662/1/dsf/162fe03da92afd6.28494719_l.png" onerror="imgLoadRetry(this)"></div>';
            msg += '</div>';
        msg += '<div class="comment-box pull-left ">';
        msg += '<div class="comment-text-group comment-text-left">';
        msg += '<div class="comment-text-inner">';
        msg += '<div class="comment-text" data="wait">';
        msg += '<div class="ball-pulse-sync wait-auto-message">';
        msg += '<div style="background-color: #333333"></div>';
        msg += '<div style="background-color: #333333"></div>';
        msg += '<div style="background-color: #333333"></div>';
        msg += '</div>';
        msg += '</div>';
        msg += '</div>';
        msg += '</div>';
        msg += '</div>';
        msg += '</div>';
            msg += '<div class="comment-meta-left ml50">';
        msg += '</div>';
        msg += '</div>';
        if (!$('#chatView > div.wait').length) {
            $('#chatView').append('<div class="wait">' + msg + '</div>');
        }

        const vcmsData = getWebStorage(parent.vcms, 'local');
        const isStop = (vcmsData.isStop) ? true : false;
        if(!isStop) {
            if (parent.visitChatbotType === 2) {
                scrollChatLog($('#chatView')[0].scrollHeight, 0);
                autoScrollToLastMessage(0);
            } else if (parent.visitChatbotType === 1) {
                if ($("#chatView div[id^=message]").length !== 0 && !$("#chatView div[id^=message]:last").hasClass('post-person-3')) {
                    autoScrollToLastMessage(0);
                }
            }
        } else {
            scrollChatLog($('#chatView')[0].scrollHeight, 0);
        }
    } else {
        removeWaitingMessage();
    }
}

function removeWaitingMessage() {
    $('#chatView > div.wait').remove();
}

function printMessage(data) {
    var retVal = {is_add_msg: false, is_add_staff_msg: false};

function releasePreventScrollOut(data) {
    var vcmsData = getWebStorage(parent.vcms, 'local');
    var isStop = (vcmsData.isStop) ? true : false;       

    if (isStop) {
        switch (data[0].post_person_type) {
            case 1:
                vcmsData.isStop = false;
                setWebStorage(parent.vcms, vcmsData, 'local');
                autoScrollToLastMessage(0);
                break;
            case 2:
                var isResClkMsg = vcmsData.isResClkMsg ? true : false;
                if (isResClkMsg) {
                    vcmsData.isStop = false;
                } else {
                    vcmsData.isResClkMsg = true;
                }
                setWebStorage(parent.vcms, vcmsData, 'local');
                autoScrollToLastMessage(0);
                break;
            case 3:
                if (parent.visitChatbotType == 2 && data[0].is_answer_complete) {
                    vcmsData.isStop = false;
                } else if (parent.visitChatbotType == 1) {
                    vcmsData.isStop = false;
                }
                autoScrollToLastMessage(0);
                setWebStorage(parent.vcms, vcmsData, 'local');
                break;
        }
    } else {
        if (parent.visitChatbotType == 1) {
            const cvMessageEl = $("#chatView div[id^=message]");
            const cvMessageElLast = $("#chatView div[id^=message]:last");

            if (cvMessageEl.length !== 0 &&
                !(cvMessageEl.length === 1 && cvMessageElLast.hasClass('post-person-3')) &&
                !(cvMessageEl.length > 1 && cvMessageElLast.hasClass('post-person-3') && $(cvMessageEl[cvMessageEl.length - 2]).hasClass('post-person-3'))

                        autoScrollToLastMessage(0);
                    }
                }
            }
        } else {
            autoScrollToLastMessage(0);
        }
    }
}

var selectMsgIndex = 0;

function escapeOutput(value, isMessage, isEnableSelect, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isForDecoratedChatMessage, isFreeSearchSelectOption, reportDate) {
    if (!value && value !== 0) {
        return "";
    }
    if (typeof isEnableSelect === 'undefined') {
        isEnableSelect = false;
    }
    if (typeof autoActionId === 'undefined') {
        autoActionId = '';
    }
    if (typeof passedAutoActionIds === 'undefined') {
        passedAutoActionIds = '';
    }
    if (typeof isForDecoratedChatMessage === 'undefined') {
        isForDecoratedChatMessage = false;
    }
    if (typeof isFreeSearchSelectOption === 'undefined') {
        isFreeSearchSelectOption = false;
    }
    if (typeof reportDate === 'undefined') {
        reportDate = '';
    }

    value = value.replace(/(\r\n|\r|\n)/gm,"\n");

    var escaped = "";

    for(var i = 0; i < value.length; i++){
        escaped += escapeHtml(value.charAt(i));
    }

    escaped = escaped.replace(/ /g, "&#x20;");

    var escapedArr = escaped.split("\n");
    optionRegexp = new RegExp('\\{○\\}(.*)$', "gm");
    for(var i = 0; i < escapedArr.length; i++){
        if (!escapedArr[i].match(optionRegexp)) {
            var telStr = escapedArr[i].match(new RegExp('^[0-9]{2,}-[0-9]{1,}-[0-9]{4,}$')) + '';
            telStr = telStr != 'null' ? telStr : escapedArr[i].match(new RegExp('^[0-9]{9,}$')) + '';
            var telHref = telStr.replace(/-/g, "");
            if (parent.isMobile && isMessage && telStr != 'null') {
                var telHref = telStr.replace(/-/g, "");
                escapedArr[i] = escapedArr[i].replace(telStr, '<a href="tel:' + telHref + '" class="link" rel="noreferrer">' + telStr + '</a>');
            } else {
                var tmpUrl = Array();
                var urlArray = escapedArr[i]
                        .split('&#x20;').join(' ')
                        .match(/((https?):\/\/([\w-.]+|(\d+\.){3}\d+)(:\d+)?(\/[-.!~*'()\w;\/?:@&=+$,%#]+|\/)?)/gm);
                if (urlArray) {
                    for (j = 0; j < urlArray.length; j++){
                        var alinkUrl = urlArray[j];
                        const dt = new Date();
                        var msgStorageAry = getWebStorage(parent.wsUc, 'local').length != 0 ? JSON.parse(getWebStorage(parent.wsUc, 'local')) : {};
                        if (typeof(msgStorageAry[alinkUrl]) != 'object') {
                            msgStorageAry[alinkUrl] = [];
                        }
                        if ($.inArray(urlArray[j], tmpUrl) == -1) {
                            var reRepUrl = new RegExp(urlArray[j].replace(/([.*+?^=!:${}()|[\]\/\\])/g, "\\$1"), "gm");
                            if (alinkUrl.indexOf('&#39;') != -1 || alinkUrl.indexOf("'") != -1) {
                                escapedArr[i] = escapedArr[i].replace(reRepUrl, '<a href="' + alinkUrl + '" target="_blank" class="link" rel="noreferrer">' + alinkUrl + '</a>');
                            } else {
                                if (autoActionId === undefined || autoActionId === null || autoActionId === '') {
                                    escapedArr[i] = escapedArr[i].replace(reRepUrl, '<a href="' + alinkUrl + '" target="_blank" class="link" rel="noreferrer">' + alinkUrl + '</a>');
                                } else {
                                    escapedArr[i] = escapedArr[i].replace(reRepUrl, '<a href="' + alinkUrl + '" target="_blank" class="link" rel="noreferrer" onclick="clickUrl(\'' + autoActionId + '\', \'' + alinkUrl + '\', \'' + messageSeq + '\', \'' + urlIndex + '\', \'' + passedAutoActionIds + '\')">' + alinkUrl + '</a>');
                                }
                            }
                            tmpUrl.push(urlArray[j]);
                            sameUrlIndex = urlIndex;
                        }
                        if (msgStorageAry[alinkUrl].length > 0) {
                            var isExistStorage = false;
                            for (let i = 0; i < msgStorageAry[alinkUrl].length; i++) {
                                const storage = JSON.parse(msgStorageAry[alinkUrl][i])
                                if (storage[0] == autoActionId && storage[1] == messageSeq && storage[4] == urlIndex) {
                                    isExistStorage = true;
                                }
                            }
                            if (!isExistStorage) {
                                msgStorageAry[alinkUrl].push(JSON.stringify([autoActionId, messageSeq, false, dt, urlIndex]));
                            }
                        } else {
                            msgStorageAry[alinkUrl].push(JSON.stringify([autoActionId, messageSeq, false, dt, urlIndex]));
                        }
                        setWebStorage(parent.wsUc, JSON.stringify(msgStorageAry), 'local');
                        if (alinkUrl.indexOf('&#39;') != -1 || alinkUrl.indexOf("'") != -1) {
                            escapedArr[i] = escapedArr[i].replace("clickUrl('" + autoActionId + "', '" + alinkUrl + "', '" + messageSeq + "', '" + sameUrlIndex + "'", "");
                        } else {
                            escapedArr[i] = escapedArr[i].replace("clickUrl('" + autoActionId + "', '" + alinkUrl + "', '" + messageSeq + "', '" + sameUrlIndex + "'", "clickUrl('" + autoActionId + "', '" + alinkUrl + "', '" + messageSeq + "', '" + urlIndex + "'");
                        }
                        urlIndex += 1;
                    }
                }
            }
        }
    }

    if (isEnableSelect) {
        selectMsgIndex++;
        idIndex = 0;
        var name = '';
        var id = '';
        var selectAry = Array();
        var escapedLine = '';
        for (var i = 0; i < escapedArr.length; i++) {
            if (escapedArr[i].match(optionRegexp)) {
                name = 'selectMsg' + selectMsgIndex;
                selectAry = escapedArr[i].split('{○}');
                escapedLine = selectAry[0] ? selectAry[0] + '<br>' : '';
                selectAry.shift();
                if (selectAry) {
                    for (j = 0; j < selectAry.length; j++) {
                        id = name + '_' + (++idIndex);
                        if (parent.visitChatbotType == 1 && checkArrayWebStorage(parent.aasc, messageSeq, 'local')) {
                            escapedLine += '<label for="' + id + '" class="comment-select-text disabled" style="background-color: #ffffff; color: #394359"><input name="' + name + '" id="' + id + '" type="radio" style="display: none">' + selectAry[j] + '</label>';
                        } else {
                            escapedLine += '<label for="' + id + '" class="comment-select-text" style="background-color: #ffffff; color: #394359"><input name="' + name + '" id="' + id + '" type="radio" style="display: none" data-is-free-search-select-option="' + (isFreeSearchSelectOption ? 1 : 0) + '" data-root-seq="' + escapeHtml(escapeJsString(rootSeq)) + '" onclick="selectedOption(unescapeHtml(\'' + escapeHtml(escapeJsString(selectAry[j])) + '\'), unescapeHtml(\'' + escapeHtml(escapeJsString(autoActionId)) + '\'), unescapeHtml(\'' + escapeHtml(escapeJsString(passedAutoActionIds)) + '\'), \'' + messageSeq + '\', \'' + escapeHtml(escapeJsString(reportDate)) + '\', this);" >' + selectAry[j] + '</label>';
                        }
                    }
                }
                escapedArr[i] = escapedLine;
            } else {
                if (!isForDecoratedChatMessage) {
                    escapedArr[i] += '<br>';
                }
            }
        }
    } else if(isMessage) {
        if (!isForDecoratedChatMessage) {
            for (var i = 0; i < escapedArr.length; i++) {
                escapedArr[i] += '<br>';
            }
        }
    }

    escaped = escapedArr.join('\n');

    return escaped;
}

function outputForDecoratedChatMessage(html, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isFreeSearchSelectOption, reportDate, replyTo) {
    if (!html && html !== 0) {
        return "";
    }
    if (typeof autoActionId === 'undefined') {
        autoActionId = '';
    }
    if (typeof passedAutoActionIds === 'undefined') {
        passedAutoActionIds = '';
    }
    if (typeof reportDate === 'undefined') {
        reportDate = '';
    }
    if (typeof replyTo === 'undefined') {
        replyTo = null;
    }

    let isMessage = true;
    let isEnableSelect = true;
    let isForDecoratedChatMessage = true;

    let fragment = document.createDocumentFragment();
    fragment.appendChild(document.createElement('div'));
    fragment.firstChild.innerHTML = html;

    let nodeList = fragment.querySelectorAll('p'); 

    let optionPatternCombinedText = '';
    let moderatedHtml = '';

    for (let nodeIndex = 0; nodeIndex < nodeList.length; nodeIndex++) {
        let targetNodeInnerHTML = '';
        let targetNode = nodeList[nodeIndex];
        let childNodes = targetNode.childNodes;

        let fncOptionOutput = function () {
            if (optionPatternCombinedText !== '') {
                if (targetNodeInnerHTML !== '') {
                    moderatedHtml += '<p>' + targetNodeInnerHTML + '</p>';
                }
                targetNodeInnerHTML = '';

                moderatedHtml += escapeOutput(optionPatternCombinedText, isMessage, isEnableSelect, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isForDecoratedChatMessage, isFreeSearchSelectOption, reportDate);
                optionPatternCombinedText = '';
            }
        };

        if (targetNode.textContent.indexOf('{○}') >= 0) {
            let isPrevNodeBr = false;

            let isOptionPatternStarted = false;

            for (let nodeChildIndex = 0; nodeChildIndex < childNodes.length; nodeChildIndex++) {
                let childNode = childNodes[nodeChildIndex];

                if (childNode.outerHTML === '<br>') {
                    optionPatternCombinedText += '\n';
                    isPrevNodeBr = true;
                } else {
                    if (!isOptionPatternStarted && (childNode.nodeType === 3) && (childNode.textContent.indexOf('{○}') >= 0) ) {
                        isOptionPatternStarted = true;

                        let startPositionOfOptionPattern = childNode.textContent.indexOf('{○}');

                        if (startPositionOfOptionPattern === 0) {
                            optionPatternCombinedText += childNode.textContent;
                        } else {
                            fncOptionOutput();

                            targetNodeInnerHTML += escapeOutput(childNode.textContent.substring(0, startPositionOfOptionPattern), isMessage, isEnableSelect, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isForDecoratedChatMessage, isFreeSearchSelectOption, reportDate);
                            optionPatternCombinedText += childNode.textContent.slice(startPositionOfOptionPattern);
                        }
                    } else {
                        if (isOptionPatternStarted) {
                            if (isPrevNodeBr && ((childNode.nodeType !== 3) || (childNode.textContent.indexOf('{○}') !== 0))) {
                                fncOptionOutput();

                                if (childNode.nodeType === 3) {
                                    targetNodeInnerHTML += escapeOutput(childNode.textContent, isMessage, isEnableSelect, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isForDecoratedChatMessage, isFreeSearchSelectOption, reportDate);
                                } else {
                                    targetNodeInnerHTML += childNode.outerHTML;
                                }
                            } else {
                                optionPatternCombinedText += childNode.textContent;
                            }
                        } else {
                            fncOptionOutput();

                            if (childNode.nodeType === 3) {
                                targetNodeInnerHTML += escapeOutput(childNode.textContent, isMessage, isEnableSelect, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isForDecoratedChatMessage, isFreeSearchSelectOption, reportDate);
                            } else {
                                targetNodeInnerHTML += childNode.outerHTML;
                            }
                        }
                    }

                    isPrevNodeBr = false;
                }
            }
        } else {
            fncOptionOutput();

            for (let nodeChildIndex = 0; nodeChildIndex < childNodes.length; nodeChildIndex++) {
                let childNode = childNodes[nodeChildIndex];

                if (childNode.nodeType === 3) {
                    targetNodeInnerHTML += escapeOutput(childNode.textContent, isMessage, isEnableSelect, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isForDecoratedChatMessage, isFreeSearchSelectOption, reportDate);
                } else {
                    var outerHtml = childNode.outerHTML;
                    var aTagMsg = outerHtml.match(/<a(?: .+?)?>.*?<\/a>/g);
                    if (aTagMsg) {
                        for (let aTagIndex = 0; aTagIndex < aTagMsg.length; aTagIndex++) {
                            const alinkUrl = aTagMsg[aTagIndex].match(/((https?):\/\/([\w-.]+|(\d+\.){3}\d+)(:\d+)?(\/[-.!~*\'()\w;\/?:@&=+$,%#]+|\/)?)/gm);
                            if (alinkUrl) {
                                if (alinkUrl.length > 0) {
                                    if (alinkUrl.indexOf('&#39;') != -1 || alinkUrl[0].indexOf("'") != -1) {
                                        outerHtml = outerHtml.replace('href="' + alinkUrl[0] + '"', 'href="' + alinkUrl[0] + '"' + 'target="_blank" class="link" rel="noreferrer"');
                                    } else {
                                        if (autoActionId === undefined || autoActionId === null || autoActionId === '') {
                                            outerHtml = outerHtml.replace('href="' + alinkUrl[0] + '"', 'href="' + alinkUrl[0] + '"' + 'target="_blank" class="link" rel="noreferrer"');
                                        } else {
                                            outerHtml = outerHtml.replace('href="' + alinkUrl[0] + '"', 'href="' + alinkUrl[0] + '"' + 'target="_blank" class="link" rel="noreferrer" onclick="clickUrl(\'' + autoActionId + '\', \'' + alinkUrl[0] + '\', \'' + messageSeq + '\', \'' + urlIndex + '\', \'' + passedAutoActionIds + '\')"');
                                        }
                                    }
                                    var msgStorageAry = getWebStorage(parent.wsUc, 'local').length != 0 ? JSON.parse(getWebStorage(parent.wsUc, 'local')) : {};
                                    if (typeof(msgStorageAry[alinkUrl[0]]) != 'object') {
                                        msgStorageAry[alinkUrl[0]] = [];
                                    }
                                    const dt = new Date();
                                    if (msgStorageAry[alinkUrl[0]].length > 0) {
                                        var isExistStorage = false;
                                        for (let i = 0; i <  msgStorageAry[alinkUrl[0]].length; i++) {
                                            const storage = JSON.parse(msgStorageAry[alinkUrl[0]][i])
                                            if (storage[0] == autoActionId && storage[1] == messageSeq && storage[4] == urlIndex) {
                                                isExistStorage = true;
                                            }
                                        }
                                        if (!isExistStorage) {
                                            msgStorageAry[alinkUrl[0]].push(JSON.stringify([autoActionId, messageSeq, false, dt, urlIndex]));
                                        }
                                    } else {
                                        msgStorageAry[alinkUrl[0]].push(JSON.stringify([autoActionId, messageSeq, false, dt, urlIndex]));
                                    }
                                    setWebStorage(parent.wsUc, JSON.stringify(msgStorageAry), 'local');
                                    urlIndex += 1;
                                }
                            }
                        }
                    }
                    targetNodeInnerHTML += outerHtml;
                }
            }
        }
        if (targetNodeInnerHTML !== '') {
            moderatedHtml += '<p>' + targetNodeInnerHTML + '</p>';
        }
    }
    urlIndex = 0;
    sameUrlIndex = 0;

    if (optionPatternCombinedText !== '') {
        moderatedHtml += escapeOutput(optionPatternCombinedText, isMessage, isEnableSelect, messageSeq, rootSeq, autoActionId, passedAutoActionIds, isForDecoratedChatMessage, isFreeSearchSelectOption, reportDate);
        optionPatternCombinedText = '';
    }

    const qamb = getWebStorage(parent.qamb, 'local');
    if (messageSeq in qamb) {
        const qambRow = qamb[messageSeq];
        if (parent.visitChatbotType === 2 && qambRow.qaListMore && qambRow.qaListMore.length) {
            let reportDate = qambRow.reportDate;
            const replyToInJs = replyTo ? replyTo : 'null';
            moderatedHtml += '<label class="comment-text-button" style="color: #333333"><input id="moreBtn' + messageSeq + '" type="button" style="display: none" onclick="callQaMore(' + messageSeq + ', \'' + escapeHtml(escapeJsString(reportDate))  + '\', ' + replyToInJs + '); this.disabled = true;">' + '他の選択肢を見る' + '</label>';
        } else if (isFreeSearchSelectOption && qambRow.freeSearchOptionListMore.length) {
            moderatedHtml += '<label class="comment-text-button" style="color: #333333"><input id="moreBtn' + messageSeq + '" type="button" style="display: none" onclick="callFreeSearchMore(' + messageSeq + ', ' + rootSeq + '); this.disabled = true;">' + '他の選択肢を見る' + '</label>';
        }
    }

    return moderatedHtml;
}

function autoScrollToLastMessage(duration) {
    var vcmsData = getWebStorage(parent.vcms, 'local');
    var isStop = (vcmsData.isStop) ? true : false;       
    var lastMessage = getLastMessage(isStop);
    const cvMessageElements = $("#chatView div[id^=message]");

    if (lastMessage.length && lastMessage.is(':visible')) {
        var hChatView = mainView.height();               
        var curScrollTop = mainView.scrollTop();         
        var position = lastMessage.position();           
        var top = (position ? position.top : 0);         
        var height = lastMessage.outerHeight(true);      
        var msgMargin = 5;                               

        if (parent.visitChatbotType === 1) {
            if(cvMessageElements.length > 1) {
                if($("#chatView div[id^=message]:last").hasClass('post-person-3') && $(cvMessageElements[cvMessageElements.length - 2]).hasClass('post-person-3')) {
                    const visitorMsg = mainView.children('div.post-person-2').last();
                    if(visitorMsg && visitorMsg.length) {
                        const visitorMsgTop = (visitorMsg.position() ? visitorMsg.position().top : 0);
                        if(visitorMsgTop > msgMargin) {
                            scrollChatLog(curScrollTop + visitorMsg.position().top - msgMargin, (duration ? duration : 0));
                        }
                    }
                    return;
                }
            }
        }

        if (height > hChatView || isStop) {
            scrollChatLog(curScrollTop + top - msgMargin, (duration ? duration : 0));
        } else {
            scrollChatLog(curScrollTop + top + height + msgMargin - hChatView, (duration ? duration : 0));
        }
    }
}

    mainView.animate({'scrollTop': scrollTop}, (duration ? duration : 0), "swing");

function callFreeSearchMore (messageSeq, rootSeq) {
    if (parent.visitChatbotType === 1) {
        let qamb = getWebStorage(parent.qamb, 'local');
        let qals = getWebStorage(parent.qals, 'local');
        if (messageSeq in qamb && qamb[messageSeq].freeSearchOptionListMore.length) {
            let messageData = qamb[messageSeq];
            messageData.messageSeq = messageSeq;
            parent.updateMessageFreeSearch(messageData);
            let times = Math.min(5, messageData.freeSearchOptionListMore.length);
            for (let i = 0; i < times; i++) {
                let setData = messageData.freeSearchOptionListMore[0];
                qals[rootSeq][setData.question] = setData.autoActionId;
                messageData.freeSearchOptionListShow.push(setData);
                messageData.freeSearchOptionListMore.shift();
            }
            qamb[messageSeq] = messageData;
            setWebStorage(parent.qamb, qamb, 'local');
            setWebStorage(parent.qals, qals, 'local');
        }
    }
}

function callQaMore (messageSeq, reportDate, replyTo) {
    if (parent.visitChatbotType === 2) {
        callQaMoreScrollTop = mainView.scrollTop();
        let qamb = getWebStorage(parent.qamb, 'local');
        let qals = getWebStorage(parent.qals, 'local');
        if (messageSeq in qamb && qamb[messageSeq].qaListMore.length) {
            let messageData = qamb[messageSeq];
            messageData.messageSeq = messageSeq;
            parent.updateMessageQa(messageData, reportDate);
            let times = Math.min(5, messageData.qaListMore.length);
            for (let i = 0; i < times; i++) {
                let setData = messageData.qaListMore[0];
                qals[setData.question] = {'id': setData.id, 'mId': setData.mId, 'answer': setData.answer};
                messageData.qaListShow.push(setData);
                messageData.qaListMore.shift();
            }
            qamb[messageSeq] = messageData;
            setWebStorage(parent.qamb, qamb, 'local');
            setWebStorage(parent.qals, qals, 'local');
        }
    }
}

function fileDownload (param, filename, mimeType) {
    if (isNodeConnect) {
        parent.getToken(function (token) {
            var xhr = new XMLHttpRequest();

            xhr.open('POST', appendVersion('/chat/chatOpen/dl'), true);
            xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
            xhr.responseType = 'arraybuffer';
            xhr.onload = function(e) {
                var blob = new Blob([xhr.response], {type: mimeType});

                var reader = new FileReader();
                reader.onload = function () {
                    parent.downloadFile(reader.result, filename);
                };
                reader.onerror = function () {
                    parent.alertDialog('ダウンロードに失敗しました。');
                    errorProcess(reader.error);
                };
                reader.readAsDataURL(blob);
            };

            let sendParam = param;

            if (isEnableApi && isEnableSystemLinkage) {
                sendParam += '&visitorId=' + parent.visitorId;
            } else {
                sendParam += '&vt=' + parent.vt;
            }
            sendParam += '&token=' + token;

            xhr.send(sendParam);
        });
    } else {
        parent.alertDialog('ダウンロードに失敗しました。');
    }
}

function fileUrlDownload (url, filename, mimeType) {
    var xhr = new XMLHttpRequest();

    xhr.open('GET', setNoCacheParameter(url), true);
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    xhr.responseType = 'arraybuffer';
    xhr.onload = function(e) {
        if (xhr.readyState != 4) {
            return;
        }

        if (xhr.status == 403) {
            parent.alertDialog('ファイルが削除されています。');
        } else if (xhr.status >= 200 && xhr.status <= 299) {
            var blob = new Blob([xhr.response], {type: mimeType});

            var reader = new FileReader();
            reader.onload = function () {
                parent.downloadFile(reader.result, filename);
            };
            reader.onerror = function () {
                parent.alertDialog('ダウンロードに失敗しました。');
                errorProcess(reader.error);
            };
            reader.readAsDataURL(blob);
        }
    };
    xhr.send();
}

function createSuggest (input) {
    if (
        parent.visitChatbotType !== 2 ||
            parent.staffCallViewMode === 'started'
    ) {
        document.querySelector('#chatSuggest').innerHTML = '';
        return;
    }

    const suggestAll = [
    ];

    const suggestAllNormalized = [
    ];

    suggestCount = 0;

    let suggestHtml = '';
    let inputPreprocessed = normalizeForSuggest(input.trim());
    if (inputPreprocessed.length > 0) {
        for (let index = 0; index < suggestAll.length ; index++) {
            const question= suggestAll[index];
            if (suggestAllNormalized[index].indexOf(inputPreprocessed) > -1) {
                suggestHtml += '<button class="chat-suggest-item" type="button" data-suggest="' + escapeHtml(question) + '">' +
                        escapeHtml(question) +
                        '</button>'
                ;
                suggestCount++;
                if (suggestCount >= maxSuggestCount) {
                    break;
                }
            }
        }
    }

    document.querySelector('#chatSuggest').innerHTML = suggestHtml;
    return suggestCount;
}
