    };
    SocketEmitManager.prototype.send = function (sender) {
        if (!this.canSend()) {
            this.sendQueue.push(sender);
            return false;
        }
        return sender();
    };
    SocketEmitManager.prototype.flush = function () {
        let sender = this.sendQueue.shift();
        while (sender != null && this.canSend()) {
            sender();
            sender = this.sendQueue.shift();
        }
    };

        validateSocketData (socketData, withSiteId = true) {
            let invalidMessage = null;

            if (!('info' in socketData)) {
                return true;
            }
            const socketInfo = socketData.info;

            if (socketInfo.accountString !== 'p2JaSChat1-662') {
                // 別のアカウント
                invalidMessage = 'invalid accountString [' + socketInfo.accountString + '!=p2JaSChat1-662]';
            } else if (withSiteId && socketInfo.siteId != '1') {
                // 別の環境
                invalidMessage = 'invalid site_id [' + socketInfo.siteId + '!=1]';
            } else if (socketInfo.visitId != '50474398') {
                // 別の訪問
                invalidMessage = 'invalid visit_id [' + socketInfo.visitId + '!=50474398]';
            }

            if (invalidMessage !== null) {
                this.socket.emit('invalidMessageData', {
                    'app': 'front',
                    'action': socketData.action,
                    'accountString': socketInfo.accountString,
                    'siteId': socketInfo.siteId,
                    'visitId': socketInfo.visitId,
                    'message': invalidMessage
                });
                return false;
            }

            return true;
        }
    };

                var hour = dt.getHours();

            }
            if (callback != null) {
                callback();
            }
        });

    function filterInput(value) {

        chkValue = chkValue.replace(/\s+$/g, '');

    function sendMessageAutoAction(msgData) {
        const id = msgData.aid;
        const passedIds = msgData.passedIds;
        const msg = msgData.msg;
        const assess = msgData.assess;
        const replyTo = msgData.replyTo;
        if (socketIo.is_node_connect) {
            let fragment = document.createDocumentFragment();
            fragment.appendChild(document.createElement('div'));
            fragment.firstChild.innerHTML = msg;
            let nodeList = fragment.querySelectorAll('p');
            let urlList = [];
            for (let nodeIndex = 0; nodeIndex < nodeList.length; nodeIndex++) {
                let targetNode = nodeList[nodeIndex];
                let childNodes = targetNode.childNodes;
                for (let nodeChildIndex = 0; nodeChildIndex < childNodes.length; nodeChildIndex++) {
                    let childNode = childNodes[nodeChildIndex];
                    if (childNode.nodeType === 3) {
                        const childNodeMsg = childNode.textContent;
                        var urlArray = childNodeMsg.match(/((https?):\/\/([\w-.]+|(\d+\.){3}\d+)(:\d+)?(\/[-.!~*\'()\w;\/?:@&=+$,%#]+|\/)?)/gm);
                        if (urlArray) {
                            for (let i = 0; i < urlArray.length; i++) {
                                urlList.push(urlArray[i].replace(/&/g, '&amp;'));
                            }
                        }
                    } else {
                        var outerHtml = childNode.outerHTML;
                        var aTagMsg = outerHtml.match(/<a(?: .+?)?>.*?<\/a>/g);
                        if (aTagMsg) {
                            for (let aTagIndex = 0; aTagIndex < aTagMsg.length; aTagIndex++) {
                                const alinkUrl = aTagMsg[aTagIndex].match(/((https?):\/\/([\w-.]+|(\d+\.){3}\d+)(:\d+)?(\/[-.!~*\'()\w;\/?:@&=+$,%#]+|\/)?)/gm);
                                if (alinkUrl) {
                                    if (alinkUrl.length > 0) {
                                        urlList.push(alinkUrl[0]);
                                    }
                                }
                            }
                        }
                    }
                }
            }
            socketIo.socket.emit("sendMessageAutoAction", id, msg, replyTo, passedIds, assess, urlList);
        } else {
            sendMessageAutoActionCache.push({
                aid: id,
                passedIds: passedIds,
                msg: msg,
                assess: assess
            });
        }
    }

    function sendData(msgType, msg, attach, isSelectOption, reportDate, msgSeqOfSelectOption) {

        let isMorphologicalAnalysis = false;
        let autoMessageTime = 0;
        let updQaId = null;

        let isSelectQa = false;
        let lastQuestionMsgSeq = null;
        if (visitChatbotType == 2) {
            isSelectQa = getWebStorage(wsKeyQasl, 'local');
            lastQuestionMsgSeq = getWebStorage(wsKeyLsq, 'local') ;
        }

        if (visitChatbotType == 2 && !qa.isSessionStart() && msgType == 1 && getWebStorage('', 'local') == true) {
            let result = qa.getQaAnswer(msg, isSelectOption, reportDate, msgSeqOfSelectOption, isEnableQaAnswerEnquete);
            isMorphologicalAnalysis = result.isMa;
            updQaId = result.qaId;

            if (updQaId || updQaMId || (!result.isMa && !updQaId && !updQaMId)) {
                isSelectQa = false;
            }
            if (!updQaId && !updQaMId && !result.isMa) {
                lastQuestionMsgSeq = getWebStorage(wsKeyMsq, 'local')[0];
            }
        }
        socketIo.socket.emit("sendMessageVisitor", msgType, filterInput(msg), attach, isMorphologicalAnalysis, autoMessageTime, isReportExclude, isSelectQa, lastQuestionMsgSeq, uniqueKey);

        if ((updQaId || updQaMId) && isReportExclude === false) {
            setWebStorage(wsKeyQasl, false, 'local');
            socketIo.socket.emit("updateQaCount", updQaId, updQaMId, reportDate, msgSeqOfSelectOption);
        }
        return postDate;
    }

    function confirmDialog(msg, isShowCheck, callback, isEscapeHtml) {
        var dialogBackId = 'chatConfirmBack';
        var dialogId = 'chatConfirm';

        var dialogMsg = msg;
        if (typeof isEscapeHtml === 'undefined' || isEscapeHtml) {
            dialogMsg = escapeHtml(dialogMsg);
        }

        $('#' + dialogBackId).remove();
        $('#' + dialogId).remove();

        $('body').append('<div id="' + dialogBackId + '" class="chatConfirmBack">');
        var chatConfirmBackObj = $('#' + dialogBackId);

        // 追加
        $('body').append('<div id="' + dialogId + '" class="chatConfirm" align="center">');
        var chatConfirmObj = $('#' + dialogId);
        chatConfirmObj
                .append('<div class="openChatConfirmMsg ml15" id="chatConfirmMsg">' + dialogMsg.replace(/\n/g, '<br>') + '</div>')
                .append($('<input type="button" value="OK" class="openChatConfirmOk btn btn-default btn-large" id="chatConfirmOk">')
                        .click(function () {
                            const redisplayCheck = isShowCheck && $("#ChatRedisplayCheck").prop("checked");
                            callback(true, redisplayCheck);
                            $('#' + dialogBackId).remove();
                            $('#' + dialogId).remove();
                        }))
                .append($('<input type="button" value="キャンセル" class="openChatConfirmCancel btn btn-default btn-large" id="chatConfirmCancel">')
                        .click(function () {
                            callback(false, null);
                            $('#' + dialogBackId).remove();
                            $('#' + dialogId).remove();
                        }));

        var comfirmBackHeight = $('#chatConfirmBack').outerHeight(true);

        if (isShowCheck) {
            const chatRedisplayCheckWrapper = $('<div id="chatRedisplayCheckWrapper" class="mt15 left"></div>');
            chatRedisplayCheckWrapper.append($('<input type="checkbox" value="1" class="chatRedisplayCheck" id="ChatRedisplayCheck">'));
            chatRedisplayCheckWrapper.append($('<label for="ChatRedisplayCheck" class="chatRedisplayMsg" id="chatRedisplayMsg">一定時間表示しない</label>'));
            chatConfirmObj.append(chatRedisplayCheckWrapper);
            document.getElementById("chatConfirm").className="chatConfirmWithCheck";
        }

        // チャットを伏せている時
        if ($('#vgChatFramClose').is(':visible')) {
            // トップと文言の間隔を狭める
            chatConfirmObj.css({'padding-top': '5px'});
            // 文言とボタンの間隔を狭める
            document.getElementById("chatConfirmMsg").className="closedChatConfirmMsg mt5 ml15";
            // OKボタンとチェックの間隔を狭める
            document.getElementById("chatConfirmOk").className="btn btn-default btn-large2 closedChatConfirmOk";
            // キャンセルボタンとチェックの間隔を狭める
            document.getElementById("chatConfirmCancel").className="btn btn-default btn-large2 closedChatConfirmCancel";

            if (isShowCheck) {
                // チェックボックスとボタンの間隔を狭める
                document.getElementById("chatRedisplayCheckWrapper").className="chatRedisplayCheckWrapper mt5 left";
            } else {
                document.getElementById("chatConfirm").className="closedChatConfirmWithoutCheck";
            }

            var comfirmHeight = $('#chatConfirm').outerHeight(true);
            chatConfirmObj.css({top: (comfirmBackHeight - comfirmHeight)/2 + 'px'});
        }

        chatConfirmBackObj.click(function () {
            callback(false, null);
            $('#' + dialogBackId).remove();
            $('#' + dialogId).remove();
        });

        resizeWindow();
    }

    function alertDialog(msg) {
        var dialogBackId = 'chatAlertBack';
        var dialogId = 'chatAlert';

        $('#' + dialogBackId).remove();
        $('#' + dialogId).remove();

        $('body').append('<div id="' + dialogBackId + '" class="chatConfirmBack">');
        var chatConfirmBackObj = $('#' + dialogBackId);

        // 追加
        $('body').append('<div id="' + dialogId + '" class="chatConfirm" align="center">');
        var chatConfirmObj = $('#' + dialogId);
        chatConfirmObj
                .append('<div class="chatAlertIco"><span class="material-icons-warning"></span></div>')
                .append('<div class="chatAlertMsg">' + escapeHtml(msg).replace(/\n/g, '<br>') + '</div>')
                .append($('<input type="button" value="OK" class="btn btn-default btn-large">').click(function () {
                    $('#' + dialogBackId).remove();
                    $('#' + dialogId).remove();
                    if (isToEPlan) {
                        parent.postMessage('chatdealer_reload', '*');
                    }
                }));
        chatConfirmBackObj.click(function () {
            $('#' + dialogBackId).remove();
            $('#' + dialogId).remove();
            if (isToEPlan) {
                parent.postMessage('chatdealer_reload', '*');
            }
        });

        resizeWindow();
    }

    function closeChatByStaffOrCleaner(staffName) {
        isClosedChatByStaff = true;
        var closeFunc = function (msg) {
            if (waitStyleType === 'faq' && !isChatPage) {
                chatdealerStop();
            } else {
                $('#vgChatFramOpen')[0].contentWindow.hideInput();
                $('#vgChatFramOpen')[0].contentWindow.hideStaffCallingPopup();
                $('#vgChatFramOpen')[0].contentWindow.hideHomeButton();
                $('#vgChatFramOpen')[0].contentWindow.showCloseButton();
                if ($('#vgChatFramClose').is(':visible')) {
                    alert(msg)
                } else {
                    alertDialog(msg);
                }

                if ($('#vgQueryForm').is(':visible')) {
                    var vgQueryFormWindow = $('#vgQueryForm')[0].contentWindow;

                    if (!vgQueryFormWindow.isResist) {
                        vgQueryFormWindow.disableForm();
                    }
                }
            }
        };
        const isClosedChatByCleaner = staffName == null;
        let isSendMsg = false;
        let isSessionStart = false;
        let isStartedChat = false;
        if (visitChatbotType == 1) {
            isSendMsg = chatbot.isSendMsg();
            isSessionStart = chatbot.isSessionStart();
            isStartedChat = chatbot.isStartedChat()
        } else if (visitChatbotType == 2) {
            isSendMsg = qa.isSendMsg();
            isSessionStart = qa.isSessionStart();
            isStartedChat = qa.isStartedChat()
        }
        const isSentMessageByVisitorOrSessionStart = isSendMsg || isSessionStart;

        if (isClosedChatByCleaner && (isChatPage || isShowForm || isSentMessageByVisitorOrSessionStart)) {
            if (isToEPlan) {
                if (isToEmployeeUserAuth) {
                    socketIo.disconnectNoRetry();
                    closeFunc('認証に失敗しました。\n再度ログインしてください。');
                } else {
                    closeFunc('タイムアウトしました。\nOKボタンを押下するとチャットが再起動します。');
                }
            } else {
                closeFunc('タイムアウトしました。\nもう一度開きなおしてください。');
            }
        } else if (staffName != null && isStartedChat) {
            closeFunc(staffName + 'がチャットを終了しました。');
        } else {
            endForm(false, true);
        }
    }

    function endChatAndCloseChatForToEmployeeUserAuth() {
        isEndChat = true;
        endChat();

        closeChatByStaffOrCleaner(null);
    }

    function getDateFormat(timestamp) {
        let d = new Date(timestamp);
        return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + d.getMinutes() + ':' + d.getSeconds();
