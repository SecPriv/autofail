<html><head><style>
form {
  margin: 0;
}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
input:-webkit-autofill:active {
    transition: background-color 5000s ease-in-out 0s;
}

form a {
  color: inherit;
  text-decoration: inherit;
}

.edrone-onsite-popup-content__content-wrapper {
  max-height: 100%;
  max-width: 100%;
  display: flex;
}

.edrone-onsite-popup-content__content-wrapper {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.edrone-onsite-popup-content__content-wrapper::-webkit-scrollbar {
  display: none;
}

.edrone-onsite-popup-content p {
  margin: 0;
}
.edrone-onsite-popup-content label {
  display: block;
  padding-bottom: 8px;
}

.edrone-onsite-popup-content input {
  width: 100%;
}

.edrone-onsite-input-wrapper {
  position: relative;
}

.edrone-onsite-input-wrapper svg {
  height: 18px;
  pointer-events: none;
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
}

.edrone-onsite-popup-content input[type='checkbox'] {
  width: auto;
}

.edrone-checkbox--required-unchecked {
  outline: 1px auto #ff000059 !important;
}

.edrone-onsite-popup-content input:focus-visible {
  outline: none;
}

.edrone-onsite-popup-content-checkbox p {
  margin: 0;
}

.position-center {
  justify-content: center;
  align-items: center;
}

.position-top-left {
  justify-content: start;
  align-items: start;
}

.position-top-right {
  justify-content: end;
  align-items: start;
}

.position-bottom-left {
  justify-content: start;
  align-items: end;
}

.position-bottom-right {
  justify-content: end;
  align-items: end;
}

@media screen and (min-width: 601px) {
  .min-height-auto {
    min-height: auto !important;
    background-position: var(--edrone-popup-background-position, center 50%) !important;
  }
}

@media screen and (max-width: 600px) {
  .hideOnMobile {
    display: none !important;
  }

  .position-mobile-center {
    justify-content: center !important;
    align-items: center !important;
  }

  .position-mobile-top {
    justify-content: center;
    align-items: start !important;
  }

  .position-mobile-bottom {
    justify-content: center;
    align-items: end !important;
  }

  .mobile-above {
    flex-direction: column !important;
  }
  .mobile-below {
    flex-direction: column-reverse !important;
  }

  .stacked-image-layout {
    min-height: var(--edrone-popup-image-mobile-height) !important;
  }

  .edrone-onsite-popup-elements-wrapper {
    grid-template-columns: 1fr !important;
  }

  .edrone-onsite-popup-two-columns-wrapper {
    margin-left: 0 !important;
    margin-right: 0 !important;
    width: 100% !important;
  }
}
