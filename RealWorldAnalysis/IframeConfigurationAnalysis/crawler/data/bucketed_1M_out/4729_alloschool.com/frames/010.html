une certaine personnalisation, comme l\\\\u0027ajout de notes ou la surbrillance de passages importants.\\\"]],[[2,\\\"Facilit\\\\u00e9 d\\\\u0027acc\\\\u00e8s et mise \\\\u00e0 jour des contenus\\\"]],[null,[\\\"La portabilit\\\\u00e9 est un avantage consid\\\\u00e9rable : un seul appareil peut contenir une biblioth\\\\u00e8que enti\\\\u00e8re de manuels, all\\\\u00e9geant ainsi les cartables des \\\\u00e9l\\\\u00e8ves. Par ailleurs, les \\\\u00e9diteurs peuvent mettre \\\\u00e0 jour les contenus des manuels num\\\\u00e9riques plus facilement et plus fr\\\\u00e9quemment que leurs homologues papier. Cela garantit que les informations sont toujours actuelles, notamment dans des domaines o\\\\u00f9 les connaissances \\\\u00e9voluent rapidement, comme les sciences ou les technologies.\\\"]],[[2,\\\"Consid\\\\u00e9rations pour l\\\\u0027acquisition de manuels num\\\\u00e9riques\\\"]],[null,[\\\"Lors de l\\\\u0027achat de manuels scolaires num\\\\u00e9riques, il est important de v\\\\u00e9rifier la compatibilit\\\\u00e9 avec vos appareils et les syst\\\\u00e8mes d\\\\u0027exploitation utilis\\\\u00e9s. Assurez-vous \\\\u00e9galement de la dur\\\\u00e9e de la licence d\\\\u0027utilisation, car elle peut varier d\\\\u0027un \\\\u00e9diteur \\\\u00e0 l\\\\u0027autre. La facilit\\\\u00e9 d\\\\u0027utilisation de l\\\\u0027interface et la qualit\\\\u00e9 du support technique sont aussi des crit\\\\u00e8res \\\\u00e0 prendre en compte pour une exp\\\\u00e9rience d\\\\u0027apprentissage optimale. De nombreuses \\\\u00e9coles proposent des solutions group\\\\u00e9es pour faciliter l\\\\u0027acc\\\\u00e8s \\\\u00e0 ces ressources.\\\"]],[[2,\\\"Pros \\\\u0026 Cons\\\"]],[null,null,[[\\\"Interactivit\\\\u00e9 et multim\\\\u00e9dia enrichis pour un apprentissage dynamique. (+)\\\",\\\"Portabilit\\\\u00e9 et all\\\\u00e8gement des cartables. (+)\\\",\\\"Mises \\\\u00e0 jour rapides et r\\\\u00e9guli\\\\u00e8res des contenus. (+)\\\",\\\"D\\\\u00e9pendance \\\\u00e0 la technologie et \u00e8ge\\\"]],[null,[\\\"Le programme de Fran\\\\u00e7ais au coll\\\\u00e8ge vise \\\\u00e0 d\\\\u00e9velopper les comp\\\\u00e9tences en lecture, \\\\u00e9criture, expression orale et culture litt\\\\u00e9raire. En 6\\\\u00e8me, les \\\\u00e9l\\\\u00e8ves consolident les bases de la grammaire et de l\\\\u0027orthographe, tout en d\\\\u00e9couvrant les genres litt\\\\u00e9raires. En 3\\\\u00e8me, ils abordent des \\\\u0153uvres plus complexes et se pr\\\\u00e9parent au Brevet des Coll\\\\u00e8ges avec des exercices de r\\\\u00e9daction et d\\\\u0027analyse de texte. Un bon niveau en fran\\\\u00e7ais est crucial pour toutes les autres mati\\\\u00e8res, car il conditionne la compr\\\\u00e9hension et la capacit\\\\u00e9 \\\\u00e0 s\\\\u0027exprimer clairement.\\\"]],[[2,\\\"Les Math\\\\u00e9matiques : du calcul \\\\u00e0 l\\\\u0027alg\\\\u00e8bre\\\"]],[null,[\\\"Les cours de Math\\\\u00e9matiques au coll\\\\u00e8ge progressent de l\\\\u0027arithm\\\\u00e9tique et de la g\\\\u00e9om\\\\u00e9trie \\\\u00e9l\\\\u00e9mentaire en 6\\\\u00e8me vers l\\\\u0027alg\\\\u00e8bre, les fonctions et les statistiques en 3\\\\u00e8me. L\\\\u0027objectif est de d\\\\u00e9velopper le raisonnement logique et la capacit\\\\u00e9 \\\\u00e0 r\\\\u00e9soudre des probl\\\\u00e8mes. Les exercices pratiques et la compr\\\\u00e9hension des concepts sont privil\\\\u00e9gi\\\\u00e9s pour pr\\\\u00e9parer les \\\\u00e9l\\\\u00e8ves aux exigences du lyc\\\\u00e9e. La ma\\\\u00eetrise des math\\\\u00e9matiques est souvent per\\\\u00e7ue comme un indicateur cl\\\\u00e9 de la r\\\\u00e9ussite scolaire et ouvre de nombreuses portes vers les fili\\\\u00e8res scientifiques et techniques.\\\"]],[[2,\\\"Sciences et Technologies : explorer le monde\\\"]],[null,[\\\"Les cours de Sciences et Technologies (Physique-Chimie, Sciences de la Vie et de la Terre, Technologie) au coll\\\\u00e8ge permettent aux \\\\u00e9l\\\\u00e8ves d\\\\u0027explorer le monde naturel et technologique. Ils r\\\\u00e9alisent des exp\\\\u00e9riences, observent des ph\\\\u00e9nom\\\\u00e8nes et apprennent \\\\u00e0 comprendre les principes scientifiques qui r\\\\u00e9gissent notre environnement. Ces mati\\\\u00e8res stimulent la curiosit\\\\u00e9 et l\\\\u0027esprit critique, tout en introduisant les bases de la d\\\\u00e9marche scientifique. Elles sont essentielles pour comprendre les enjeux contemporains li\\\\u00e9s \\\\u00e0 l\\\\u0027environnement, \\\\u00e0 la sant\\\\u00e9 et aux innovations technologiques.\\\"]],[[2,\\\"Prochaines \\\\u00e9tapes pour un soutien scolaire efficace\\\"]],[null,[\\\"Pour accompagner au mieux un \\\\u00e9l\\\\u00e8ve au coll\\\\u00e8ge en France, il est conseill\\\\u00e9 de s\\\\u0027informer r\\\\u00e9guli\\\\u00e8rement sur les programmes sp\\\\u00e9cifiques \\\\u00e0 chaque niveau et mati\\\\u00e8re. De nombreuses ressources en ligne, des manuels scolaires compl\\\\u00e9mentaires et des plateformes de soutien scolaire peuvent compl\\\\u00e9ter les cours dispens\\\\u00e9s en classe. N\\\\u0027h\\\\u00e9sitez pas \\\\u00e0 dialoguer avec les enseignants et \\\\u00e0 envisager des cours particuliers si des difficult\\\\u00e9s persistent, afin de garantir une progression constante et de renforcer la confiance de l\\\\u0027\\\\u00e9l\\\\u00e8ve dans ses capacit\\\\u00e9s. Un suivi attentif est la cl\\\\u00e9 de la r\\\\u00e9ussite.\\\"]]]],null,1],null,\\\"El8BlLqpjxrrCDoMNE95ljI2kQ8nuS7_7p7-ieotYOLMuREaa76wc7Q5hPVomMia5q7rOwK9n4_nqQJgL-4PiXiKE3HvnU0F38H8npoUWs0MXyoaDMg6RumbpCljWF0XQiAG\\\"],[\\\"Math\\\\u00e9matiques\\\",[],[],[],null,null,null,null,null,[[[[[2,\\\"L\\\\u0027importance des Math\\\\u00e9matiques dans notre quotidien\\\"]],[null,[\\\"Les math\\\\u00e9matiques sont bien plus qu\\\\u0027une simple discipline scolaire ; elles repr\\\\u00e9sentent un langage universel et un outil fondamental pour comprendre et interagir avec le monde qui nous entoure. De la gestion de vos finances personnelles \\\\u00e0 la conception d\\\\u0027infrastructures complexes, en passant par le d\\\\u00e9veloppement de nouvelles technologies, les principes math\\\\u00e9matiques sont omnipr\\\\u00e9sents. Acqu\\\\u00e9rir une bonne compr\\\\u00e9hension des math\\\\u00e9matiques est essentiel pour la r\\\\u00e9solution de probl\\\\u00e8mes et la prise de d\\\\u00e9cisions \\\\u00e9clair\\\\u00e9es dans de nombreux domaines de la vie.\\\"]],[[2,\\\"Exploration des concepts cl\\\\u00e9s : l\\\\u0027Alg\\\\u00e8bre\\\"]],[null,[\\\"L\\\\u0027alg\\\\u00e8bre est une branche des math\\\\u00e9matiques qui utilise des lettres et des symboles pour repr\\\\u00e9senter des nombres et des quantit\\\\u00e9s dans des \\\\u00e9quations et des formules. Elle constitue une \\\\u00e9tape cruciale pour passer de l\\\\u0027arithm\\\\u00e9tique pure \\\\u00e0 des raisonnements plus abstraits et complexes. La ma\\\\u00eetrise de l\\\\u0027alg\\\\u00e8bre est indispensable pour quiconque souhaite poursuivre des \\\\u00e9tudes scientifiques, techniques ou \\\\u00e9conomiques, car elle fournit les bases pour r\\\\u00e9soudre des probl\\\\u00e8mes vari\\\\u00e9s, de la mod\\\\u00e9lisation financi\\\\u00e8re \\\\u00e0 l\\\\u0027ing\\\\u00e9nierie. Comprendre l\\\\u0027alg\\\\u00e8bre permet de d\\\\u00e9mystifier de nombreux processus et d\\\\u0027am\\\\u00e9liorer sa pens\\\\u00e9e logique.\\\"]],[[2,\\\"D\\\\u00e9couvrir la G\\\\u00e9om\\\\u00e9trie et ses applications\\\"]],[null,[\\\"La g\\\\u00e9om\\\\u00e9trie est l\\\\u0027\\\\u00e9tude des formes, des tailles, des positions relatives des figures et des propri\\\\u00e9t\\\\u00e9s de l\\\\u0027espace. Des pyramides \\\\u00e9gyptiennes aux gratte-ciel modernes, la g\\\\u00e9om\\\\u00e9trie a toujours \\\\u00e9t\\\\u00e9 au c\\\\u0153ur de l\\\\u0027architecture et du design. Elle est \\\\u00e9galement fondamentale en cartographie, en infographie et dans la robotique. Apprendre la g\\\\u00e9om\\\\u00e9trie aide \\\\u00e0 d\\\\u00e9velopper la perception spatiale et la capacit\\\\u00e9 \\\\u00e0 visualiser \\\u00e9thodes d\\\\u0027enseignement et d\\\\u0027apprentissage.\\\"]]]],null,1],null,\\\"El8BlLqpj2oJVXMVyZs0FzYrLFv4Az8P6JCQzd2F5IV4UKYoZbqHPYxW-PmaT81usz0z_ETDriLUfONYSTqm7kEtTqYVCW8E7CdMH0K1nG__3nE6NgsKA2mPx5fadI0YvSAG\\\"],[\\\"Enseignement\\\",[],[],[],null,null,null,null,null,[[[[[2,\\\"L\\\\u0027importance de l\\\\u0027enseignement dans le d\\\\u00e9veloppement personnel et professionnel\\\"]],[null,[\\\"L\\\\u0027enseignement est un pilier fondamental de toute soci\\\\u00e9t\\\\u00e9, jouant un r\\\\u00f4le crucial dans le d\\\\u00e9veloppement intellectuel, social et professionnel des individus. Il ne se limite pas \\\\u00e0 la transmission de connaissances, mais englobe \\\\u00e9galement le d\\\\u00e9veloppement de comp\\\\u00e9tences critiques, de la cr\\\\u00e9ativit\\\\u00e9 et de la capacit\\\\u00e9 \\\\u00e0 r\\\\u00e9soudre des probl\\\\u00e8mes. Qu\\\\u0027il soit formel ou informel, l\\\\u0027enseignement ouvre des portes et fa\\\\u00e7onne l\\\\u0027avenir de chacun.\\\"]],[[2,\\\"L\\\\u0027enseignement traditionnel en salle de classe\\\"]],[null,[\\\"L\\\\u0027enseignement traditionnel en salle de classe, des \\\\u00e9coles primaires aux universit\\\\u00e9s, reste une m\\\\u00e9thode \\\\u00e9prouv\\\\u00e9e et essentielle. Il offre un environnement structur\\\\u00e9 o\\\\u00f9 les \\\\u00e9l\\\\u00e8ves et les \\\\u00e9tudiants interagissent directement avec les \\\\u00e9ducateurs et leurs pairs. Cette approche favorise les discussions, le travail collaboratif et permet un suivi personnalis\\\\u00e9 de la progression de chaque apprenant. C\\\\u0027est un cadre propice \\\\u00e0 l\\\\u0027acquisition de bases solides et \\\\u00e0 la construction de relations sociales.\\\"]],[[2,\\\"L\\\\u0027enseignement \\\\u00e0 distance et les plateformes num\\\\u00e9riques\\\"]],[null,[\\\"Avec l\\\\u0027av\\\\u00e8nement des technologies num\\\\u00e9riques, l\\\\u0027enseignement \\\\u00e0 distance a connu une croissance exponentielle, offrant une flexibilit\\\\u00e9 sans pr\\\\u00e9c\\\\u00e9dent. Des plateformes comme Coursera, edX ou OpenClassrooms proposent une vaste gamme de cours en ligne, de certifications et de dipl\\\\u00f4mes. Cette modalit\\\\u00e9 permet aux apprenants d\\\\u0027acc\\\\u00e9der \\\\u00e0 des contenus \\\\u00e9ducatifs de qualit\\\\u00e9 depuis n\\\\u0027importe o\\\\u00f9, \\\\u00e0 leur propre rythme, rendant l\\\\u0027\\\\u00e9ducation plus accessible \\\\u00e0 un public mondial.\\\"]],[[2,\\\"L\\\\u0027enseignement sp\\\\u00e9cialis\\\\u00e9 et les formations professionnelles\\\"]],[null,[\\\"Au-del\\\\u00e0 de l\\\\u0027\\\\u00e9ducation g\\\\u00e9n\\\\u00e9rale, l\\\\u0027enseignement sp\\\\u00e9cialis\\\\u00e9 et les formations professionnelles sont essentiels pour l\\\\u0027acquisition de comp\\\\u00e9tences sp\\\\u00e9cifiques recherch\\\\u00e9es sur le march\\\\u00e9 du travail. Ces programmes, souvent dispens\\\\u00e9s par des centres de formation ou des \\\\u00e9coles techniques, sont con\\\\u00e7us pour r\\\\u00e9pondre aux besoins pr\\\\u00e9cis des industries. Ils permettent aux individus de se perfectionner, de se reconvertir ou d\\\\u0027obtenir des qualifications reconnues, augmentant ainsi leur employabilit\\\\u00e9.\\\"]],[[2,\\\"L\\\\u0027apprentissage tout au long de la vie\\\"]],[null,[\\\"Dans un monde en constante \\\\u00e9volution, le concept d\\\\u0027apprentissage tout au long de la vie est devenu plus pertinent que jamais. Il s\\\\u0027agit d\\\\u0027une d\\\\u00e9marche continue d\\\\u0027acquisition de connaissances et de comp\\\\u00e9tences, que ce soit par le biais de cours formels, de lectures, de formations en ligne ou d\\\\u0027exp\\\\u00e9riences pratiques. Cette approche permet de rester adaptable, pertinent et de s\\\\u0027\\\\u00e9panouir personnellement et professionnellement face aux nouveaux d\\\\u00e9fis.\\\"]]]],null,1],null,\\\"El8BlLqpj7sRXP-BAhHo32qyKQxQ7WRx1At7gf6vMV09R7bncZg_VSd7G7NGF1CjdwTebItphgvIWxA8GjxRR2jUKPlQuEEmN3BKnGiRI1Up-_exDotewYHYr8_YEJZb_yAG\\\"],[\\\"Cours Primaire Maroc\\\",[],[],[],null,null,null,null,null,[[[[[2,\\\"Comprendre le Syst\\\\u00e8me des Cours Primaires au Maroc\\\"]],[null,[\\\"Le syst\\\\u00e8me des cours primaires au Maroc constitue la premi\\\\u00e8re \\\\u00e9tape fondamentale de l\\\\u0027\\\\u00e9ducation des enfants, g\\\\u00e9n\\\\u00e9ralement de 6 \\\\u00e0 12 ans. Il s\\\\u0027organise sur six ann\\\\u00e9es et vise \\\\u00e0 fournir aux \\\\u00e9l\\\\u00e8ves les bases essentielles en lecture, \\\\u00e9criture, calcul, ainsi qu\\\\u0027une initiation aux sciences, \\\\u00e0 l\\\\u0027histoire et \\\\u00e0 la g\\\\u00e9ographie. L\\\\u0027enseignement est majoritairement dispens\\\\u00e9 en arabe, avec une introduction progressive du fran\\\\u00e7ais d\\\\u00e8s les premi\\\\u00e8res ann\\\\u00e9es, pr\\\\u00e9parant ainsi les \\\\u00e9l\\\\u00e8ves aux cycles sup\\\\u00e9rieurs. Ce cycle est crucial pour le d\\\\u00e9veloppement cognitif et social des jeunes apprenants.\\\"]],[[2,\\\"Le Programme Scolaire et les Mati\\\\u00e8res Enseign\\\\u00e9es\\\"]],[null,[\\\"Le programme des cours primaires au Maroc est con\\\\u00e7u pour \\\\u00eatre \\\\u00e9quilibr\\\\u00e9 et complet. Les mati\\\\u00e8res principales incluent l\\\\u0027\\\\u00e9ducation islamique, la langue arabe, le fran\\\\u00e7ais, les math\\\\u00e9matiques, les sciences et l\\\\u0027\\\\u00e9ducation physique. Au fur et \\\\u00e0 mesure que les \\\\u00e9l\\\\u00e8ves progressent dans les niveaux, les concepts deviennent plus complexes et les comp\\\\u00e9tences attendues plus affin\\\\u00e9es. L\\\\u0027accent est mis sur l\\\\u0027acquisition de comp\\\\u00e9tences fondamentales qui serviront de tremplin pour les \\\\u00e9tudes futures, tout en favorisant le d\\\\u00e9veloppement de la pens\\\\u00e9e critique et de la cr\\\\u00e9ativit\\\\u00e9 chez les enfants.\\\"]],[[2,\\\"L\\\\u0027Importance de l\\\\u0027Encadrement P\\\\u00e9dagogique\\\"]],[null,[\\\"Un encadrement p\\\\u00e9dagogique de qualit\\\\u00e9 est essentiel pour la r\\\\u00e9ussite des \\\\u00e9l\\\\u00e8ves au primaire. Les enseignants jouent un r\\\\u00f4le primordial dans l\\\\u0027accompagnement des enfants, en adoptant des m\\\\u00e9thodes d\\\\u0027enseignement adapt\\\\u00e9es \\\\u00e0 leur \\\\u00e2ge et \\\\u00e0 leur rythme d\\\\u0027apprentissage. Le suivi des progr\\\\u00e8s, l\\\\u0027identification des difficult\\\\u00e9s et la mise en place de soutiens personnalis\\\\u00e9s sont des aspects cruciaux. Les \\\\u00e9coles primaires marocaines, qu\\\\u0027elles soient publiques ou priv\\\\u00e9es, s\\\\u0027efforcent de cr\\\\u00e9er un environnement propice \\\\u00e0 l\\\\u0027apprentissage et \\\\u00e0 l\\\\u0027\\\\u00e9panouissement des enfants.\\\"]],[[2,\\\"Le R\\\\u00f4le des Parents dans le Parcours \\\\u00c9ducatif\\\"]],[null,[\\\"La participation des parents est un facteur cl\\\\u00e9 de succ\\\\u00e8s dans le parcours \\\\u00e9ducatif primaire. En collaborant avec les enseignants, en suivant les devoirs et en encourageant leurs enfants, les parents peuvent grandement influencer la motivation et les r\\\\u00e9sultats scolaires. De nombreuses \\\\u00e9coles organisent des r\\\\u00e9unions et des activit\\\\u00e9s pour impliquer les familles, renfor\\\\u00e7ant ainsi le lien entre la maison et l\\\\u0027\\\\u00e9cole. Cette synergie est fondamentale pour assurer une exp\\\\u00e9rience \\\\u00e9ducative coh\\\\u00e9rente et enrichissante pour l\\\\u0027enfant.\\\"]],[[2,\\\"Options \\\\u00c9ducatives Compl\\\\u00e9mentaires au Maroc\\\"]],[null,[\\\"Au-del\\\\u00e0 de l\\\\u0027enseignement primaire traditionnel, il existe diverses options compl\\\\u00e9mentaires et des soutiens scolaires pour les \\\\u00e9l\\\\u00e8ves qui en ont besoin. Des cours de soutien individuels ou en groupe, des ateliers de remise \\\\u00e0 niveau, ou encore des plateformes \\\\u00e9ducatives en ligne peuvent compl\\\\u00e9ter l\\\\u0027apprentissage en classe. Ces ressources suppl\\\\u00e9mentaires peuvent aider \\\\u00e0 consolider les acquis, \\\\u00e0 surmonter des difficult\\\\u00e9s sp\\\\u00e9cifiques ou \\\\u00e0 approfondir certaines mati\\\\u00e8res, offrant ainsi des opportunit\\\\u00e9s d\\\\u0027apprentissage adapt\\\\u00e9es \\\\u00e0 chaque enfant.\\\"]]]],null,1],null,\\\"EmABlLqpj17B3Mu_zTx8hcsiAq1nqZeBYt3cGJSi_LmU09MQAIFyTxuOS7uxtU3rvZ32cBsYNfaODY19L0Ru6y3icIE-PfMhg9lRsbDFP0axTc2ppPPIktZzHEVJ7AUoBY0gBg\\\"],[\\\"Ressources P\\\\u00e9dagogiques \\\\u00c9cole\\\",[],[],[],null,null,null,null,null,null,null,\\\"El8BlLqpjyosy5UWonjtxzGezQ_9lmpBBrW0ed3LpOkGI-7A_BTUgZwdywdnP_vyV4GkFYiH1vLf99Mfz4qteDGG8euYhc4Fx9s3Rx3QvuUx0bkCNfmMv9uj4Cbk6m9QEyAG\\\"],[\\\"Math\\\\u00e9matiques Coll\\\\u00e8ge\\\",[],[],[],null,null,null,null,null,null,null,\\\"EmABlLqpj2BAZIGvqE_EQHuRAJTWAc_TMMrd-Zrma5J4zo7gYl1W6Ktp3z8EzjhdanjTI13t1fHvn_dyCzT7taww15AQib7cEz4zNvSVNkR1Q6HPuLZBzU2hgi8lpAci6AEgBg\\\"],[\\\"Soutien Scolaire Primaire\\\",[],[],[],null,null,null,null,null,null,null,\\\"El8BlLqpj-P6V7jgTc5eyRrxRgAh0pm1LJ26lnEw5SnTrXdhk1gw6pmSqnb1R-tejwU7bZ34vSivliiyjuJcy63DVP9JNveOEe320sbvLlaQFs7SZ4DzTo4EKCwltzTxbSAG\\\",\\\"El8BlLqpj1k7YHgGDyVgsf4AwjoT4yBd1KHvWM-brGtZCtvogEvc_U0f1dNXQ4E6OdP5rsPrroDl_hAqJuLTfxPczLQoZ6VI5Ax3Ambbqj9QrjWCsCMLdJ_iSt1jnNRIviAG\\\"],[\\\"Economie\\\",[],[],[],null,null,null,null,null,null,null,\\\"El8BlLqpjzP6Nt-AJrEx5TGyMqsv1NOdx_Qw7pGqWM4EJnidoViiLqhAM-fIic2dEmdlgaQDHqk0u7XVPoENv4F87z-WYI4mc8mljmW7zm1wvgc_xKE2_G33uEp5SqSqriAG\\\"],[\\\"Examens 5\\\\u00e8me Primaire\\\",[],[],[],null,null,null,null,null,null,null,\\\"EmABlLqpj0T6A4KJLrDTqN4mX51aNas4sz_3vBwfOVKfD7RV5jju5eDkEHkWZSbh1ke4wvRUMMSReY5zJ4nYD5Pb3fHreXqD7nokzbWK_0iEicZf0Fh37TIyLE0-v3-DeK8gBg\\\"],[\\\"Cours Pr\\\\u00e9paration Concours\\\",[],[],[],null,null,null,null,null,null,null,\\\"EmABlLqpj9mwnts_t8fpMhCkcCZajC_eUJKBL1wT7e9kaIboLe4s5EIZWIw176U9WsTus85ei4d4IXX3V4cEnBA54VBtBpd6RB93fdmgo7zeHEBWjd1lnNWBrq8L50t1hwcgBg\\\"],[\\\"SVT Coll\\\\u00e8ge\\\",[],[],[],null,null,null,null,
