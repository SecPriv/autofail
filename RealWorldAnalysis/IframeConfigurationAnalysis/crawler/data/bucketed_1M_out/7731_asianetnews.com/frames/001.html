}

.janya-buffer-bar {

    left: 0;
    top: 0;
    height: 100%;

}

.janya-progress-bar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background-color: #eb581f;
    border-radius: 8px;
    transition: width 0.25s ease;
    z-index: 2;
}

.janya-knob {
    position: absolute;
    top: 50%;
    height: 12px;
    width: 12px;
    background-color: #eb581f;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: left 0.25s ease;
    z-index: 2;
}

.janya-knob:hover {
    width: 16px;
    height: 16px;
}

.janya-controls-row {

.janya-left-controls {

.janya-control-group {

.janya-control-group:hover {

    background-color: transparent;

    border: none;

    aspect-ratio: 1;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
}

.janya-button svg {
    width: 100%;
    height: 100%;
    display: block;
}

.janya-volume-level {

    width: 0px;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.janya-volume-track {

    transition: opacity 0.2s ease;
}

.janya-volume-knob:hover {

.janya-volume-group {

.janya-resolution-item.active {

.janya-resolution-item .check {

    background-color: rgba(0, 0, 0, 0.6);
    color: white;
    z-index: 999;
    padding: 10px;
    font-size: 30px;

    /* width: 30px; */
    aspect-ratio: 1;
    justify-content: center;
    align-items: center;
}

.janya-ad-toggle-button:hover {

}

.janya-container:hover .janya-ad-toggle-button.active {
    display: flex;
}

.janya-loader-container {
    position: absolute;
    padding: 10px;

    z-index: 999;
    justify-content: center;
    align-items: center;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    display: none;
}

.janya-loader {
    width: 40px;
    height: 40px;
    border: 3px solid #fff;
    border-bottom-color: transparent;
    border-radius: 50%;
    display: inline-block;
    box-sizing: border-box;
    animation: rotation 1s linear infinite;
}

@keyframes rotation {
    0% {
        transform: rotate(0deg);

    100% {
        transform: rotate(360deg);
    }
}

.janya-ad-audio-button {
    display: none;
    position: absolute;

.show {

.janya-seek-overlay {

    border-radius: 8px;
    font-size: 18px;
    font-weight: 600;
    pointer-events: none;
    opacity: 0;
    transition:
        opacity 0.2s ease,
        transform 0.2s ease;
}

.janya-seek-overlay.forward {

.janya-seek-overlay.rewind {
    left: 20%;
}

.janya-seek-overlay.show {
    opacity: 1;
}
