<!DOCTYPE html><html lang="ko"><head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&amp;display=swap" rel="stylesheet">
  <title>Native Lab 광고</title>
  <style>
    html, body, span, div, button, a, img {
      margin: 0;
      padding: 0;
      border: 0;
      box-sizing: border-box;
      font-family: "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", Dotum, 돋움, Arial, sans-serif;
    }
    a {
      text-decoration: none;
    }
    a:hover {
      text-decoration: none;
    }
    img {
      width: 100%;
    }
    .sr-only {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: -1;
      text-align: center;
      white-space: nowrap;
      display: block;
      opacity: 0;
      font-size: 0;
      line-height: 0;
    }
    .category-text {
      position: relative;
      display: inline-block;
      padding-right: 8px;
      margin-right: 8px;
    }
    .category-text:after {
      content: "";
      position: absolute;
      right: 0;
      top: 6px;
      bottom: 6px;
      width: 2px;
      background-color: #dfdfdf;
    }
    .native-lab-slide {
      position: relative;
      display: block;
      width: 300px;
    }
    .native-lab-slide .slide-title {
      display: block;
      margin-bottom: 15px;
      font-size: 17px;
      font-weight: bold;
      font-stretch: normal;
      font-style: normal;
      line-height: 1.76;
      letter-spacing: -0.4px;
      text-align: left;
      color: #121212;
    }
    .native-lab-slide .slide-img {
      font-size: 0;
      line-height: 0;
    }
    .native-lab-title {
      display: block;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: 900;
      text-align: left;
    }
    .native-lab {
      position: relative;
    }
    .native-lab .slide-box {
      font-size: 0;
      line-height: 0;
    }
  </style>
</head>
<body>
  <div>
    <div class="native-lab">
      <div class="slide-box">
        <a href="https://adservice.hani.co.kr/RealMedia/ads/click_lx.ads/hani_desktop/L12/1841223138/x72/Hani/NativeAd_x71-73_2025/baby_300180_251120_v1.html/67494a7755576f52684a634141615a4b" target="_blank" class="native-lab-slide">
          <span class="slide-title"><span class="category-text">육퇴한 밤</span>‘이 질문’ 잘 해주면 책과 교과서, 문제도 꼼꼼히 읽습니다. #신효원 소장</span>
          <div class="slide-img"><img src="https://adimg.hani.co.kr/adimg/baby_300180_251120_v1.jpg" alt=""></div>
        </a>
      </div>
    </div>
  </div></body></html>
