<!DOCTYPE html><html lang="en-US"><head><script class="w-json-ld" type="application/ld+json" id="w-json-ldwistia_97">{"@context":"http://schema.org/","@id":"https://fast.wistia.net/embed/iframe/qx0g5zbxdl","@type":"VideoObject","duration":"PT5M1S","name":"Flying Through Moneybird 🇳🇱🇬🇧","thumbnailUrl":"https://embed-ssl.wistia.com/deliveries/2abde28007bc7a394716070e24667a54.jpg?image_crop_resized=640x360","embedUrl":"https://fast.wistia.net/embed/iframe/qx0g5zbxdl","uploadDate":"2026-02-11T09:28:46.000Z","description":"a Vliegensvlug door Moneybird (Demo) video","contentUrl":"https://embed-ssl.wistia.com/deliveries/8fc6cf6498edb0b05521b8dffbd1a602aa753368.m3u8","transcript":"Moneybird.\n\nMoneybird, wat kun jij er mee?\n\nLaten we dat zo kort mogelijk proberen uit te leggen zodat jij een goede indruk krijgt.\n\nJa, wij zijn Loes en Liesbeth en we laten je zien wat je van Moneybird kunt verwachten. We laten je de basis zien die je nodig hebt voor een complete boekhouding.\n\nAl vijftien jaar willen wij het ondernemers gemakkelijk maken. Bij ons heb je geen uitgebreide boekhoudkennis nodig en kun je het grootste gedeelte van je boekhouding gewoon helemaal zelf doen.\n\nVan eenvoudige facturen versturen tot het volledig bijhouden van je boekhouding. Jij bepaalt wat je nodig hebt en als we jou het werk uit handen kunnen nemen, heb jij meer tijd voor de leuke dingen.\n\nWe nemen je kort mee door\n\nMoneybird. Als je je hebt aangemeld kun je in elk tabblad meteen aan de slag. Links zie je alle tabbladen, zoals facturen, bank en contacten.\n\nHelemaal onderaan vind je de instellingen. Hier vind je belangrijke onderdelen van je administratie.\n\nJe bedrijfsgegevens, btw-tarieven, categorieën, huisstijlen en workflows.\n\nDe uitstraling van je facturen en offertes kan je instellen bij de huisstijlinstellingen.\n\nHet is mogelijk om meerdere huisstijlen aan te maken. Bij het verzenden van een factuur kan je de juiste huisstijl kiezen.\n\nWanneer je een huisstijl gaat bewerken, kan je een logo toevoegen, een lettertype kiezen of een achtergrond aanpassen.\n\nOok bepaal je welke gegevens je wel en niet wil weergeven op je facturen. In de huisstijl maak je ook de e-mail op, die als begeleidende e-mail bij jouw factuur wordt meegestuurd.\n\nWil je een iDEAL betaalverzoek meesturen naar je klant? Of instellen wanneer je automatisch herinneringen verstuurt? Dat regel je in de workflow.\n\nIn een workflow pas je de standaardinstellingen van je facturen aan. Bijvoorbeeld de taal, valuta en eventuele standaard bijlagen die je bij je factuur mee wilt sturen.\n\nOok kun je hier de standaard teksten aanpassen.\n\nHier kun je online betaalmethoden activeren.\n\nDaarmee laat je je klant eenvoudig en automatisch, via een betaalverzoek online betalen.\n\nHier pas je de betaaltermijn aan.\n\nJe kunt verschillende workflows aanmaken en opslaan bij je contacten.\n\nBijvoorbeeld een Engelse workflow, zodat je Engelse klant een factuur krijgt in de juiste taal.\n\nOké, dat waren de basisinstellingen voor het verzenden van je factuur.\n\nDat was best makkelijk toch?\n\nDat was wel redelijk makkelijk\n\nja.\n\nMaar ik ga je nu iets echt makkelijks laten zien, het verzenden van facturen.\n\nOm je factuur te sturen ga je naar het tabblad 'Facturen'. Klik op 'Factuur toevoegen' en selecteer een contact.\n\nHet factuurnummer wordt automatisch voor je aangemaakt.\n\nVervolgens vul je je product of dienst in, het aantal, het bedrag en natuurlijk een BTW-tarief.\n\nOok kun je de factuurregels koppelen aan een categorie of eventueel project.\n\nDan is het in je rapporten ook gelijk overzichtelijk.\n\nJe slaat de gegevens op en verzendt de factuur. De status van de factuur is direct te zien in het overzicht.\n\nJe klant ontvangt een e-mail met daarin de factuur, natuurlijk in de huisstijl die je hebt geselecteerd. En Moneybird gebruikt je instellingen die je hebt opgeslagen in de workflow.\n\nNaast de verkoopfacturen die je stuurt, heb je natuurlijk ook inkomende documenten en facturen die je aan je administratie toevoegt, voor kosten die je maakt.\n\nEen inkoopfactuur kun je handmatig toevoegen. Maar iedere Moneybird-administratie heeft ook een uniek e-mailadres waarmee je inkoopfacturen direct naar je administratie stuurt. Als de inkoopfactuur is toegevoegd, vult Moneybird zoveel mogelijk informatie voor je in. Je hoeft de gegevens alleen nog maar te controleren en op te slaan.\n\nEn het bonnetje voor tanken of van de bouwmarkt? Die voeg je super gemakkelijk toe via de mobiele Moneybird app.\n\nScan of fotografeer het bonnetje en met 'Scan en herken' worden de gegevens al herkend.\n\nControleer de gegevens en sla ze op. Je bonnetje is vervolgens aan je boekhouding toegevoegd. Is het zo gebeurd of is het zo gebeurd? Het is zo gebeurd.\n\nIn Moneybird kun je je bankrekening koppelen om transacties automatisch toe te voegen. Hierdoor krijg je een volledig overzicht van je zakelijke transacties. Je kunt een externe bank koppelen, maar ook gebruik maken van een Moneybird Betaalrekening.\n\nDan worden al je transacties real-time ingeladen.\n\nDe transacties worden gekoppeld aan je verkoopfacturen of inkomende documenten. Zo houd je goed overzicht in wat er wel en niet betaald is.\n\nVia rapporten krijg je inzicht in je bedrijf. Je ziet hier bijvoorbeeld de balans en de resultatenrekening.\n\nHet mooie aan Moneybird is dat alles wat je doet ook direct verwerkt wordt in de daarbij behorende rapporten. Zodra je een verkoopfactuur verzendt, wordt de omzet meegenomen in je rapporten. En heb je een inkoopfactuur toegevoegd? Dan wordt die meegenomen bij je kosten.\n\nAan de hand van het btw-tarief dat je hebt gebruikt en de factuurdatum van je factuur, wordt ook je btw-rapport klaargezet.\n\nMet de gegevens uit je btw-rapport doe je in een paar stappen je btw-aangifte.\n\nDat is in het kort hoe Moneybird werkt. Wil je nou meer leren? Vraag dan de gratis proefperiode aan en probeer het zelf. Of kijk eens rond in onze uitgebreide kennisbank met gedetailleerde uitlegvideo's.\n\nEn je bent\n\nook meer dan welkom bij één van onze livesessies waarin we een rondleiding door Moneybird geven.\n\nJe boekhouding? Zo gebeurd, met Moneybird.","hasPart":[{"@type":"Clip","endOffset":37,"name":"Introduction","startOffset":0,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=0s"},{"@type":"Clip","endOffset":58,"name":"Moneybird overview","startOffset":37,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=37s"},{"@type":"Clip","endOffset":84,"name":"Corporate identities","startOffset":58,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=58s"},{"@type":"Clip","endOffset":132,"name":"Workflows","startOffset":84,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=84s"},{"@type":"Clip","endOffset":173,"name":"Sending invoices","startOffset":132,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=132s"},{"@type":"Clip","endOffset":200,"name":"Add a purchase invoice","startOffset":173,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=173s"},{"@type":"Clip","endOffset":220,"name":"Scan receipts with the Moneybird app","startOffset":200,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=200s"},{"@type":"Clip","endOffset":244,"name":"Bank account","startOffset":220,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=220s"},{"@type":"Clip","endOffset":274,"name":"Reports","startOffset":244,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=244s"},{"@type":"Clip","endOffset":289,"name":"VAT return","startOffset":274,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=274s"},{"@type":"Clip","endOffset":301,"name":"Live sessions","startOffset":289,"url":"https://fast.wistia.net/embed/iframe/pyst17a8xb?wtime=289s"}]}</script>

"iso639_2_language_code":"nl","english_name":"Dutch","native_name":"Nederlands","right_to_left":false,"alpha3Bibliographic":"dut","alpha3Terminologic":"nld","ietfLanguageTag":"dut","iso6392LanguageCode":"nl","genericName":"Dutch","genericNativeName":"Nederlands"}],"hashedId":"pyst17a8xb","mediaId":144189185,"mediaKey":"wistia-production_144189185","mediaType":"Video","name":"Flying Through Moneybird 🇳🇱🇬🇧","preloadPreference":null,"progress":1.0,"protected":false,"projectId":9619685,"seoDescription":"a Vliegensvlug door Moneybird (Demo) video","showAbout":true,"status":2,"type":"Video","playableWithoutInstantHls":true,"privacyMode":true,"stats":{"loadCount":304073,"playCount":331,"uniqueLoadCount":179947,"uniquePlayCount":304,"averageEngagement":0.425657},"trackingTransmitInterval":20,"liveStreamEventDetails":null,"integrations":{},"captions":[{"language":"dut","text":"Moneybird.\n\nMoneybird, wat kun jij er mee?\n\nLaten we dat zo kort mogelijk proberen uit te leggen zodat jij een goede indruk krijgt.\n\nJa, wij zijn Loes en Liesbeth en we laten je zien wat je van Moneybird kunt verwachten. We laten je de basis zien die je nodig hebt voor een complete boekhouding.\n\nAl vijftien jaar willen wij het ondernemers gemakkelijk maken. Bij ons heb je geen uitgebreide boekhoudkennis nodig en kun je het grootste gedeelte van je boekhouding gewoon helemaal zelf doen.\n\nVan eenvoudige facturen versturen tot het volledig bijhouden van je boekhouding. Jij bepaalt wat je nodig hebt en als we jou het werk uit handen kunnen nemen, heb jij meer tijd voor de leuke dingen.\n\nWe nemen je kort mee door\n\nMoneybird. Als je je hebt aangemeld kun je in elk tabblad meteen aan de slag. Links zie je alle tabbladen, zoals facturen, bank en contacten.\n\nHelemaal onderaan vind je de instellingen. Hier vind je belangrijke onderdelen van je administratie.\n\nJe bedrijfsgegevens, btw-tarieven, categorieën, huisstijlen en workflows.\n\nDe uitstraling van je facturen en offertes kan je instellen bij de huisstijlinstellingen.\n\nHet is mogelijk om meerdere huisstijlen aan te maken. Bij het verzenden van een factuur kan je de juiste huisstijl kiezen.\n\nWanneer je een huisstijl gaat bewerken, kan je een logo toevoegen, een lettertype kiezen of een achtergrond aanpassen.\n\nOok bepaal je welke gegevens je wel en niet wil weergeven op je facturen. In de huisstijl maak je ook de e-mail op, die als begeleidende e-mail bij jouw factuur wordt meegestuurd.\n\nWil je een iDEAL betaalverzoek meesturen naar je klant? Of instellen wanneer je automatisch herinneringen verstuurt? Dat regel je in de workflow.\n\nIn een workflow pas je de standaardinstellingen van je facturen aan. Bijvoorbeeld de taal, valuta en eventuele standaard bijlagen die je bij je factuur mee wilt sturen.\n\nOok kun je hier de standaard teksten aanpassen.\n\nHier kun je online betaalmethoden activeren.\n\nDaarmee laat je je klant eenvoudig en automatisch, via een betaalverzoek online betalen.\n\nHier pas je de betaaltermijn aan.\n\nJe kunt verschillende workflows aanmaken en opslaan bij je contacten.\n\nBijvoorbeeld een Engelse workflow, zodat je Engelse klant een factuur krijgt in de juiste taal.\n\nOké, dat waren de basisinstellingen voor het verzenden van je factuur.\n\nDat was best makkelijk toch?\n\nDat was wel redelijk makkelijk\n\nja.\n\nMaar ik ga je nu iets echt makkelijks laten zien, het verzenden van facturen.\n\nOm je factuur te sturen ga je naar het tabblad 'Facturen'. Klik op 'Factuur toevoegen' en selecteer een contact.\n\nHet factuurnummer wordt automatisch voor je aangemaakt.\n\nVervolgens vul je je product of dienst in, het aantal, het bedrag en natuurlijk een BTW-tarief.\n\nOok kun je de factuurregels koppelen aan een categorie of eventueel project.\n\nDan is het in je rapporten ook gelijk overzichtelijk.\n\nJe slaat de gegevens op en verzendt de factuur. De status van de factuur is direct te zien in het overzicht.\n\nJe klant ontvangt een e-mail met daarin de factuur, natuurlijk in de huisstijl die je hebt geselecteerd. En Moneybird gebruikt je instellingen die je hebt opgeslagen in de workflow.\n\nNaast de verkoopfacturen die je stuurt, heb je natuurlijk ook inkomende documenten en facturen die je aan je administratie toevoegt, voor kosten die je maakt.\n\nEen inkoopfactuur kun je handmatig toevoegen. Maar iedere Moneybird-administratie heeft ook een uniek e-mailadres waarmee je inkoopfacturen direct naar je administratie stuurt. Als de inkoopfactuur is toegevoegd, vult Moneybird zoveel mogelijk informatie voor je in. Je hoeft de gegevens alleen nog maar te controleren en op te slaan.\n\nEn het bonnetje voor tanken of van de bouwmarkt? Die voeg je super gemakkelijk toe via de mobiele Moneybird app.\n\nScan of fotografeer het bonnetje en met 'Scan en herken' worden de gegevens al herkend.\n\nControleer de gegevens en sla ze op. Je bonnetje is vervolgens aan je boekhouding toegevoegd. Is het zo gebeurd of is het zo gebeurd? Het is zo gebeurd.\n\nIn Moneybird kun je je bankrekening koppelen om transacties automatisch toe te voegen. Hierdoor krijg je een volledig overzicht van je zakelijke transacties. Je kunt een externe bank koppelen, maar ook gebruik maken van een Moneybird Betaalrekening.\n\nDan worden al je transacties real-time ingeladen.\n\nDe transacties worden gekoppeld aan je verkoopfacturen of inkomende documenten. Zo houd je goed overzicht in wat er wel en niet betaald is.\n\nVia rapporten krijg je inzicht in je bedrijf. Je ziet hier bijvoorbeeld de balans en de resultatenrekening.\n\nHet mooie aan Moneybird is dat alles wat je doet ook direct verwerkt wordt in de daarbij behorende rapporten. Zodra je een verkoopfactuur verzendt, wordt de omzet meegenomen in je rapporten. En heb je een inkoopfactuur toegevoegd? Dan wordt die meegenomen bij je kosten.\n\nAan de hand van het btw-tarief dat je hebt gebruikt en de factuurdatum van je factuur, wordt ook je btw-rapport klaargezet.\n\nMet de gegevens uit je btw-rapport doe je in een paar stappen je btw-aangifte.\n\nDat is in het kort hoe Moneybird werkt. Wil je nou meer leren? Vraag dan de gratis proefperiode aan en probeer het zelf. Of kijk eens rond in onze uitgebreide kennisbank met gedetailleerde uitlegvideo's.\n\nEn je bent\n\nook meer dan welkom bij één van onze livesessies waarin we een rondleiding door Moneybird geven.\n\nJe boekhouding? Zo gebeurd, met Moneybird."}],"hls_enabled":true,"embed_options":{"opaqueControls":"false","playerColor":"132ba5","playerColorGradient":{"on":false,"colors":[["#132ba5",0],["#7991ff",1]],"on":"false","colors":[["132ba5","0"],["7991ff","1"]]},"plugin":{"captions":{"on":"true"},"chapters":{"chapterList":[{"id":"05862ef0-f05d-44fd-bb08-9c7d413cc62a","time":"298.17","title":"Livesessies","deleted":"false"},{"id":"17e9d7bb-d8b3-4b71-a581-9ee1bf48590a","time":"228.11","title":"Bankrekening","deleted":"false"},{"id":"4ce7a8e4-0a64-4fcc-abc5-48d5beceb8b4","time":"252.34","title":"Rapporten","deleted":"false"},{"id":"5a13c64f-8159-4e18-9a7f-57c7b6d56379","time":"282.47","title":"Btw-aangifte","deleted":"false"},{"id":"67bac906-6ca1-4a71-9d05-d670e216aca0","time":"38.699","title":"Moneybird overzicht","deleted":"false"},{"id":"a7154f84-1192-4442-ae4b-05bae46f81ea","time":"60.01","title":"Huisstijlen","deleted":"false"},{"id":"bd7ebde4-f0a8-4ce9-a4d5-90de005ab9f1","time":"207.81","title":"Scan bonnen met de Moneybird app","deleted":"false"},{"id":"d02b4e43-12c8-47b0-80e0-6cc3023e95f1","time":"88.03","title":"Workflows","deleted":"false"},{"id":"ec2cd75f-9304-45b4-93af-680de61b73dc","time":"181.975","title":"Inkoopfactuur toevoegen","deleted":"false"},{"id":"f6a51a6f-70d8-40a4-b647-4c222aa6178b","time":"136.725","title":"Facturen verzenden","deleted":"false"},{"id":"f7086ad3-4570-4b30-9832-6cf7715172e4","time":"0","title":"Introductie","deleted":"false"}],"on":"true"},"midrollLink-v1":{"links":[{"active":"true","conversionOpportunityKey":"wistia-production_8365256","duration":"10","name":"annotation_1770804641579_16137",
