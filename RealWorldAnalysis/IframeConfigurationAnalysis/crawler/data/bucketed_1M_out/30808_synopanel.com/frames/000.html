<!DOCTYPE html><html><head>
    <meta charset="UTF-8">
    <title>Welcome to Syno Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <link rel="icon" href="/images/syno_icon.png">
    <link href="https://panel-app.synointcdn.com/theme/1.4/css/icons.custom.min.css" rel="stylesheet" type="text/css">
    <link href="https://panel-app.synointcdn.com/theme/1.4/css/app.custom.min.css" rel="stylesheet" type="text/css">
    <link href="https://app.synopanel.com/build/app.1bc3e71e.css" rel="stylesheet" type="text/css">
    <style>
    :root {
        --primary-color: #292e7c;
    }
</style></head>

<body class="pb-0">
<script src="https://panel-app.synointcdn.com/theme/1.4/js/app.min.js"></script>
    <div class="auth-fluid">
        <div class="auth-fluid-form-box">
            <div class="align-items-center d-flex h-100">
                <div class="card-body">
                    <div class="loading-container d-none">
                        <div class="loading-background"></div>
                        <div class="text-center spinner-container">
                            <div class="spinner-border m-2 text-info" role="status"></div>
                            <div> Now loading...</div>
                        </div>
                    </div>
                    <h4 class="mt-0">Sign In</h4>
                    <p class="text-muted mb-4">Enter your email address and password to access all of your accounts.</p>
                    <form action="/login" method="POST" id="login-form">
                        <div class="form-group">
                            <label for="email">Email address</label>
                            <input class="form-control" type="email" id="email" name="email" required="" placeholder="Enter your email">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input class="form-control" type="password" required="" id="password" name="password" placeholder="Enter your password">
                        </div>
                        <div class="error-container">
                                                    </div>
                        <div class="form-group mb-0 text-center">
                            <button class="btn btn-primary btn-block" type="submit"><i class="mdi mdi-login"></i>Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <div class="auth-fluid-right text-center p-0">
            <div class="auth-user-testimonial">
                <h1 class="mb-3">Welcome to Synopanel!</h1>
            </div>
            
            <img class="login-background" src="/images/background2.jpg" style="">
            <img class="login-background" src="/images/background3.jpg" style="display: none">
            <img class="login-background" src="/images/background4.jpg" style="display: none">

        <img class="login-background" src="/images/background1.jpg" style="display: none;"></div>
    </div>

    <script src="https://app.synopanel.com/build/runtime.0e5e3770.js"></script><script src="https://app.synopanel.com/build/login.2ec9437c.js"></script>
</body></html>
