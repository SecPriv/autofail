<!DOCTYPE html><html lang="en"><head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Please wait...</title>

<style>

html,
body{
    margin:0;
    padding:0;
    background:#111;
    color:#fff;
    font-family:sans-serif;
}

#loader{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:#111;
    z-index:9999;
}

.logo{
    font-size:22px;
    margin-bottom:15px;
    opacity:0.9;
}

.text{
    font-size:14px;
    opacity:0.7;
}

.spinner{
    width:42px;
    height:42px;
    border:3px solid rgba(255,255,255,0.15);
    border-top:3px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    0%{
        transform:rotate(0deg);
    }
    100%{
        transform:rotate(360deg);
    }
}

</style>

</head>
<body>



</body></html>
