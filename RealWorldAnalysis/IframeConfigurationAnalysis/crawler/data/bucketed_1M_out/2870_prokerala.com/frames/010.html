		    );
		    background: linear-gradient(
		        to right,
		        rgba(255, 255, 255, 0) 0,
		        rgba(255, 255, 255, 0.1) 50%,
		        rgba(255, 255, 255, 0) 100%
		    );
		    background-size: 100% 100%;
		    animation: animateGlow 5s ease-out infinite;
		    animation-fill-mode: forwards;
		}
