<script>
(function(){
    if(!window||!navigator||!document){return;}
    if(!window.performance){ window.performance = { now: function(){ return new Date().getTime(); } }; }

    var targetUrl = decodeURIComponent("https%3A%2F%2Fcom-x.life%2F");
    var p = {
        token: "MjAwMTo2Mjk6OTQwMDoxMDAwOjE6YzdkNToxNjNhOjYwMGN8MTc3OTUzNjA3OXwxfDg3NjA4M3wzMTJjNzZlMmI1ZWU3M2MzYmViNTEwZWQyNzUxZmQyOQ%3D%3D",
        mode: "modern",
        caps: {
            webdriver: navigator.webdriver===true,
            touch: ("ontouchstart"in window)||(navigator.maxTouchPoints>0),
            screen: (typeof screen!=="undefined")?[screen.width,screen.height,screen.colorDepth||24]:[0,0,0],
            hasRAF: typeof window.requestAnimationFrame==="function",
            hasCrypto: !!(window.crypto && window.crypto.subtle)
        }
    };

    if(!p.caps.hasCrypto){ p.mode = "legacy"; }

    function go() {
        try { window.location.replace(targetUrl); } 
        catch(e) { window.location.href = targetUrl; }
    }

    function sendResult(){
        var c = p.caps||{};
        var s = c.screen||[0,0,0];
        
        var params = [];
        params.push("token=" + encodeURIComponent(p.token||""));
        params.push("mode=" + encodeURIComponent(p.mode||""));
        params.push("workTime=" + encodeURIComponent(p.workTime||0));
        params.push("iterations=" + encodeURIComponent(p.iterations||0));
        params.push("webdriver=" + (c.webdriver?"1":"0"));
        params.push("touch=" + (c.touch?"1":"0"));
        params.push("screen_w=" + (s[0]||0));
        params.push("screen_h=" + (s[1]||0));
        params.push("screen_cd=" + (s[2]||24));
        
        // WebGL renderer (ловит SwiftShader/LLVMpipe — серверный рендеринг)
        try {
            var cv = document.createElement("canvas");
            var gl = cv.getContext("webgl") || cv.getContext("experimental-webgl");
            if(gl) {
                var di = gl.getExtension("WEBGL_debug_renderer_info");
                if(di) {
                    params.push("wgv=" + encodeURIComponent(gl.getParameter(di.UNMASKED_VENDOR_WEBGL)||""));
                    params.push("wgr=" + encodeURIComponent(gl.getParameter(di.UNMASKED_RENDERER_WEBGL)||""));
                }
            }
        } catch(e){}

        // Timezone offset
        params.push("tz=" + encodeURIComponent(new Date().getTimezoneOffset()));

        // DPR (device pixel ratio)
        params.push("dpr=" + encodeURIComponent(window.devicePixelRatio||0));

        // [v3] CDP / stealth detection (passive, обёрнут в try — старые движки не страдают)
        var cdp_score = 0;
        var cdp_flags = "";
        // Сигнал 1: CDP читает .stack getter при console.debug
        try {
            var _e = new Error();
            var _hit = false;
            Object.defineProperty(_e, "stack", { get: function(){ _hit = true; return ""; }, configurable: true });
            // toString тоже может триггерить getter в некоторых движках
            try { console.debug(_e); } catch(_) {}
            try { String(_e); } catch(_) {}
            if (_hit) { cdp_score++; cdp_flags += "S"; }
        } catch(_) {}
        // Сигнал 2: Permissions API quirk (только если API существует)
        try {
            if (navigator.permissions && navigator.permissions.query && typeof Notification !== "undefined") {
                navigator.permissions.query({name:"notifications"}).then(function(p2){
                    if (p2 && p2.state === "denied" && Notification.permission === "default") {
                        cdp_score++; cdp_flags += "P";
                    }
                }).catch(function(){});
            }
        } catch(_) {}
        // Сигнал 3: native code check с baseline (фикс FP на Safari/WebKit)
        try {
            var nc = "[native code]";
            // Baseline: используем Web IDL native (document.createElement), а не ES-builtin.
            // Причина: Safari/WebKit для ES-builtins даёт "[native code]", а для IDL-bindings — нет.
            // Чтобы корректно сравнивать с navigator.permissions.query (тоже IDL), baseline должен быть IDL.
            var baseline = (typeof document !== "undefined" && document.createElement)
                ? Function.prototype.toString.call(document.createElement)
                : "";
            if (baseline.indexOf(nc) !== -1) {
                // Движок поддерживает нашу сигнатуру — теперь проверяем подозрительные API
                // [v4] Убран navigator.permissions.query — Brave полифилит его для anti-fingerprinting → FP.
                // Оставляем только DOM IDL (document.querySelector, document.getElementById)
                // — эти функции не патчатся stealth/privacy браузерами, потому что не используются для fingerprinting.
                var checks = [document.querySelector];
                if (document.getElementById) checks.push(document.getElementById);
                // window.fetch тоже патчится некоторыми браузерами (privacy-extensions); тоже убран.
                for (var i = 0; i < checks.length; i++) {
                    if (typeof checks[i] === "function" && Function.prototype.toString.call(checks[i]).indexOf(nc) === -1) {
                        cdp_score++; cdp_flags += "N"; break;
                    }
                }
            }
            // Иначе (Safari etc.) — пропускаем сигнал N полностью, без ложных срабатываний
        } catch(_) {}
        params.push("cdp=" + cdp_score);
        params.push("cdpf=" + encodeURIComponent(cdp_flags));

        var body = params.join("&");

        var x = new XMLHttpRequest();
        x.open("POST", "/_v", true);
        x.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
        x.onreadystatechange = function(){
            if(x.readyState===4){
                go();
            }
        };
        x.onerror = go;
        x.send(body);
    }

    function toHex(buf){
        var h=""; var b=new Uint8Array(buf);
        for(var i=0;i<b.length;i++){ var v=b[i].toString(16); if(v.length===1)v="0"+v; h+=v; }
        return h;
    }

    function runModern(){
        var start = performance.now();
        var nonce = 0; var iter = 0; var maxTime = 450;
        if(!window.requestAnimationFrame){ window.requestAnimationFrame=function(cb){return setTimeout(cb,16);}; }
        
        function loop(){
            if (document.hidden) { 
                start = performance.now();
                setTimeout(loop, 200);
                return; 
            }
            var now = performance.now();
            if(now-start > maxTime){
                p.workTime = now-start; p.iterations = iter; sendResult(); return;
            }
            var batch = 50; var done = 0;
            function step(){
                if(done >= batch){ iter += done; window.requestAnimationFrame(loop); return; }
                var msg = p.token + ":" + nonce;
                nonce++; done++;
                try {
                    var enc = new TextEncoder().encode(msg);
                    crypto.subtle.digest("SHA-256", enc).then(function(hash){
                        var hex = toHex(hash);
                        if(hex.slice(0,2)==="00"){
                            p.workTime = performance.now() - start; p.iterations = iter + done; sendResult();
                        } else { step(); }
                    }).catch(function(){ p.mode = "legacy"; runLegacy(); });
                } catch(e) { p.mode = "legacy"; runLegacy(); }
            }
            step();
        }
        loop();
    }

    function runLegacy(){
        var start = performance.now();
        var steps = 0; var maxTime = 550;
        function spin(){
            if (document.hidden) { 
                start = performance.now();
                setTimeout(spin, 200); 
                return; 
            }
            var now = performance.now();
            if(now-start > maxTime){
                p.workTime = now-start; p.iterations = steps; sendResult(); return;
            }
            for(var i=0; i<2000; i++){ steps++; }
            if(p.caps.hasRAF && window.requestAnimationFrame){
                window.requestAnimationFrame(spin);
            } else { setTimeout(spin, 10); }
        }
        spin();
    }

    try {
        if(p.mode==="modern" && p.caps.hasCrypto && window.TextEncoder){ runModern(); } 
        else { p.mode="legacy"; runLegacy(); }
    } catch(e){ p.mode="legacy"; runLegacy(); }

})();
</script>
