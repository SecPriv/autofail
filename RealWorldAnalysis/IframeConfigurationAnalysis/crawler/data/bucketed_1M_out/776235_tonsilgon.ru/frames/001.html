tr>\n\u003Ctr>\n\u003Ctd>дуба кора\u003C/td>\n\u003Ctd>4 мг\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>одуванчика лекарственного трава\u003C/td>\n\u003Ctd>4 мг\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>\u003Cem>вспомогательные вещества:\u003C/em> лактоза; маисовый крахмал; картофельный крахмал; стеариновая кислота; глюкозы моногидрат; высокодисперсная кремния двуокись\u003C/td>\n\u003Ctd> \u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>\u003Cem>оболочка:\u003C/em> кальция карбонат; глюкозный сироп; индиготин; маисовый крахмал; модифицированный маисовый крахмал; монтан гликоль воск; ПВП К25; ПВП К30; касторовое масло; сахароза; шеллак; тальк; высокодисперсная кремния двуокись; двуокись титана\u003C/td>\n\u003Ctd> \u003C/td>\n\u003C/tr>\n\u003C/tbody>\n\u003C/table>\n\n\u003Ctable width=\"100%\">\u003Ccolgroup width=\"70%\">\u003C/colgroup>\n\u003Ctbody>\n\u003Ctr>\n\u003Ctd>Капли для приема внутрь\u003C/td>\n\u003Ctd>100 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>водно-спиртовой экстракт\u003C/td>\n\u003Ctd>29 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>\u003Cem>активные вещества:\u003C/em>\u003C/td>\n\u003Ctd> \u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>алтея корни\u003C/td>\n\u003Ctd>0,4 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>ромашки цветки\u003C/td>\n\u003Ctd>0,3 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>хвоща трава\u003C/td>\n\u003Ctd>0,5 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>грецкого ореха листья\u003C/td>\n\u003Ctd>0,4 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>тысячелистника трава\u003C/td>\n\u003Ctd>0,4 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>дуба кора\u003C/td>\n\u003Ctd>0,2 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>одуванчика лекарственного трава\u003C/td>\n\u003Ctd>0,4 г\u003C/td>\n\u003C/tr>\n\u003Ctr>\n\u003Ctd>\u003Cem>вспомогательные вещества:\u003C/em> вода очищенная — 71 г\u003C/td>\n\u003Ctd> \u003C/td>\n\u003C/tr>\n\u003C/tbody>\n\u003C/table>","\u003Cp>\u003Cem>Драже:\u003C/em> двояковыпуклые, круглой формы, светло-голубого цвета.\u003C/p>\n\u003Cp>\u003Cem>Капли для приема внутрь:\u003C/em> прозрачная или слегка мутная жидкость желтовато-коричневого цвета с характерным запахом ромашки; возможно выпадение незначительного осадка в процессе хранения.\u003C/p>","\u003Cp>Фармакологические свойства обусловлены биологически активными веществами, входящими в состав препарата. Тонзилгон\u003Csup>®\u003C/sup> Н обладает противовоспалительным и антисептическим действием. Активные компоненты входящих в состав препарата ромашки, алтея и хвоща, способствуют повышению активности неспецифических факторов защиты организма. Полисахариды, эфирные масла и флавоноиды ромашки, алтея и тысячелистника, танины коры дуба оказывают противовоспалительное действие и способствуют уменьшению отека слизистой оболочки дыхательных путей.\u003C/p>","\u003Cul>\n\u003Cli>Острые и хронические заболевания верхних дыхательных путей (тонзиллит, фарингит, ларингит);\u003C/li>\n\u003Cli>профилактика осложнений при респираторных вирусных инфекциях;\u003C/li>\n\u003Cli>в качестве дополнения к антибиотикотерапии при бактериальных инфекциях верхних дыхательных путей.\u003C/li>\n\u003C/ul>","\u003Cul>\n\u003Cli>Повышенная чувствительность к компонентам препарата, в т.ч. растениям семейства сложноцветных;\u003C/li>\n\u003Cli>непереносимость лактозы, фруктозы, дефицит лактазы, сахаразы-изомальтазы, глюкозо-галактозная мальабсорбция (для драже);\u003C/li>\n\u003Cli>детский возраст (для капель — до 1 года, для драже — до 6 лет);\u003C/li>\n\u003Cli>алкоголизм, в т.ч. после антиалкогольного лечения (для капель).\u003C/li>\n\u003C/ul>","\u003Cp>\u003Cem>С осторожностью (для капель):\u003C/em>\u003C/p>\n\u003Cul>\n\u003Cli>заболевания печени,\u003C/li>\n\u003Cli>ЧМТ,\u003C/li>\n\u003Cli>заболевания головного мозга,\u003C/li>\n\u003Cli>детский возраст старше 1 года (применение возможно только после консультации с врачом в связи с содержанием этилового спирта в препарате).\u003C/li>\n\u003C/ul>","\u003Cp>Применение препарата возможно, если потенциальная польза для матери превышает потенциальный риск для плода и ребенка. Необходима консультация врача.\u003C/p>","\u003Cp>\u003Cem>Внутрь.\u003C/em>\u003C/p>\n\u003Cp>\u003Cem>Драже.\u003C/em> Проглатывать целиком, не разжевывая, при необходимости запивать водой.\u003C/p>\n\u003Cp>\u003Cem>В острый период развития заболевания:\u003C/em> взрослые — по 2 драже 5–6 раз в день; дети школьного возраста (старше 6 лет) — по 1 драже 5–6 раз в день.\u003C/p>\n\u003Cp>\u003Cem>После исчезновения острых симптомов заболевания (боль в горле)\u003C/em> следует продолжить лечение препаратом в течение еще 1 нед: взрослые — по 2 драже 3 раза в день; дети школьного возраста (старше 6 лет) — по 1 драже 3 раза в день.\u003C/p>\n\u003Cp>\u003Cem>Капли.\u003C/em> Принимать в неразбавленном виде, некоторое время подержав во рту перед проглатыванием.\u003C/p>\n\u003Cp>\u003Cem>В острый период развития заболевания:\u003C/em> взрослые — по 25 капель 5–6 раз в день; дети школьного возраста (старше 6 лет) — по 15 капель 5–6 раз в день; дети дошкольного возраста (старше 1 года) — по 10 капель 5–6 раз в день.\u003C/p>\n\u003Cp>\u003Cem>После исчезновения острых симптомов заболевания (боль в горле)\u003C/em> следует продолжить лечение препаратом в течение еще 1 нед: взрослые — по 25 капель 3 раза в день; дети школьного возраста (старше 6 лет) — по 15 капель 3 раза в день; дошкольного возраста (старше 1 года) — по 10 капель 3 раза в день.\u003C/p>","\u003Cul>\n\u003Cli>\u003Cem>Со стороны ЖКТ:\u003C/em> возможны тошнота, рвота.\u003C/li>\n\u003Cli>\u003Cem>Аллергические реакции:\u003C/em> возможны; при появлении признаков следует прекратить прием препарата.\u003C/li>\n\u003C/ul>","\u003Cp>До настоящего времени случаи передозировки не зарегистрированы.\u003C/p>\n\u003Cp>\u003Cem>Симптомы:\u003C/em> возможно усиление побочных эффектов со стороны ЖКТ.\u003C/p>\n\u003Cp>\u003Cem>Лечение:\u003C/em> симптоматическое.\u003C/p>","\u003Cp>Комбинация с антибактериальными ЛС возможна и целесообразна. Взаимодействие с другими ЛС не описано.\u003C/p>","\u003Cp>Если при применении препарата в течение 7 дней симптомы заболевания сохраняются или состояние больного ухудшается, следует обратиться к врачу.\u003C/p>\n\u003Cp>Одно драже содержит менее 0,03 ХЕ.\u003C/p>\n\u003Cp>Содержание в препарате (капли) этилового спирта составляет от 16 до 19,5% в объемном отношении. В максимальной разовой дозе (25 капель) содержание абсолютного этилового спирта составляет 0,21 г; в максимальной суточной дозе (25 капель 6 раз в день) — 1,26 г.\u003C/p>\n\u003Cp>В процессе хранения препарата в форме капель возможно легкое помутнение или выпадение незначительного осадка, что не влияет на эффективность препарата. Перед применением препарат следует взбалтывать! При использовании флакона держите его капельным устройством вниз в вертикальном положении.\u003C/p>","\u003Cp>\u003Cem>Драже.\u003C/em> Применение препарата не оказывает влияние на способность к выполнению потенциально опасных видов деятельности, требующих повышенной концентрации внимания и быстроты психомоторных реакций.\u003C/p>\n\u003Cp>\u003Cem>Капли.\u003C/em> В период применения препарата следует соблюдать осторожность при управлении транспортными средствами и занятии другими потенциально опасными видами деятельности, требующими повышенной концентрации внимания и быстроты психомоторных реакций, в связи с содержанием в нем этилового спирта.\u003C/p>","\u003Cp>\u003Cem>Драже.\u003C/em> В блистерах из фольги алюминиевой (нижняя часть) и ПВХ/ПВДХ пленки (верхняя часть) по 25 шт. В коробке картонной складной 2 или 4 блистера.\u003C/p>\n\u003Cp>\u003Cem>Капли для приема внутрь.\u003C/em> Во флаконах темного стекла объемом 50 или 100 мл с дозирующим капельным устройством сверху, с навинчивающейся крышкой и предохранительным кольцом, по 50 или 100 мл. В коробке картонной складной 1 фл.\u003C/p>","\u003Cp>Без рецепта.\u003C/p>","\u003Cp>Бионорика СЕ. Кершенштайнерштрассе, 11–15, 92318, Ноймаркт, Германия.\u003C/p>\n\u003Cp>Орга
