<script>
$(document).ready(function(){
    $("a").click(function(event){
        // Cek apakah elemen memiliki atribut `data-toggle="modal"`, `href` diawali dengan `#`, atau `target="_blank"`
        if (
            $(this).attr("data-toggle") === "modal" || 
            $(this).attr("href").startsWith("#") || 
            $(this).attr("target") === "_blank"
        ) {
            return; // Jika salah satu kondisi terpenuhi, biarkan berjalan tanpa overlay
        }
        $(".mobile-footer a.active").removeClass("active");
 
        $("#overlay").show(); // Tampilkan overlay
        
        // Simulasi loading, setelah 3 detik overlay menghilang
        setTimeout(function(){
            $("#overlay").fadeOut();
        }, 5000);
    });
});

$(document).click(function (event) {
    var $target = $(event.target);
    
    // Cek apakah yang diklik bukan sidebar atau tombol yang bisa membuka sidebar
    if (!$target.closest('#menu').length && !$target.closest('.toggle-sidebar-btn').length) {
        $('#menu').removeClass('show'); // Hapus class "show" dari sidebar
    }
});


(function mobileFooter(i18n) {
  var i18n = i18n || { current: 'current' };
  $('nav.mobile-footer').each(function (index, nav) {
    var a = 0, c = 0, i = 1, // active, current, increment
        $nav = $(nav),
        $links = $nav.find('a'),
        $line = $nav.find('.line');

    if (!$line.length) {
      $line = $('<i>', {
        'aria-hidden': true,
        'class': 'line no-animation', // Tambahkan kelas no-animation
        'html': i18n.current
      }).appendTo($nav);
    }

    $line.attr('id', 'nav-current' + index);
    if (!$line.html().length) $line.html(i18n.current);

    // Saat pertama kali load, letakkan tanpa animasi
    var $activeLink = $links.filter('.active');
    if ($activeLink.length) {
      place($line, $activeLink);
    }

    // Hapus kelas no-animation setelah halaman selesai dimuat
    setTimeout(() => $line.removeClass('no-animation'), 10);

    $links.each(function (index, link) {
      var $link = $(link);
      $link.removeAttr('aria-describedby');

      $link.on('click', function (e) {
        a = index;
        var t = setInterval(function () {
          $links.eq(c).removeClass('traversing active');
          i = a > c ? 1 : -1;
          c += i;
          $links.eq(c).addClass('traversing');
          if (c !== -1) {
            $links.eq(c - i).removeClass('active');
          }
          if (c === a) {
            $link.removeClass('traversing').addClass('active');
            i = 0;
            clearInterval(t);
          }
        }, 10); // Traversing hilite: min: 100ms
        place($line, $link);
      });
    });
  });

  function place($line, $a) {
    $a.attr('aria-describedby', $line.attr('id') || 'nav-current');
    $line.css({
      width: $a.outerWidth() + 'px',
      left: $a.position().left + $a.outerWidth() / 2 + 'px'
    });
  }
})(jQuery);
