<!DOCTYPE html><html data-content-brand="bild" data-theme="light" data-density="default"><head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="googlebot" content="noindex,indexifembedded">
    <link rel="stylesheet" href="./bild/theme.css">
    <link rel="stylesheet" href="./bild/tokens.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="./shared/primitives.css">

    <title>EPG</title>
  </head>
  <body>
    <div class="epg-page">
      <div class="program-list">
        <!-- Aktuelle Sendung -->
        <article class="epg-card epg-card--current">
          <header class="epg-card__header">
            <div class="epg-card__status">
              <span class="status-dot"></span>
              <span class="status-label">
                <h1 class="label-2">Jetzt läuft</h1>
              </span>
            </div>
            <div class="epg-card__time label-2">11:17 – 12:12 Uhr</div>
          </header>
          <h1 class="epg-card__title headline-4">„Das Leben sagt mir, welche Songs ich schreiben soll“</h1>
          <div class="epg-card__progress" data-start="20:00" data-end="21:00" data-start-ms="1779527822719" data-end-ms="1779531126519">
            <span class="epg-card__progress-bar" style="width: 83.2986%;"></span>
          </div>
        </article>
        <!-- Nächste Sendung -->
        <article class="epg-card epg-card--next">
          <header class="epg-card__header">
            <div class="epg-card__status epg-card__status--next label-2">
              Als nächstes
            </div>
            <div class="epg-card__time label-2">12:12 Uhr</div>
          </header>
          <h1 class="epg-card__title headline-4">Bluttest schwaches Herz Prof. Landmesser </h1>
        </article>
      </div>
    </div>

    <script src="script.js"></script>
  

</body></html>
