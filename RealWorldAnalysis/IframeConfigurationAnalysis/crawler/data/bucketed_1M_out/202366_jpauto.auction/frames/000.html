<!DOCTYPE html><html><head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>JP Auto Auction</title>
<link href="/favicon.ico" type="image/x-icon" rel="icon"><link href="/favicon.ico" type="image/x-icon" rel="shortcut icon">


<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="/css/bootstrap.css" rel="stylesheet">
<link href="/css/bootstrap-responsive.css" rel="stylesheet">

<link href="/css/login.css" rel="stylesheet">



<script type="text/javascript" src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<script src="/js/bootstrap.js" type="text/javascript"></script>


</head>
<body>

<div class="container">
	<h1 class="site-title text-center">
		<img src="/img/icon.png">
		<span>JP Auto Auction</span>
	</h1>

	

	

<form class="form-signin" method="POST" action="/login/login">

	

	<h2 class="form-signin-heading">Login</h2>

	<input type="text" placeholder="Email address" class="input-block-level" name="data[Bidder][email]">

	<input type="password" placeholder="Password" class="input-block-level" name="data[Bidder][password]">

	<button type="submit" class="btn btn-primary">Login</button>

	<div class="text-right">
		<a href="/login/reissue"><i class="fa fa-question-circle"></i> Forgot your password?</a>
	</div>

</form>


</div><!-- .container -->

<footer class="text-center">
	<p>© 2016 JP Auto Auction</p>
</footer>


</body></html>
