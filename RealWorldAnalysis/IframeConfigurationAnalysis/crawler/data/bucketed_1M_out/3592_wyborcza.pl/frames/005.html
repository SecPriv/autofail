<!DOCTYPE html><html lang="pl"><head>
    <meta charset="UTF-8">
    <title>GlobalCookieIframe</title>
    <meta name="robots" content="noindex">
    <link rel="shortcut icon" href="https://static.im-g.pl/aliasy/foto/wyborcza/favicon.ico">
</head>
<body>

    <script>
                    /*<![CDATA[*/
                    (function() {
                        var query = parseQuery();
                        if (query.cookieName) {
                            parent.postMessage(readCookie(query.cookieName),
                                    '*');
                        }
                        function readCookie(name) {
                            var cookies = document.cookie.split('; ');
                            var i = 0;
                            var cookie;
                            for (i; i < cookies.length; i++) {
                                cookie = cookies[i].split('=');
                                if (name === cookie[0]) {
                                    return {
                                        key : cookie[0],
                                        value : cookie[1]
                                    };
                                }
                            }
                            return null;
                        }
                        function parseQuery() {
                            var query = window.location.search.substring(1);
                            var output = {};
                            var vars;
                            if (!query) {
                                return output;
                            }
                            vars = query.split('&');
                            for (var i = 0; i < vars.length; i++) {
                                var pair = vars[i].split('=');
                                output[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1]);
                            }
                            return output;
                        }
                    })();
                    /*]]>*/
                </script>



</body></html>
