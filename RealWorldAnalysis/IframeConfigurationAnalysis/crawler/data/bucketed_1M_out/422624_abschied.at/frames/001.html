<script>
    
var myURL;
var mySESSION = makeSession(41)+'_'+makeSession(77)+'_'+makeSession(61)+'_'+makeSession(21);
myURL="bestattungskosten-rechner_step3.php?"+mySESSION;    
    
var options = {
	url: function(phrase) {
        if (phrase.length>2) 
		  return "https://trauerapp.abschied.at/api/location/search.php?s=" + phrase;// + "&format=json";
	},

    placeholder: "BITTE ORT OD PLZ EINGEBEN",
    adjustWidth: false,
	getValue: "name",
    
    list: {
        onClickEvent: function() {
			myCITY = $("#ajaxCity").getSelectedItemData().id; 
            myACTIVE = $("#ajaxCity").getSelectedItemData().active;
            if (myCITY && myACTIVE) {
              getCompanies(myCITY);
              showCompany();
            } else {
              $('#myUNDERTAKERS').html('Leider sind wir hier noch nicht tätig!<br /><br /><a href="http://www.bestatter.at/pub/main_layouts/bestatter.aspx" target="_blank">Bestatter finden auf Bestatter.at</a>');
              showCompany();                      
            }  
            
        },
        onKeyEnterEvent: function() {
			myCITY = $("#ajaxCity").getSelectedItemData().id;
            myACTIVE = $("#ajaxCity").getSelectedItemData().active;
            if (myCITY && myACTIVE) {
              getCompanies(myCITY);
              showCompany();
            } else {
              $('#myUNDERTAKERS').html('Leider sind wir hier noch nicht tätig!<br /><br /><a href="http://www.bestatter.at/pub/main_layouts/bestatter.aspx" target="_blank">Bestatter finden auf Bestatter.at</a>');
              showCompany();       
            }           
            
        },

		hideAnimation: {
			type: "slide", //normal|slide|fade
			time: 400,
			callback: function() {}
		}           

    }
};

$("#ajaxCity").easyAutocomplete(options);
    
    
function makeSession(length) {
   var result           = '';
   var characters       = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
   var charactersLength = characters.length;
   for ( var i = 0; i < length; i++ ) {
      result += characters.charAt(Math.floor(Math.random() * charactersLength));
   }
   return result;
}    

      var myART=0;
      var myCITY=0;
      var myCITYNAME = "";
      var myCOMPANY=0;
      
      
      function setArt(art) {
         myART=art;
          
         $('#cArt1').html('<i class="fas fa-info-circle color-primary"></i>');
         $('#cArt2').html('<i class="fas fa-info-circle color-primary"></i>');
         $('#cArt3').html('<i class="fas fa-info-circle color-primary"></i>');          
         
        var myEL = "#cArt"+art;     
        $(myEL).html('<i class="fas fa-caret-up"></i>');
        $('#step2').removeAttr('style');
        $('#ajaxCity').removeAttr("disabled");  
        $('#ajaxCity').focus();  
          
      }
    
      function setCompany(company) {
         myCOMPANY=company; 
         console.log(myCOMPANY);
      }
    
      function showCompany() {            
        $('#step3').show();   
      } 
    
      function hideCompany() {            
        $('#step3').hide();   
      } 
    
    

    
    function getCompanies(city) {
       var showData = $('#myUNDERTAKERS');
        
       var theUNDERTAKERS ="";
       var API_URL = "https://trauerapp.abschied.at/api/undertaker/read_locas.php?";    
        
       var jsonURL = API_URL+"zip_id="+city;
       $.getJSON(jsonURL, function (data) {
            myURL +="&art="+myART+"&city="+city+"&prep=0";            
        
         $.each(data, function(index, element) {
			    if (element.Calcurl.length > 11) {
                  myLINK = element.Calcurl.valueOf();
				  myTARGET = "_blank";	
				} else {  
                  myLINK = myURL+"&company="+element.Firma_id;
				  myTARGET = "_blank"; 	
				}			 
                myQuality = (element.Quality==1) ? '<img src="img/logo_quality_small.png" width="66px" height="50px" alt="Qualitätsbestatter">':''; 
                theUNDERTAKERS += '<div><a class="btn btn-block btn-secondary-company" data-id="'+element.Firma_id+'" href="'+myLINK+'" target="'+myTARGET+'"><div class="row"><div class="col-9 company">'+element.Firma+'<div class="address">'+element.Plz+' '+element.Ort+'</div></div><div class="col-3 quality">'+myQuality+'</div></div></a></div>'; 
             }); 
            showData.html(theUNDERTAKERS);           
         });  
  };      
    
    
  </script>
