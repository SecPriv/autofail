<body style="margin:0;padding:0;">
<script>
    var linkUrl = 'https://s.ad.twinrdengine.com/tag?zone=01DXF6DT004000000000002SBA&kw=default+site+keywords&subid=2562719744';
    var iframe = document.createElement('iframe');
    iframe.src = linkUrl;
    iframe.style.width = '100vw';
    iframe.style.height = '100vh';
    iframe.setAttribute('frameborder', 0);
    iframe.name = 'asg-inter';
    iframe.onload = function() { window.parent.postMessage(['asgInterReady'], '*'); }

        if (event.data === 'asgInterOpen') {
            iframe.contentWindow.postMessage({ id: iframe.name, type: 'displayCreative' }, '*');
        }
    });
    document.body.appendChild(iframe);
