#superchat-widget {
  all: unset;
  display: revert;
  background: transparent;
  font-family: var(--sc-font-family-body), sans-serif;
}

/* Scoped styles for #superchat-widget and its children */
#superchat-widget
  :where(
    :not(canvas, iframe, svg, video, audio, em-emoji-picker):not(
      svg *,
      symbol *
    )
  ) {
  all: unset;
  display: revert;
  font-family: var(--sc-font-family-body), sans-serif;
}

#superchat-widget :where(:is(em-emoji-picker)) {
  --shadow: none;
  --font-size: 14px;
  --rgb-accent: 31, 182, 255;

  width: 100%;
  height: 100%;
  max-height: 50vh;
  background: unset;
  margin: unset;
  padding: unset;
  font-family: var(--sc-font-family-body), sans-serif;
}

/* Explicit reset for iframe elements */
#superchat-widget iframe {
  all: initial;
  display: revert;
  aspect-ratio: auto !important;
  box-sizing: border-box;
  font-family: var(--sc-font-family-body), sans-serif;
}

#superchat-widget *,
#superchat-widget *::before,
#superchat-widget *::after {
  box-sizing: border-box;
}

#superchat-widget html {
  -moz-text-size-adjust: none;
  -webkit-text-size-adjust: none;
  text-size-adjust: none;
}

#superchat-widget a,
#superchat-widget button {
  cursor: revert;
}

#superchat-widget ol,
#superchat-widget ul,
#superchat-widget menu,
#superchat-widget summary {
  list-style: none;
}

#superchat-widget ol {
  counter-reset: revert;
}

#superchat-widget img {
  max-inline-size: 100%;
  max-block-size: 100%;
}

#superchat-widget table {
  border-collapse: collapse;
}

#superchat-widget input,
#superchat-widget textarea {
  -webkit-user-select: auto;
}

#superchat-widget textarea {
  white-space: revert;
}

#superchat-widget meter {
  -webkit-appearance: revert;
  -moz-appearance: revert;
       appearance: revert;
}

#superchat-widget :where(pre) {
  all: revert;
  box-sizing: border-box;
}

#superchat-widget ::-moz-placeholder {
  font-family: var(--sc-font-family-body), sans-serif;
}

#superchat-widget ::placeholder {
  font-family: var(--sc-font-family-body), sans-serif;
}

#superchat-widget :where([hidden]) {
  display: none;
}

#superchat-widget :where([contenteditable]:not([contenteditable="false"])) {
  -moz-user-modify: read-write;
  -webkit-user-modify: read-write;
  overflow-wrap: break-word;
  -webkit-line-break: after-white-space;
  -webkit-user-select: auto;
}

#superchat-widget :where([draggable="true"]) {
  -webkit-user-drag: element;
}

#superchat-widget :where(dialog:modal) {
  all: revert;
  box-sizing: border-box;
}

#superchat-widget ::-webkit-details-marker {
  display: none;
}
