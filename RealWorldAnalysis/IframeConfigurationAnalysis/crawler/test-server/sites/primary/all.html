<!doctype html>
<html>

<head>
  <title>all scenarios on one page</title>
</head>

<body>
  <h2>all scenarios on one page</h2>

  <iframe src="/child.html" id="plain" title="plain"></iframe>
  <iframe src="/child.html" id="sb" sandbox title="sandbox"></iframe>
  <iframe src="/child.html" id="sb-empty" sandbox="" title="empty sandbox"></iframe>
  <iframe src="/child.html" id="sb-scripts-same-origin" sandbox="allow-scripts allow-same-origin"
    title="scripts+same-origin"></iframe>
  <iframe src="/child.html" id="perm-cam" allow="camera; microphone" title="permissions"></iframe>
  <iframe srcdoc="&lt;p&gt;inline&lt;/p&gt;" id="srcdoc" title="srcdoc"></iframe>
  <iframe src="http://localhost:3001/child.html" id="xo" title="cross-origin"></iframe>
  <iframe src="/nested-l2.html" id="nest" title="nested-parent"></iframe>
  <iframe name="__tcfapiLocator" id="tcf" style="display: none;"></iframe>

  <div id="slot"></div>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const f = document.createElement('iframe');
      f.src = '/child.html';
      f.id = 'dyn';
      f.setAttribute('data-injected', 'true');
      document.getElementById('slot').appendChild(f);
    });
  </script>
</body>

</html>
