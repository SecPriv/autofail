<!doctype html>
<html><head><title>sandbox variants</title></head>
<body>
  <h2>sandbox attribute variants</h2>
  <iframe src="/child.html" id="no-sandbox" title="no sandbox"></iframe>
  <iframe src="/child.html" id="sandbox-empty" sandbox="" title="empty sandbox"></iframe>
  <iframe src="/child.html" id="sandbox" sandbox title="sandbox"></iframe>
  <iframe src="/child.html" id="sandbox-scripts" sandbox="allow-scripts" title="allow-scripts"></iframe>
  <iframe src="/child.html" id="sandbox-scripts-same-origin" sandbox="allow-scripts allow-same-origin" title="scripts + same-origin"></iframe>
  <iframe src="/child.html" id="sandbox-forms-popups-modals" sandbox="allow-forms allow-popups allow-modals" title="forms + popups + modals"></iframe>
  <iframe src="/child.html" id="sandbox-top-nav" sandbox="allow-top-navigation allow-scripts" title="top navigation + scripts"></iframe>
</body></html>
