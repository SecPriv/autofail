<!DOCTYPE html><html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://cdn2.videy.co">
<link rel="dns-prefetch" href="//cdn2.videy.co">
<title>Video Player</title>
<style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100vh;
            background: #000;
        }
        #joinPopup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .popup-box {
            background: #000000;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            box-shadow: 0 0 40px rgba(255, 204, 0, .5);
        }
        .popup-box h2 {
            color: #fff;
            margin-bottom: 20px;
        }
        .popup-box a {
            display: inline-block;
            background: linear-gradient(90deg, #ffc50c, #ffcc00);
            color: #fff;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <video id="player" controls="" autoplay="" playsinline="" webkit-playsinline="">
        <source src="https://cdn2.videy.co/7ukDcDfk1.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div id="joinPopup">
        <div class="popup-box">
            <h2>KLIK UNTUK LANJUT MENONTON</h2>
            <a href="https://omg10.com/4/10793219" ,"_blank"="">
                Lanjut Menonton!
            </a>
        </div>
    </div>

    <script>
    
function isiOSSafari(){
    return /iP(ad|hone|od)/.test(navigator.userAgent) &&
           /Safari/.test(navigator.userAgent) &&
           !/CriOS|FxiOS|OPiOS/.test(navigator.userAgent);
}

let player = document.getElementById("player");
let popup = document.getElementById("joinPopup");

let adsOpened = false;
let popupShown = false;
let lastTime = 0;
let seekAdsShown = false;

// Detik pause dan link masing-masing
let pauseAdsTimes = {
    20: "https://omg10.com/4/10685768"
};
let triggeredPauseAds = {};
let waitingForResumeAd = false;
let currentAdLink = "";

// Klik/tap pertama video → buka ads awal
function openInitialAd(){
    if(!adsOpened){
        adsOpened = true;
        window.open("https://omg10.com/4/10685768","_blank");
    }
}

player.addEventListener("click", openInitialAd);
player.addEventListener("touchstart", openInitialAd);

player.addEventListener("play", function(){
    if(waitingForResumeAd){
        waitingForResumeAd = false;
        if(currentAdLink){
            window.open(currentAdLink,"_blank");
            currentAdLink = "";
        }
        return;
    }
    openInitialAd();
});

document.querySelector("#joinPopup a").addEventListener("click", function(e){
    e.preventDefault();
    window.open("https://omg10.com/4/10685768","_blank");
    popup.style.display="none";
});

</script>

</body></html>
