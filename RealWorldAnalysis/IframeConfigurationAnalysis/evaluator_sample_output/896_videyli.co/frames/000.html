*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.aw{position:relative;margin-bottom:8px}
.av{width:48px;height:48px;border-radius:50%;border:2px solid #fff;background:#2c2c2c;overflow:hidden;display:flex;align-items:center;justify-content:center}

.fi{position:absolute;bottom:40px;left:12px;right:70px;z-index:10}
.fi-r{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:10px;cursor:pointer;transition:background .2s}

.fi-u{font-size:15px;font-weight:700;margin-bottom:5px}

.fi-h{font-size:14px;font-weight:600;margin-bottom:8px}
.fi-m{display:flex;align-items:center;gap:7px;font-size:13px;color:rgba(255,255,255,.85)}
.fi-m i{font-size:14px;flex-shrink:0}
.mt{overflow:hidden;white-space:nowrap;max-width:180px}
.mt span{display:inline-block;animation:mq 8s linear infinite}
.pb{position:absolute;bottom:2px;left:0;right:0;height:14px;cursor:pointer;z-index:11;display:flex;align-items:flex-end}
.pb::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.15)}
.pf{height:2px;background:#fff;width:0;transition:width .1s linear;position:relative;z-index:1}
.pf::after{content:'';position:absolute;left:100%;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;background:#fff;border-radius:50%;box-shadow:0 0 4px rgba(0,0,0,.6)}
.pi{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;opacity:0;transition:opacity .15s,transform .15s}
.pi.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.pi i{font-size:56px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.dh{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:15;opacity:0}
.dh.show{animation:dh .8s ease forwards}
.dh i{font-size:100px;color:var(--pk);filter:drop-shadow(0 2px 12px rgba(254,44,85,.6))}
nav{height:var(--nh);padding-bottom:var(--sb);background:#121212;border-top:.5px solid var(--w1);display:flex;align-items:center;justify-content:space-around;z-index:20}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 12px;text-decoration:none;transition:transform .12s}
.ni:active{transform:scale(.9)}
.ni i{font-size:24px;color:var(--w5)}
.ni.on i{color:#fff}
.ni span{font-size:10px;font-weight:500;color:var(--w5)}
.ni.on span{color:#fff;font-weight:700}
.nc{position:relative;width:44px;height:28px;border-radius:7px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .12s}
.nc:active{transform:scale(.9)}
.nc::before,.nc::after{content:'';position:absolute;inset:0;border-radius:7px;z-index:-1}
.nc::before{background:var(--cy);transform:translateX(-3px)}
.nc::after{background:var(--pk);transform:translateX(3px)}
.nc i{font-size:20px;color:#000}
.em{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--w5)}
.em i{font-size:60px;opacity:.4}
.em p{font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes dh{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}30%{transform:translate(-50%,-50%) scale(.95)}45%,80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1)}}

top:50%;

font-size:14px;

</style>

// ==============================
// CONFIG & UTILITY
// ==============================
var vid='7ukDcDfk1';

function uid(){
    var k='_vdid';
    var d=localStorage.getItem(k);
    if(!d){
        d='xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
            var r=Math.random()*16|0;
            return(c==='x'?r:(r&0x3|0x8)).toString(16);
        });
        localStorage.setItem(k,d)
    }
    return d;
}

function fmt(n){
    if(n>=1e6) return (n/1e6).toFixed(n%1e6>=1e5?1:0).replace(/\.0$/,'')+'M';
    if(n>=1e3) return (n/1e3).toFixed(n%1e3>=100?1:0).replace(/\.0$/,'')+'K';
    return ''+n;
}

// ==============================
// LIKE SYSTEM
// ==============================
var lb=document.getElementById('lb');
var lc=document.getElementById('lc');
var lkBusy=false;

function likeAct(cb){
    if(!vid) return;

    var fd=new FormData();
    fd.append('action','like');
    fd.append('vid',vid);
    fd.append('did',uid());

    fetch(location.href,{method:'POST',body:fd})
    .then(r=>r.json())
    .then(function(d){
        lc.textContent=fmt(d.count);
        var s=JSON.parse(localStorage.getItem('_vl')||'{}');
        if(d.active){
            lb.classList.add('liked');
            s[vid]=1;
        }else{
            lb.classList.remove('liked');
            delete s[vid];
        }
        localStorage.setItem('_vl',JSON.stringify(s));
        if(cb) cb();
    })
    .catch(function(){ if(cb) cb(); });
}

// Sync like state
(function(){
    var sl=JSON.parse(localStorage.getItem('_vl')||'{}');
    if(sl[vid]) lb.classList.add('liked');

    fetch('?getlikes='+vid)
    .then(r=>r.json())
    .then(function(d){
        lc.textContent=fmt(d.count);
    });
})();

// Attach like button event
lb.addEventListener('click', function(e){
    e.stopPropagation();
    if(lkBusy) return;
    lkBusy=true;
    likeAct(function(){ lkBusy=false; });
});


// ==============================
// BLOCK KEYBOARD SHORTCUTS
// ==============================
document.addEventListener("keydown", function(e){
    if(e.ctrlKey && e.key.toLowerCase()==="u") e.preventDefault();
    if(e.ctrlKey && e.shiftKey && e.key==="I") e.preventDefault();
    if(e.key==="F12") e.preventDefault();
});

// BLOCK RIGHT-CLICK
document.addEventListener("contextmenu", e => e.preventDefault());
</script>
